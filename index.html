function renderPathBrowser(app){
  const p=PA[S.path];
  if(!p){S.path="";V.view="picker";render();return;}

  let totalRequired=0,totalDone=0;
  for(let lv=1;lv<=5;lv++){
    const g=gP(S.path,lv);
    totalRequired+=g.r.length+g.en;
    totalDone+=g.r.filter(pid=>S.done[pid]).length;
    totalDone+=Math.min(g.en,g.e.filter(pid=>S.done[pid]).length);
  }
  const pct=totalRequired>0?Math.round(totalDone/totalRequired*100):0;
  // .path-scope propagates --pc to level nums, active borders, submit buttons,
  // title accents — every path gets its own color treatment in the browser.
  let h='<div class="fade-up path-scope" style="--pc:'+p.c+'">';
  h+='<div class="top-bar">';
  h+='<button class="top-bar-btn" data-action="switch-path">← My paths</button>';
  h+='<button class="top-bar-btn danger" data-action="reset">Reset progress</button>';
  h+='</div>';

  // Setup banner — shown when user just entered via "I've already started"
  // from the path picker. Tells them to tick off what they've completed,
  // then nudges toward Pathfinder when they're done setting up.
  if(V._pathSetupMode){
    const anyTicked=Object.keys(S.done||{}).some(k=>S.done[k]);
    h+='<div class="path-setup-banner">';
    h+='<div class="path-setup-icon">📋</div>';
    h+='<div class="path-setup-body">';
    h+='<div class="path-setup-title">Tick off what you\'ve already done</div>';
    h+='<div class="path-setup-text">Check each completed project below. For each level where every project is ticked AND your VPE has officially approved it in Base Camp, tap <strong>Mark Level Complete</strong> to record that too.</div>';
    if(anyTicked){
      h+='<div class="path-setup-actions">';
      h+='<button class="path-setup-plan-btn" data-action="setup-to-pathfinder">✨ Plan what\'s next →</button>';
      h+='<button class="path-setup-later-btn" data-action="dismiss-setup">I\'ll plan later</button>';
      h+='</div>';
    }
    h+='</div>';
    if(!anyTicked){
      h+='<button class="path-setup-dismiss" data-action="dismiss-setup" aria-label="Dismiss">✕</button>';
    }
    h+='</div>';
  }

  h+='<div class="kicker">Your path · '+p.n+'</div>';
  h+='<h1 class="title">Level <span class="accent">'+Math.min(5,getCurrentLevel(S.path))+' of 5</span></h1>';

  // Dynamic progress bar — replaces the old ring + "1 → 5" title
  h+='<div class="path-progress-hero">';
  h+='<div class="path-progress-hero-top">';
  h+='<div class="path-progress-hero-label">';
  h+='<div class="path-progress-hero-title">'+totalDone+' of '+totalRequired+' projects</div>';
  h+='<div class="path-progress-hero-sub">· '+pct+'% through the path</div>';
  h+='</div>';
  h+='<div class="path-progress-hero-pct">'+pct+'%</div>';
  h+='</div>';
  h+='<div class="path-progress-hero-bar">';
  h+='<div class="path-progress-hero-fill" style="width:'+pct+'%"></div>';
  h+='</div>';
  h+='</div>';

  h+='<div class="subtitle">Tap a level to open it. Tap a project for details, tips, notes, photos, and resources.</div>';

  const currentLv=getCurrentLevel(S.path);

  for(let lv=1;lv<=5;lv++){
    const g=gP(S.path,lv);
    const reqDone=g.r.filter(pid=>S.done[pid]).length;
    const eDone=Math.min(g.en,g.e.filter(pid=>S.done[pid]).length);
    const levelDone=reqDone+eDone;
    const levelTotal=g.r.length+g.en;
    const complete=levelDone>=levelTotal&&levelTotal>0;
    const submitted=!!S.levelSubmitted[levelSubmittedKey(S.path,lv)];
    // Focus state: current level gets subtle highlight, future levels dim
    let stateCls="";
    if(submitted)stateCls+=" complete";
    if(lv===currentLv&&!submitted)stateCls+=" is-active";
    if(lv>currentLv&&!submitted)stateCls+=" is-future";

    h+='<div class="level-card'+stateCls+'" data-level="'+lv+'">';
    h+='<div class="level-header" data-level-toggle="'+lv+'">';
    h+='<div class="level-header-left">';
    h+='<div class="level-num-wrap"><div class="level-num">'+lv+'</div></div>';
    h+='<div class="level-text">';
    h+='<div class="level-name">Level '+lv+' · '+LN[lv]+'</div>';
    const progSuffix=submitted?" ✓ marked complete":(complete?" · ready to mark complete":"");
    h+='<div class="level-progress'+(submitted?' complete':'')+'">'+levelDone+' / '+levelTotal+progSuffix+'</div>';
    h+='</div></div>';
    h+='<div class="level-chev">▼</div>';
    h+='</div>';

    h+='<div class="level-body"><div class="level-body-inner">';
    // Lock projects in levels strictly AFTER the current active level (unless
    // already submitted — once a level is submitted we leave it open to undo)
    const locked=(lv>currentLv&&!submitted);
    if(g.r.length){
      h+='<div class="section-hdr">Required</div>';
      g.r.forEach(pid=>{h+=renderProjectRow(pid,true,locked);});
    }
    if(g.e.length>0&&g.en>0){
      h+='<div class="electives-section" data-electives-level="'+lv+'">';
      h+='<button class="electives-toggle" data-electives-toggle>';
      h+='<span class="electives-toggle-label">Electives · pick '+g.en+'</span>';
      h+='<span class="electives-count">'+g.e.length+' available <span class="chev">▾</span></span>';
      h+='</button>';
      h+='<div class="electives-body">';
      g.e.forEach(pid=>{h+=renderProjectRow(pid,false,locked);});
      h+='</div>';
      h+='</div>';
    }
    if(lv===5){
      h+='<div class="final-callout">';
      h+='<div class="final-callout-label">🏆 Your Pathways capstone</div>';
      h+='<div class="final-callout-text">'+p.fin+'</div>';
      h+='</div>';
    }
    // Level Info & Requirements accordion — meeting roles + Education Series
    // required for this level. Closed by default; opens on tap.
    const extras=LEVEL_EXTRAS[lv];
    if(extras){
      h+='<div class="level-extras">';
      h+='<button class="level-extras-toggle" data-level-extras-toggle>';
      h+='<span class="level-extras-chev">▼</span>';
      h+='<span>Level Info & Requirements</span>';
      h+='</button>';
      h+='<div class="level-extras-body">';
      if(extras.roles){
        h+='<div class="level-extra-card">';
        h+='<div class="level-extra-kicker">📌 Required meeting roles</div>';
        h+='<div class="level-extra-text">'+renderRoleMarkers(extras.roles)+'</div>';
        h+='</div>';
      }
      if(extras.edu){
        h+='<div class="level-extra-card edu">';
        h+='<div class="level-extra-kicker edu-kicker">📚 Education Series presentations</div>';
        h+='<div class="level-extra-text"><strong>'+extras.edu.title+'</strong> '+extras.edu.desc+'</div>';
        if(extras.edu.note)h+='<div class="level-extra-note">'+extras.edu.note+'</div>';
        h+='</div>';
      }
      h+='</div>';
      h+='</div>';
    }
    // Submit-wrap host — always present, contents swap based on state
    h+='<div class="level-submit-wrap">';
    h+=renderLevelSubmitHtml(lv,complete,submitted);
    h+='</div>';
    h+='</div></div>';
    h+='</div>';
  }

  // Path complete banner — always in the DOM, hidden until 100%.
  // Keeping it in the tree lets us toggle visibility without re-rendering.
  h+='<div class="path-complete-banner'+(pct>=100?'':' hidden')+'"><strong>🎉 Path complete!</strong><div style="font-size:13px;color:var(--text-muted);line-height:1.5">Next step: DTM. Keep going.</div></div>';

  h+='<div class="app-footer">Toastmasters Companion · v0.36 · Your progress saves locally on this device</div>';
  h+='</div>';
  app.innerHTML=h;

  // Interactions
  app.querySelectorAll("[data-level-toggle]").forEach(hdr=>{
    hdr.addEventListener("click",()=>{
      const card=hdr.parentElement;
      const willExpand=!card.classList.contains("expanded");
      // Accordion behavior: close all siblings when opening a new level
      if(willExpand){
        app.querySelectorAll(".level-card.expanded").forEach(c=>{
          if(c!==card)c.classList.remove("expanded");
        });
      }
      card.classList.toggle("expanded");
    });
  });
  // Level Info & Requirements toggle — independent, doesn't affect siblings
  app.querySelectorAll("[data-level-extras-toggle]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      btn.parentElement.classList.toggle("expanded");
    });
  });
  // Role-link taps inside Level Info & Requirements — navigate to role detail
  app.querySelectorAll(".level-extras [data-role-link]").forEach(link=>{
    link.addEventListener("click",e=>{
      e.stopPropagation();
      V.viewingRole=link.dataset.roleLink;
      V._roleReturnTo="browser";
      V.view="role";
      render();
    });
  });
  // Electives collapse/expand toggle
  app.querySelectorAll("[data-electives-toggle]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      btn.parentElement.classList.toggle("expanded");
    });
  });
  app.querySelectorAll(".project-check").forEach(check=>{
    check.addEventListener("click",e=>{
      e.stopPropagation();
      // Future-level checkboxes are locked — browsing allowed, ticking isn't.
      if(check.classList.contains("locked")){
        showToast("Finish earlier levels first","🔒");
        return;
      }
      const pid=check.dataset.pid;
      const wasNotDone=!S.done[pid];
      // Capture current level BEFORE mutating — so we can detect advancement
      const oldLevel=S.path?getCurrentLevel(S.path):0;
      if(S.done[pid]){delete S.done[pid];}else{S.done[pid]=true;}
      // Keep partsDone in sync when outer tick changes — ticking a multi-part
      // from the path browser implies all parts are done; unticking clears them.
      const proj=PD[pid];
      if(proj&&proj.parts){
        if(S.done[pid]){
          S.partsDone[pid]={};
          proj.parts.forEach((_,i)=>{S.partsDone[pid][i]=true;});
        }else{
          delete S.partsDone[pid];
        }
      }
      save();
      const newLevel=S.path?getCurrentLevel(S.path):0;
      const levelAdvanced=wasNotDone&&newLevel>oldLevel;
      // If level advanced, defer the title morph until after celebration modal
      updateCompletionUI(pid,{skipMorph:levelAdvanced});
      // Individual project ticks no longer show a celebration (too noisy).
      // But if this tick completed the last project in a level, celebrate the
      // LEVEL achievement and choreograph the scroll+morph reveal afterward.
      if(levelAdvanced){
        showCelebrateModal({
          kind:"level",
          levelNum:oldLevel, // the level that was just completed
          pathCode:S.path,
          onClose:()=>scrollTopThenMorph(newLevel)
        });
      }
    });
  });
  app.querySelectorAll(".project-main").forEach(main=>{
    main.addEventListener("click",()=>{
      const pid=main.dataset.pid;
      if(!pid)return;
      V.view="project";
      V.viewingProject=pid;
      render();
    });
  });
  // Delegated: submit-level AND undo-level
  app.addEventListener("click",e=>{
    const submitBtn=e.target.closest('[data-action="submit-level"]');
    const undoBtn=e.target.closest('[data-action="undo-level"]');
    if(submitBtn){
      const lv=parseInt(submitBtn.dataset.level,10);
      if(!lv||!S.path)return;
      // Auto-tick every project in this level. Marking a level complete
      // implies all its projects are done — the ticks are the receipt.
      // Multi-part projects: auto-tick all their sub-parts too.
      const g=gP(S.path,lv);
      [...g.r,...g.e].forEach(pid=>{
        S.done[pid]=true;
        const proj=PD[pid];
        if(proj&&proj.parts){
          S.partsDone[pid]={};
          proj.parts.forEach((_,i)=>{S.partsDone[pid][i]=true;});
        }
      });
      S.levelSubmitted[levelSubmittedKey(S.path,lv)]=true;
      save();
      // Defer morph until AFTER celebration modal dismisses + page scrolls
      updateCompletionUI(null,{skipMorph:true});
      const newLevel=getCurrentLevel(S.path);
      let allSubmitted=true;
      for(let i=1;i<=5;i++){
        if(!S.levelSubmitted[levelSubmittedKey(S.path,i)]){allSubmitted=false;break;}
      }
      showCelebrateModal({
        kind:"level",
        levelNum:lv,
        pathCode:S.path,
        onClose:()=>{
          scrollTopThenMorph(newLevel);
          // If path complete, chain the path celebration after the morph starts
          if(allSubmitted){
            setTimeout(()=>{
              showCelebrateModal({kind:"path",pathCode:S.path});
            },900);
          }
        }
      });
    }else if(undoBtn){
      const lv=parseInt(undoBtn.dataset.level,10);
      if(!lv||!S.path)return;
      // Undo: also untick every project in that level. Pair the ticks with
      // the submit state so the UI and data always agree. Multi-part: clear
      // their partsDone too.
      const g=gP(S.path,lv);
      [...g.r,...g.e].forEach(pid=>{
        delete S.done[pid];
        delete S.partsDone[pid];
      });
      delete S.levelSubmitted[levelSubmittedKey(S.path,lv)];
      save();
      // Undo keeps morph inline — no celebration to wait for
      updateCompletionUI(null);
      showToast("Level "+lv+" unmarked","↩️");
    }
  });
  const sb=app.querySelector('[data-action="switch-path"]');
  if(sb)sb.addEventListener("click",()=>{
    // Route to My Paths dashboard where user can see all enrolled paths,
    // switch between them, or add a new one. Much better than dumping
    // them into the picker unaware of their other enrolled paths.
    V.view="my-paths";
    V.pathDetailShown=null;
    V.viewingProject=null;
    V.viewingRole=null;
    render();
  });
  const rb=app.querySelector('[data-action="reset"]');
  if(rb)rb.addEventListener("click",()=>{
    if(!confirm("⚠️ Reset all progress on "+p.n+"? Completed projects will be unchecked. Cannot be undone."))return;
    S.done={};
    S.partsDone={};
    S.levelSubmitted={};
    save();
    render();
  });
  const dismissSetup=app.querySelector('[data-action="dismiss-setup"]');
  if(dismissSetup)dismissSetup.addEventListener("click",()=>{
    V._pathSetupMode=false;
    render();
  });
  const toPf=app.querySelector('[data-action="setup-to-pathfinder"]');
  if(toPf)toPf.addEventListener("click",()=>{
    V._pathSetupMode=false;
    V.view="pathfinder-intro";
    render();
  });
}

function renderProjectRow(pid,required,locked){
  const proj=PD[pid];
  if(!proj)return'<div class="project" data-pid="'+pid+'"><div class="project-row"><div class="project-check" data-pid="'+pid+'"></div><div class="project-main"><div class="project-title">⚠️ '+pid+' (missing data)</div></div></div></div>';
  const done=!!S.done[pid];

  let h='<div class="project'+(done?' done':'')+'" data-pid="'+pid+'">';
  h+='<div class="project-row">';
  const checkCls="project-check"+(done?" done":"")+(locked?" locked":"");
  h+='<div class="'+checkCls+'" data-pid="'+pid+'"'+(locked?' title="Complete earlier levels first"':'')+'></div>';
  h+='<div class="project-main" data-pid="'+pid+'">';
  h+='<div class="project-title-row">';
  h+='<div class="project-title">'+proj.t+'</div>';
  if(!required)h+='<div class="project-badge">Elective</div>';
  h+='</div>';
  h+='<div class="project-meta">'+proj.dur+' · '+proj.p+'</div>';
  h+='</div>';
  h+='<div class="project-chev">›</div>';
  h+='</div>';
  h+='</div>';
  return h;
}

// ═══════════════════════════════════════════════════════════════════════════
// PROJECT DETAIL — full-screen view matching your screenshot
// ═══════════════════════════════════════════════════════════════════════════

function renderProjectDetail(app,pid){
  const proj=PD[pid];
  if(!proj){V.view="browser";V.viewingProject=null;render();return;}
  const tip=TIPS[pid];
  const resources=RESOURCES[pid]||[];
  const done=!!S.done[pid];
  // In ala carte mode (S.mode="alacarte"), user may have no active path but
  // still browse projects. _apPathContext is a read-only fallback set when
  // entering via All Projects so we can compute level/elective metadata.
  const pathForContext=S.path||S._apPathContext||"PM";
  const pathName=PA[pathForContext]?PA[pathForContext].n:"path";
  const alacarteView=(S.mode==="alacarte"&&!S.path);

  // Is this project required or elective? Find level + type
  let isRequired=false,foundLevel=0;
  for(let lv=1;lv<=5;lv++){
    const g=gP(pathForContext,lv);
    if(g.r.includes(pid)){isRequired=true;foundLevel=lv;break;}
    if(g.e.includes(pid)){isRequired=false;foundLevel=lv;break;}
  }

  let h='<div class="fade-up">';
  h+='<div class="top-bar">';
  const pBack=V._projectReturnTo==="pathfinder"?"← Back to program":(V._projectReturnTo==="all-projects"?"← All projects":("← Back to "+pathName));
  h+='<button class="top-bar-btn" data-action="back">'+pBack+'</button>';
  h+='</div>';

  h+='<h1 class="pd-title">'+proj.t+'</h1>';
  h+='<div class="pd-meta">';
  h+='<div class="pd-duration">'+proj.dur+'</div>';
  if(foundLevel>0){
    h+='<div class="pd-badge'+(isRequired?' req':'')+'">'+(isRequired?'REQ':'ELECTIVE')+'</div>';
    h+='<div class="pd-badge">L'+foundLevel+'</div>';
  }
  if(proj.roleAs){h+='<div class="pd-badge">Role: '+proj.roleAs+'</div>';}
  h+='</div>';

  h+='<div class="pd-summary-block">';
  h+='<div class="pd-summary-row"><strong>Purpose:</strong> '+proj.p+'</div>';
  h+='<div class="pd-summary-row"><strong>Overview:</strong> '+proj.o+'</div>';
  h+='<div class="pd-summary-row"><strong>Includes:</strong> '+proj.inc+'</div>';
  h+='</div>';

  // ═══ Multi-part progress (always visible when project has parts) ═══
  // Users tick each part as they complete it; overall completion is derived.
  if(proj.parts&&proj.parts.length>0){
    const pState=S.partsDone[pid]||{};
    const doneCount=proj.parts.filter((_,i)=>pState[i]).length;
    h+='<div class="pd-parts">';
    h+='<div class="pd-parts-hdr">';
    h+='<div class="pd-parts-label">This project has '+proj.parts.length+' parts</div>';
    h+='<div class="pd-parts-progress">'+doneCount+'/'+proj.parts.length+' complete</div>';
    h+='</div>';
    proj.parts.forEach((part,idx)=>{
      const partDone=!!pState[idx];
      h+='<div class="pd-part'+(partDone?' done':'')+'" data-part-pid="'+pid+'" data-part-idx="'+idx+'">';
      h+='<div class="pd-part-check'+(partDone?' done':'')+'"></div>';
      h+='<div class="pd-part-text">';
      h+='<div class="pd-part-name">'+part.t+'</div>';
      h+='<div class="pd-part-dur">'+part.desc+'</div>';
      h+='</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  // (Mark-as-complete row removed in v0.17 — redundant with the outer
  // tickbox on the level card in the path browser.)

  // ═══ Sections ═══

  // FOCUS ON — scan all three tip sections for FRAMEWORKS names and wrap them
  // as tappable spans. Combine the found lists so the "Frameworks worth
  // knowing" section below can show a card for each one mentioned.
  if(tip){
    const scanFocus=scanFrameworks(tip.tip);
    const scanAvoid=scanFrameworks(tip.avoid);
    const scanHow=scanFrameworks(tip.how);
    h+=renderSection("focus","💡","Focus On",scanFocus.html);
    h+=renderSection("avoid","⚠️","Common Mistake",scanAvoid.html);
    h+=renderSection("how","🎯","How To Do It",scanHow.html);
    // Collect unique frameworks found across all 3 sections
    const allFwFound=[...new Set([...scanFocus.found,...scanAvoid.found,...scanHow.found])];
    if(allFwFound.length>0){
      h+='<div class="fw-section">';
      h+='<div class="fw-section-hdr">📚 Frameworks worth knowing</div>';
      h+='<div class="fw-section-hint">Tap any framework to learn how to actually use it.</div>';
      allFwFound.forEach(key=>{
        const fw=FRAMEWORKS[key];
        if(!fw)return;
        h+='<div class="fw-card" data-fw-card="'+key+'">';
        h+='<div class="fw-card-hdr" data-fw-toggle="'+key+'">';
        h+='<div class="fw-card-title">'+fw.title+'</div>';
        h+='<div class="fw-card-chev">▼</div>';
        h+='</div>';
        h+='<div class="fw-card-body">';
        h+='<div class="fw-card-summary">'+fw.summary+'</div>';
        h+='<div class="fw-card-text">'+fw.body+'</div>';
        h+='</div>';
        h+='</div>';
      });
      h+='</div>';
    }
  }

  // MY NOTES & PHOTOS
  h+='<div class="pd-section notes" data-section="notes">';
  h+='<div class="pd-section-hdr" data-section-toggle="notes">';
  h+='<div class="pd-section-label"><span>📝</span>My Notes & Photos</div>';
  h+='<div class="pd-section-chev">▼</div>';
  h+='</div>';
  h+='<div class="pd-section-body"><div class="pd-section-body-inner">';
  const noteVal=(S.notes[pid]||"").replace(/</g,"&lt;").replace(/"/g,"&quot;");
  h+='<textarea class="notes-textarea" data-notes-pid="'+pid+'" placeholder="Jot notes, speech outlines, key phrases, or reflections after delivery…">'+noteVal+'</textarea>';
  h+='<div class="notes-saved-hint">Saves automatically as you type.</div>';
  h+=renderPhotosBlock(pid);
  h+='</div></div>';
  h+='</div>';

  // HELPFUL LINKS & RESOURCES
  h+='<div class="pd-section resources" data-section="resources">';
  h+='<div class="pd-section-hdr" data-section-toggle="resources">';
  h+='<div class="pd-section-label"><span>📚</span>Helpful Links & Resources</div>';
  h+='<div class="pd-section-chev">▼</div>';
  h+='</div>';
  h+='<div class="pd-section-body"><div class="pd-section-body-inner">';
  if(resources.length){
    resources.forEach(r=>{
      h+='<a class="resource-link" href="'+r.u+'" target="_blank" rel="noopener">';
      h+='<span class="resource-link-icon">🔗</span>';
      h+='<span class="resource-link-title">'+r.t+'</span>';
      h+='<span class="resource-link-arrow">↗</span>';
      h+='</a>';
    });
  }else{
    h+='<div class="resource-empty">No curated links yet for this project — we\'ll add more over time.</div>';
  }
  // Always include official TI evaluation forms
  h+='<a class="resource-link" href="'+EVAL_URL+'" target="_blank" rel="noopener">';
  h+='<span class="resource-link-icon">📄</span>';
  h+='<span class="resource-link-title">Official Toastmasters evaluation forms</span>';
  h+='<span class="resource-link-arrow">↗</span>';
  h+='</a>';
  h+='</div></div>';
  h+='</div>';

  h+='<div class="app-footer">Progress saved on this device · Tap ← to return</div>';
  h+='</div>';
  app.innerHTML=h;

  // Interactions
  app.querySelector('[data-action="back"]').addEventListener("click",()=>{
    const returnTo=V._projectReturnTo;
    V.viewingProject=null;
    V._projectReturnTo=null;
    // Clear the temporary path context used by ala carte project viewing
    if(S._apPathContext)delete S._apPathContext;
    if(returnTo==="pathfinder"){V.view="pathfinder-program";}
    else if(returnTo==="all-projects"){V.view="all-projects";}
    else{V.view="browser";}
    render();
  });
  // toggle-done button was removed in v0.17 — the outer tickbox on the
  // level card handles this. Guard in case the row ever reappears.
  const toggleBtn=app.querySelector('[data-action="toggle-done"]');
  if(toggleBtn)toggleBtn.addEventListener("click",e=>{
    if(S.done[pid]){delete S.done[pid];}else{S.done[pid]=true;}
    save();
    const done=!!S.done[pid];
    const row=e.currentTarget;
    row.classList.toggle("done",done);
    const lab=row.querySelector(".pd-check-label");
    if(lab)lab.textContent=done?"Marked complete":"Mark as complete";
  });
  // Multi-part ticks — tap any part row to toggle; derive S.done when all parts done
  app.querySelectorAll("[data-part-pid]").forEach(row=>{
    row.addEventListener("click",e=>{
      e.stopPropagation();
      const partPid=row.dataset.partPid;
      const idx=parseInt(row.dataset.partIdx,10);
      if(!S.partsDone[partPid])S.partsDone[partPid]={};
      S.partsDone[partPid][idx]=!S.partsDone[partPid][idx];
      // Derive overall completion: all parts ticked → project done
      const proj=PD[partPid];
      if(proj&&proj.parts){
        const allDone=proj.parts.every((_,i)=>S.partsDone[partPid][i]);
        if(allDone){S.done[partPid]=true;}
        else{delete S.done[partPid];}
      }
      save();
      // Visual toggle in place (avoid full rerender so scroll position holds)
      const done=!!S.partsDone[partPid][idx];
      row.classList.toggle("done",done);
      const check=row.querySelector(".pd-part-check");
      if(check)check.classList.toggle("done",done);
      // Update the X/N counter

// PHOTO UPLOAD — resize via canvas then base64 into S.photos
// ═══════════════════════════════════════════════════════════════════════════

function handlePhotoUpload(pid,file){
  if(!file.type.startsWith("image/")){alert("Please pick an image file.");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const canvas=document.createElement("canvas");
        const MAX=1200;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){
          if(w>h){h=Math.round(h*MAX/w);w=MAX;}
          else{w=Math.round(w*MAX/h);h=MAX;}
        }
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL("image/jpeg",0.8);
        if(!S.photos[pid])S.photos[pid]=[];
        S.photos[pid].push(dataUrl);
        if(!save()){
          S.photos[pid].pop();
          if(S.photos[pid].length===0)delete S.photos[pid];
          alert("Couldn't save photo — local storage is full. Try deleting older photos first.");
        }
        render();
      }catch(err){
        console.error(err);
        alert("Couldn't process that image. Try a different one?");
      }
    };
    img.onerror=()=>alert("Couldn't load that image.");
    img.src=e.target.result;
  };
  reader.onerror=()=>alert("Couldn't read that file.");
  reader.readAsDataURL(file);
}

// TARGETED COMPLETION UI UPDATE — surgical DOM updates when a checkbox is
// toggled. Avoids full re-render flicker and scroll-to-top jump. Runs only
// inside the path browser context; safe to call when summary/levels exist.
// ═══════════════════════════════════════════════════════════════════════════

function getCurrentLevel(pathCode){
  // First level that isn't fully done. If all done, returns 5.
  for(let lv=1;lv<=5;lv++){
    const g=gP(pathCode,lv);
    const reqDone=g.r.filter(p=>S.done[p]).length;
    const eDone=Math.min(g.en,g.e.filter(p=>S.done[p]).length);
    if((reqDone+eDone)<(g.r.length+g.en))return lv;
  }
  return 5;
}

function isLevelComplete(pathCode,lv){
  const g=gP(pathCode,lv);
  const reqDone=g.r.filter(p=>S.done[p]).length;
  const eDone=Math.min(g.en,g.e.filter(p=>S.done[p]).length);
  return(reqDone+eDone)>=(g.r.length+g.en)&&(g.r.length+g.en)>0;
}

function levelSubmittedKey(pathCode,lv){return pathCode+"-"+lv;}

// Parse [id|label] markers in role text and emit clickable role links.
// Role IDs that exist in ROLES get wrapped with <a data-role-link="id">;
// unknown IDs fall back to just the label (still readable). Called by the
// level accordion and the level-complete celebration modal.
function renderRoleMarkers(text){
  if(!text)return"";
  return text.replace(/\[([a-z]+)\|([^\]]+)\]/g,function(match,id,label){
    const role=ROLES.find(r=>r.id===id);
    if(role){
      return'<a class="role-link" data-role-link="'+id+'">'+label+'</a>';
    }
    return label;
  });
}

// Scan a block of tip HTML for known FRAMEWORKS names and wrap each with a
// tappable span. Case-insensitive, longest-first to avoid partial matches
// (e.g. "GROW" inside "GROW Model"). Each match becomes
// <span class="fw-link" data-fw="key">LABEL</span> which expands an inline
// card when tapped.
function scanFrameworks(html){
  if(!html)return{html:html,found:[]};
  const found=new Set();
  // Sort keys longest first so "monroe's motivated sequence" wins over "monroe"
  const keys=Object.keys(FRAMEWORKS).sort((a,b)=>b.length-a.length);
  for(const key of keys){
    // Build a case-insensitive regex that matches whole-word equivalents.
    // Escape regex special chars in the key (→, ., apostrophes, commas).
    const escaped=key.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    // Allow punctuation/space variations between tokens in the original text
    const re=new RegExp("("+escaped+")","gi");
    html=html.replace(re,function(match,capture){
      // Don't wrap if we're already inside a tag or already-wrapped span
      found.add(key);
      return'<span class="fw-link" data-fw="'+key+'">'+capture+'</span>';
    });
  }
  return{html:html,found:[...found]};
}

// Find the next actionable project: first unchecked required on the current
// level, then first unchecked elective. Returns null if nothing is pending.
function findNextProject(pathCode,lv){
  const g=gP(pathCode,lv);
  for(const pid of g.r){if(!S.done[pid])return pid;}
  for(const pid of g.e){if(!S.done[pid])return pid;}
  return null;
}

// Standalone morph animation for the "Level X of 5" title. Extracted so the
// level-complete celebration flow can trigger the morph AFTER the modal
// closes + after a smooth scroll-to-top — otherwise the morph plays behind
// the modal and the user never sees it.
function morphLevelTitle(targetLevel){
  const accentEl=document.querySelector(".path-scope .title .accent");
  if(!accentEl)return;
  const newText=Math.min(5,targetLevel)+" of 5";
  if(accentEl.textContent.trim()===newText)return; // already at target
  accentEl.classList.remove("morphing-in","morphing-out");
  // Force reflow so re-added classes restart the animation cleanly
  void accentEl.offsetWidth;
  accentEl.classList.add("morphing-out");
  setTimeout(()=>{
    accentEl.textContent=newText;
    accentEl.classList.remove("morphing-out");
    accentEl.classList.add("morphing-in");
    setTimeout(()=>accentEl.classList.remove("morphing-in"),870);
  },380);
}

// Choreographed level-advance reveal: smooth-scroll to the very top of the
// page, then — once the scroll lands — morph the level title. Called when
// the level celebration modal dismisses, so the user SEES the morph instead
// of it happening behind the modal while they're scrolled to the bottom.
function scrollTopThenMorph(newLevel){
  const startY=window.scrollY||window.pageYOffset||0;
  // If we're already at the top, morph immediately — no scroll choreography
  if(startY<40){
    morphLevelTitle(newLevel);
    return;
  }
  // Use native smooth scroll. Most browsers finish in ~400–700ms depending
  // on distance. We wait a conservative fixed delay, then fire the morph.
  try{window.scrollTo({top:0,behavior:"smooth"});}
  catch(e){window.scrollTo(0,0);}
  // Dynamic delay scales loosely with distance (farther = longer scroll)
  const delay=Math.min(700,Math.max(350,Math.round(startY*0.6)));
  setTimeout(()=>morphLevelTitle(newLevel),delay);
}

function updateCompletionUI(changedPid,opts){
  opts=opts||{};
  if(!S.path)return;

  // Re-sync every project checkbox against authoritative S.done state. This
  // covers both per-project ticks AND bulk changes (mark level complete /
  // undo both auto-toggle all projects in the level, so we can't assume one
  // pid changed).
  document.querySelectorAll('.project-check[data-pid]').forEach(c=>{
    const pid=c.dataset.pid;
    const done=!!S.done[pid];
    c.classList.toggle("done",done);
  });
  document.querySelectorAll('.project[data-pid]').forEach(row=>{
    const pid=row.dataset.pid;
    const done=!!S.done[pid];
    row.classList.toggle("done",done);
  });

  // Recompute level + total progress from authoritative S.done state
  const currentLv=getCurrentLevel(S.path);
  let totalReq=0,totalDone=0;
  for(let lv=1;lv<=5;lv++){
    const g=gP(S.path,lv);
    const reqDone=g.r.filter(p=>S.done[p]).length;
    const eDone=Math.min(g.en,g.e.filter(p=>S.done[p]).length);
    const levelDone=reqDone+eDone;
    const levelTotal=g.r.length+g.en;
    const complete=levelDone>=levelTotal&&levelTotal>0;
    const submitted=!!S.levelSubmitted[levelSubmittedKey(S.path,lv)];
    totalReq+=levelTotal;
    totalDone+=levelDone;

    const card=document.querySelector('.level-card[data-level="'+lv+'"]');
    if(card){
      card.classList.toggle("complete",submitted);
      // Active/future styling for focus
      card.classList.toggle("is-active",lv===currentLv&&!submitted);
      card.classList.toggle("is-future",lv>currentLv&&!submitted);
      const progEl=card.querySelector(".level-progress");
      if(progEl){
        progEl.classList.toggle("complete",submitted);
        progEl.textContent=levelDone+" / "+levelTotal+(submitted?" ✓ marked complete":(complete?" · ready to mark complete":""));
      }
      // Swap the level submit area: shows the "Mark Level Complete" button
      // or the "submitted" badge depending on state.
      const submitHost=card.querySelector(".level-submit-wrap");
      if(submitHost){
        submitHost.innerHTML=renderLevelSubmitHtml(lv,complete,submitted);
      }
    }
  }

  const pct=totalReq>0?Math.round(totalDone/totalReq*100):0;

  // Morph the "Level X of 5" title when current level changes (level complete
  // or undo). Old digit fades up-and-out, new digit zooms in with path glow.
  // Caller can pass {skipMorph:true} to defer the morph — used by the level
  // celebration flow so the morph is CHOREOGRAPHED after the modal closes
  // rather than playing behind the modal where it can't be seen.
  if(!opts.skipMorph){
    morphLevelTitle(currentLv);
  }

  // Update new progress bar
  const bar=document.querySelector(".path-progress-hero-fill");
  if(bar)bar.style.width=pct+"%";
  const pctEl=document.querySelector(".path-progress-hero-pct");
  if(pctEl)pctEl.textContent=pct+"%";
  const titleEl=document.querySelector(".path-progress-hero-title");
  if(titleEl)titleEl.textContent=totalDone+" of "+totalReq+" projects";
  const subEl=document.querySelector(".path-progress-hero-sub");
  if(subEl)subEl.textContent="· "+pct+"% through the path";

  // Show/hide the path-complete banner in place
  const banner=document.querySelector(".path-complete-banner");
  if(banner)banner.classList.toggle("hidden",pct<100);
}

function renderLevelSubmitHtml(lv,allChecked,submitted){
  if(submitted){
    return'<div class="level-completed-row">'+
      '<div class="level-completed-badge">✓ Level '+lv+' marked complete</div>'+
      '<button class="level-undo-btn" data-action="undo-level" data-level="'+lv+'">Undo</button>'+
      '</div>';
  }
  // Gate: you can't mark Level N complete unless Levels 1..N-1 are all submitted.
  // This matches how Toastmasters levels work IRL — VPE approves sequentially.
  let priorBlocked=false;
  for(let i=1;i<lv;i++){
    if(!S.levelSubmitted[levelSubmittedKey(S.path,i)]){priorBlocked=true;break;}
  }
  if(priorBlocked){
    return'<button class="level-submit-btn locked" disabled>🔒 Finish earlier levels first</button>'+
      '<div class="level-submit-btn-subtle">Mark Level '+(lv-1)+' complete before unlocking Level '+lv+'.</div>';
  }
  // Always show the button — active styling only when all boxes ticked,
  // muted styling otherwise (still tappable — user's judgment)
  if(allChecked){
    return'<button class="level-submit-btn" data-action="submit-level" data-level="'+lv+'">✓ Mark Level '+lv+' Complete →</button>';
  }
  return'<button class="level-submit-btn muted" data-action="submit-level" data-level="'+lv+'">Mark Level '+lv+' Complete</button>'+
    '<div class="level-submit-btn-subtle">You can mark it complete whenever you like — unchecked projects stay as a reminder.</div>';
}

function showToast(msg,icon){
  const root=document.getElementById("toast-root");

  const el=document.createElement("div");
  el.className="toast";
  el.innerHTML='<span class="toast-icon">'+(icon||"✓")+'</span><span>'+msg+'</span>';

  setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},2800);
}

function showCelebrateModal({kind,levelNum,pathCode,projectTitle,onClose}){
  const root=document.getElementById("celebrate-root");

  const p=pathCode?PA[pathCode]:(S.path?PA[S.path]:null);

  }else if(kind==="level"){

    // presentations TI requires for this level. Pull from LEVEL_EXTRAS so the
    // reminder is always accurate and never drifts out of sync with the
    // accordion inside the path browser.
    let reminderHtml="";
    const extras=levelNum&&LEVEL_EXTRAS[levelNum];
    if(extras&&(extras.roles||extras.edu)){
      reminderHtml='<div class="celebrate-reminder">';
      reminderHtml+='<div class="celebrate-reminder-title">Also needed for Level '+levelNum+'</div>';
      if(extras.roles){
        reminderHtml+='<div class="celebrate-reminder-item"><span class="celebrate-reminder-kicker">📌 Meeting roles</span><div>'+renderRoleMarkers(extras.roles)+'</div></div>';
      }

      }
      reminderHtml+='</div>';
    }
    body=(p?"Level "+levelNum+" of "+p.n+" is done. This is real, measurable progress.":"Level "+levelNum+" complete.")+reminderHtml;
    cta="Continue →";
    sizeCls="";
    confettiCount=60;
  }else if(kind==="path"){
    burst="🏆";
    kicker=p?p.n+" complete":"Path complete";
    title="Incredible.";
    body=p?"You've completed every level of "+p.n+". Next stop: DTM. Your capstone was the finale — everything from here is whatever you make of it.":"Path complete. Next stop: DTM.";
    cta="Keep going →";
    sizeCls="size-lg";
    confettiCount=120;
  }

  // Build confetti HTML — colorful pieces scattered across the top, falling.
  // Mix of accent colors + the path's color so it feels celebratory but
  // on-brand. Random left offsets, delays, rotations.
  const confettiColors=["#E85D5D","#D4A94C","#5EB975","#5B9DD9","#A07BC7","#DB8A6A",pc];
  let confettiHtml='<div class="confetti-host">';
  for(let i=0;i<confettiCount;i++){
    const color=confettiColors[Math.floor(Math.random()*confettiColors.length)];
    const left=Math.random()*100;
    const delay=Math.random()*0.4;
    const duration=2.0+Math.random()*1.5;
    const rotateStart=Math.random()*360;
    const w=6+Math.random()*8;
    const h=10+Math.random()*8;
    confettiHtml+='<div class="confetti-piece" style="left:'+left+'%;background:'+color+';width:'+w+'px;height:'+h+'px;animation-delay:'+delay+'s;animation-duration:'+duration+'s;transform:rotate('+rotateStart+'deg)"></div>';
  }
  confettiHtml+='</div>';

  let h='<div class="celebrate-backdrop" data-close="1">';
  h+=confettiHtml;
  h+='<div class="celebrate-modal '+sizeCls+'" data-stop="1" style="--pc:'+pc+'">';
  h+='<div class="celebrate-burst">'+burst+'</div>';
  h+='<div class="celebrate-kicker">'+kicker+'</div>';
  h+='<h2 class="celebrate-title">'+title+'</h2>';
  h+='<div class="celebrate-body">'+body+'</div>';
  h+='<button class="celebrate-cta" data-action="celebrate-close">'+cta+'</button>';
  h+='</div>';
  h+='</div>';
  root.innerHTML=h;

  // Single close path — wire once, used by backdrop tap, CTA click, auto-dismiss
  let closed=false;
  const close=()=>{
    if(closed)return;
    closed=true;
    root.innerHTML="";
    if(typeof onClose==="function"){
      // Defer one tick so the DOM has released the modal before the caller
      // starts its own animations (e.g. scroll + morph)
      setTimeout(onClose,10);
    }
  };
  root.querySelector(".celebrate-backdrop").addEventListener("click",e=>{
    if(e.target.dataset.close==="1")close();
  });
  root.querySelector('[data-action="celebrate-close"]').addEventListener("click",close);
  // Role-link taps inside the "Before moving on" reminder — close modal first,
  // then navigate. Use onClose hook to pass the role target through.
  root.querySelectorAll("[data-role-link]").forEach(link=>{
    link.addEventListener("click",e=>{
      e.stopPropagation();
      const roleId=link.dataset.roleLink;
      // Close with no onClose fire (we override here), then navigate directly
      closed=true;
      root.innerHTML="";
      V.viewingRole=roleId;
      V._roleReturnTo="browser";
      V.view="role";
      render();
    });
  });

  // Auto-dismiss small project celebration (still shows the confetti burst).
  if(kind==="project"){
    setTimeout(close,2000);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// PRACTICE STUDIO — Speech Timer (fully offline, Toastmasters-standard timing)
// Runtime state only — T is not persisted. Timer resets on refresh by design.
// ═══════════════════════════════════════════════════════════════════════════

let T={
  preset:null,       // currently selected TIMER_PRESETS entry
  elapsed:0,         // seconds elapsed
  running:false,
  _startedAt:null,   // wall-clock ms when current run started
  _pausedAt:0,       // accumulated seconds before current run
  _interval:null,    // setInterval handle
  _wakeLock:null,    // Wake Lock API sentinel
  returnTo:"practice" // view to go back to when exiting timer — "practice" | "topics-practice"
};

function getTimerPhase(elapsed,preset){
  if(!preset)return"neutral";
  if(elapsed>=preset.bell)return"bell";
  if(elapsed>=preset.red)return"red";
  if(elapsed>=preset.yellow)return"yellow";
  if(elapsed>=preset.green)return"green";
  return"neutral";
}

function fmtTime(sec){
  const m=Math.floor(sec/60);
  const s=Math.floor(sec%60);
  return m+":"+(s<10?"0":"")+s;
}

function phaseMain(phase){
  if(phase==="neutral")return"Warming up";
  if(phase==="green")return"Green";
  if(phase==="yellow")return"Yellow";
  if(phase==="red")return"Red";
  if(phase==="bell")return"🔔 Bell · Overtime";
  return"";
}

function phaseSub(phase,preset){
  if(!preset)return"";
  if(phase==="neutral")return"Green at "+fmtTime(preset.green);
  if(phase==="green")return"Yellow at "+fmtTime(preset.yellow);
  if(phase==="yellow")return"Wrap it up — red at "+fmtTime(preset.red);
  if(phase==="red")return"Finish now — bell at "+fmtTime(preset.bell);
  if(phase==="bell")return"You're over. Sit down.";
  return"";
}

async function requestWakeLock(){
  try{
    if("wakeLock" in navigator){
      T._wakeLock=await navigator.wakeLock.request("screen");
    }
  }catch(e){/* not fatal; screen may dim but timer still works */}
}

function releaseWakeLock(){
  if(T._wakeLock){
    try{T._wakeLock.release();}catch(e){}
    T._wakeLock=null;
  }
}

function startTimer(){
  if(T.running||!T.preset)return;
  T.running=true;
  T._startedAt=Date.now();
  T._interval=setInterval(()=>{
    T.elapsed=T._pausedAt+(Date.now()-T._startedAt)/1000;
    updateTimerDisplay();
  },100);
  requestWakeLock();
}

function pauseTimer(){
  if(!T.running)return;
  T.running=false;
  T._pausedAt=T.elapsed;
  if(T._interval){clearInterval(T._interval);T._interval=null;}
  releaseWakeLock();
}

function resetTimer(){
  pauseTimer();
  T.elapsed=0;
  T._pausedAt=0;
  T._startedAt=null;
}

// Targeted DOM updates — same pattern as the completion UI, no full re-render.
function updateTimerDisplay(){
  const timeEl=document.getElementById("timer-time");
  if(timeEl)timeEl.textContent=fmtTime(T.elapsed);

  const screen=document.getElementById("timer-screen");
  if(screen&&T.preset){
    const phase=getTimerPhase(T.elapsed,T.preset);
    const cls="timer-screen phase-"+phase;
    if(screen.className!==cls)screen.className=cls;

    const pEl=document.getElementById("timer-phase-main");
    if(pEl)pEl.textContent=phaseMain(phase);
    const sEl=document.getElementById("timer-phase-sub");
    if(sEl)sEl.textContent=phaseSub(phase,T.preset);

    // Progress strip: fill up to bell, capped at 100%
    const fill=document.getElementById("timer-marker-fill");
    if(fill){
      const pct=Math.min(100,(T.elapsed/T.preset.bell)*100);
      fill.style.width=pct+"%";
    }
  }

  const btn=document.getElementById("timer-toggle");
  if(btn)btn.textContent=T.running?"⏸":"▶";
}

// ───── Render: Timer (preset pills at top + single unified screen) ─────
function renderTimerFullScreen(app){
  if(!T.preset)T.preset=TIMER_PRESETS[0]; // default: Prepared Speech
  const phase=getTimerPhase(T.elapsed,T.preset);
  // Determine where Close returns. `T.returnTo` set by caller (topics-practice
  // or practice-hub). Pathfinder links set V._practiceReturnTo in shared state.
  let returnView="practice";
  if(V._practiceReturnTo==="pathfinder"){returnView="pathfinder-program";}
  else if(T.returnTo==="topics-practice"){returnView="topics-practice";}

  let h='<div class="fade-up">';
  h+='<div class="top-bar" style="justify-content:flex-end">';
  h+='<button class="top-bar-btn" data-action="exit-timer">✕ Close</button>';
  h+='</div>';

  // ═ Preset pills row — active pill has green ring matching reference image ═
  h+='<div class="kicker" style="margin-bottom:8px">Speech Type</div>';
  h+='<div class="timer-pills">';
  TIMER_PRESETS.forEach(p=>{
    const isActive=T.preset.id===p.id;
    h+='<button class="timer-pill'+(isActive?" active":"")+'" data-preset="'+p.id+'">'+p.label+'</button>';
  });
  h+='</div>';

  // ═ Main timer card ═
  h+='<div class="timer-screen phase-'+phase+'" id="timer-screen">';
  h+='<div class="timer-display-wrap">';
  h+='<div class="timer-preset-label">'+T.preset.label+'</div>';
  h+='<div class="timer-time" id="timer-time">'+fmtTime(T.elapsed)+'</div>';
  h+='<div class="timer-phase-sub" id="timer-phase-sub">'+phaseSub(phase,T.preset)+'</div>';
  h+='</div>';

  // Color markers row — ●●●🔔 with active phase highlighted
  h+='<div class="timer-markers">';
  h+='<div class="timer-marker'+(phase==="green"||phase==="yellow"||phase==="red"||phase==="overtime"?" active green":"")+'" title="Green at '+fmtTime(T.preset.green)+'"></div>';
  h+='<div class="timer-marker'+(phase==="yellow"||phase==="red"||phase==="overtime"?" active yellow":"")+'" title="Yellow at '+fmtTime(T.preset.yellow)+'"></div>';
  h+='<div class="timer-marker'+(phase==="red"||phase==="overtime"?" active red":"")+'" title="Red at '+fmtTime(T.preset.red)+'"></div>';
  h+='<div class="timer-marker bell'+(phase==="overtime"?" active":"")+'" title="Bell at '+fmtTime(T.preset.bell)+'">🔔</div>';
  h+='</div>';

  h+='<div class="timer-controls">';
  h+='<button class="timer-btn-main" data-action="toggle-timer" id="timer-toggle">'+(T.running?"⏸":"▶")+'</button>';
  h+='<button class="timer-btn-reset" data-action="reset-timer">↺</button>';
  h+='</div>';

  // Custom config (only shown when Custom preset active)
  if(T.preset.isCustom){
    h+='<div class="timer-custom">';
    h+='<div class="timer-custom-title">Custom marks</div>';
    h+='<div class="timer-custom-row">';
    h+='<label>🟢 Green <input type="number" min="1" data-mark="green" value="'+Math.round(T.preset.green)+'" />s</label>';
    h+='<label>🟡 Yellow <input type="number" min="1" data-mark="yellow" value="'+Math.round(T.preset.yellow)+'" />s</label>';
    h+='<label>🔴 Red <input type="number" min="1" data-mark="red" value="'+Math.round(T.preset.red)+'" />s</label>';
    h+='<label>🔔 Bell <input type="number" min="1" data-mark="bell" value="'+Math.round(T.preset.bell)+'" />s</label>';
    h+='</div>';
    h+='</div>';
  }

  h+='</div>';
  h+='</div>';
  app.innerHTML=h;

  app.querySelector('[data-action="exit-timer"]').addEventListener("click",()=>{
    pauseTimer();
    V._practiceReturnTo=null;
    V.view=returnView;
    render();
  });
  app.querySelector('[data-action="toggle-timer"]').addEventListener("click",()=>{
    if(T.running)pauseTimer();else startTimer();
    updateTimerDisplay();
    // Swap play/pause glyph without full rerender
    const btn=document.getElementById("timer-toggle");
    if(btn)btn.textContent=T.running?"⏸":"▶";
  });
  app.querySelector('[data-action="reset-timer"]').addEventListener("click",()=>{
    resetTimer();
    updateTimerDisplay();
    const btn=document.getElementById("timer-toggle");
    if(btn)btn.textContent="▶";
  });
  // Pill click — switch preset WITHOUT a full re-render to avoid the flicker
  // that comes from tearing down and rebuilding the timer DOM. Only force a
  // full rerender when toggling in/out of Custom (which shows/hides the
  // custom marks form).
  app.querySelectorAll("[data-preset]").forEach(el=>{
    el.addEventListener("click",()=>{
      const preset=TIMER_PRESETS.find(x=>x.id===el.dataset.preset);
      if(!preset)return;
      const wasCustom=!!T.preset&&!!T.preset.isCustom;
      const willBeCustom=!!preset.isCustom;
      pauseTimer();
      // Clone the preset so edits to Custom don't mutate the shared TIMER_PRESETS
      T.preset=willBeCustom?Object.assign({},preset):preset;
      T.elapsed=0;
      T._pausedAt=0;
      T.running=false;
      // If we crossed the Custom boundary, we need the inputs to appear/disappear → full render
      if(wasCustom!==willBeCustom){
        render();
        return;
      }
      // In-place updates: pill active state, preset label, time, phase text, markers
      app.querySelectorAll(".timer-pill").forEach(p=>p.classList.remove("active"));
      el.classList.add("active");
      const labelEl=app.querySelector(".timer-preset-label");
      if(labelEl)labelEl.textContent=T.preset.label;
      const toggleBtn=document.getElementById("timer-toggle");
      if(toggleBtn)toggleBtn.textContent="▶";
      updateTimerDisplay();
    });
  });
  // Custom marks inputs — update T.preset directly; debounce validate on blur
  app.querySelectorAll("[data-mark]").forEach(inp=>{
    inp.addEventListener("change",()=>{
      const v=Math.max(1,parseInt(inp.value,10)||0);
      T.preset[inp.dataset.mark]=v;
      inp.value=v;
      updateTimerDisplay();
    });
  });
}

// ═══ TT inline count-UP timer (runtime only) ═══
// Counts forward from 0:00. Phase markers: green 1:00 · yellow 1:30 ·
// red 2:00 · siren flash + bell at 2:30. Table Topics target is ~2 min,
// with a 30s overtime buffer. Updates display in place, no re-render.
let _ttInline={elapsed:0,running:false,_iv:null,_bellPlayed:false};
function _ttInlinePhase(sec){
  if(sec>=150)return"siren";
  if(sec>=120)return"red";
  if(sec>=90)return"yellow";
  if(sec>=60)return"green";
  return"neutral";
}
function _ttInlineApplyPhase(){
  const wrap=document.getElementById("tt-inline-timer");
  if(!wrap)return;
  const phase=_ttInlinePhase(_ttInline.elapsed);
  wrap.classList.remove("phase-neutral","phase-green","phase-yellow","phase-red","phase-siren");
  wrap.classList.add("phase-"+phase);
  // Highlight active phase dots (cumulative — once you pass green, it stays lit)
  const dots=wrap.querySelectorAll(".tt-phase-dot");
  if(dots.length>=4){
    dots[0].classList.toggle("active",_ttInline.elapsed>=60);
    dots[1].classList.toggle("active",_ttInline.elapsed>=90);
    dots[2].classList.toggle("active",_ttInline.elapsed>=120);
    dots[3].classList.toggle("active",_ttInline.elapsed>=150);
  }
  // Bell sound at 2:30 crossover (only once per session)
  if(_ttInline.elapsed>=150&&!_ttInline._bellPlayed){
    _ttInline._bellPlayed=true;
    _ttPlayBell();
  }
}
function _ttPlayBell(){
  // Brief bell chime via WebAudio — no external asset needed
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    const ac=new Ctx();
    const o=ac.createOscillator();const g=ac.createGain();
    o.type="sine";o.frequency.value=880;
    g.gain.setValueAtTime(0.0001,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.25,ac.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+0.8);
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+0.85);
  }catch(e){}
}
function _ttInlineReset(){
  _ttInlineStop();
  _ttInline.elapsed=0;
  _ttInline._bellPlayed=false;
  const disp=document.getElementById("tt-timer-display");
  if(disp)disp.textContent="0:00";
  const btn=document.getElementById("tt-timer-toggle");
  if(btn)btn.textContent="▶";
  _ttInlineApplyPhase();
}
function _ttInlineStart(){
  if(_ttInline.running)return;
  _ttInline.running=true;
  const btn=document.getElementById("tt-timer-toggle");
  if(btn)btn.textContent="⏸";
  _ttInline._iv=setInterval(()=>{
    _ttInline.elapsed++;
    const disp=document.getElementById("tt-timer-display");
    if(disp)disp.textContent=_fmtTTTime(_ttInline.elapsed);
    _ttInlineApplyPhase();
    // Safety stop at 5:00 to avoid runaway timers
    if(_ttInline.elapsed>=300)_ttInlineStop();
  },1000);
}
function _ttInlineStop(){
  _ttInline.running=false;
  if(_ttInline._iv){clearInterval(_ttInline._iv);_ttInline._iv=null;}
  const btn=document.getElementById("tt-timer-toggle");
  if(btn)btn.textContent="▶";
}
function _fmtTTTime(s){
  const m=Math.floor(s/60);const sec=s%60;
  return m+":"+(sec<10?"0":"")+sec;
}

// ═══════════════════════════════════════════════════════════════════════════
// FILLER DETECTOR — Web Speech API, fully offline, no backend required.
// Listens to the user, identifies filler words in real time, produces a
// detailed report specific to which fillers they actually used.
// Following the Ah-Counter principle from the old club app: "Be SPECIFIC.
// There's no such thing as 'ah words.' Name the actual filler."
// ═══════════════════════════════════════════════════════════════════════════

// Single-word fillers — whole-word match, case-insensitive
const FILLER_SINGLE=["um","uh","er","ah","hmm","mm","like","so","basically","actually","literally","well","okay","right"];
// Multi-word phrases — substring match
const FILLER_PHRASE=["you know","sort of","kind of","i mean"];
// Union for highlighting & display
const ALL_FILLERS=[...FILLER_SINGLE,...FILLER_PHRASE];

let FD={
  phase:"idle",       // "idle" | "active" | "report" | "unsupported"
  recognition:null,
  transcript:"",      // finalised text accumulated across the session
  interimText:"",     // current interim chunk from recognition
  fillerCounts:{},    // { um:3, "you know":2 }
  totalWords:0,
  startedAt:null,     // ms wall-clock
  elapsedMs:0,        // frozen at stop time
  _uiInterval:null,   // interval that refreshes the timer display
  _shouldReconnect:false
};

function isSpeechRecognitionSupported(){
  return"SpeechRecognition"in window||"webkitSpeechRecognition"in window;
}

function fmtMs(ms){
  const s=Math.floor(ms/1000);
  const m=Math.floor(s/60);
  const rem=s%60;
  return m+":"+(rem<10?"0":"")+rem;
}

async function fdStart(){
  if(!isSpeechRecognitionSupported()){
    FD.phase="unsupported";
    render();
    return;
  }

  // Pre-flight: explicitly request mic permission via getUserMedia. On many
  // browsers this is more reliable than letting SpeechRecognition prompt —
  // and we immediately release the stream since recognition opens its own.
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>t.stop());
  }catch(e){
    console.warn("mic permission denied",e);
    alert("Microphone access was denied. Enable mic permission in your browser settings and try again.");
    return;
  }

  // Fresh session state
  FD.transcript="";
  FD.interimText="";
  FD.fillerCounts={};
  FD.totalWords=0;
  FD.startedAt=Date.now();
  FD.elapsedMs=0;
  FD._shouldReconnect=true;
  FD.phase="active";
  render();

  // Start recognition after the listening UI is painted. This also gives
  // iOS Safari a tick to settle after the permission dialog.
  setTimeout(fdStartRecognition,120);
  if(FD._uiInterval)clearInterval(FD._uiInterval);
  FD._uiInterval=setInterval(fdUpdateLiveDisplay,250);
}

// Create a fresh SpeechRecognition instance each time we (re)start.
// Reusing a single instance across restarts is fragile — especially on iOS
// Safari, where a stopped recognition can enter a state that refuses start().
function fdStartRecognition(){
  if(FD.phase!=="active"||!FD._shouldReconnect)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;

  const rec=new SR();
  // continuous:false is actually MORE reliable than true on iOS/webkit —
  // it pauses on silence, fires onend, and we just restart.
  rec.continuous=false;
  rec.interimResults=true;
  rec.lang="en-US";

  rec.onresult=(ev)=>{
    let interim="";
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      const r=ev.results[i];
      if(r.isFinal){fdAnalyze(r[0].transcript);}
      else{interim+=r[0].transcript;}
    }
    FD.interimText=interim;
    fdUpdateLiveDisplay();
  };

  rec.onerror=(ev)=>{
    console.warn("SpeechRecognition error:",ev.error);
    if(ev.error==="not-allowed"||ev.error==="service-not-allowed"){
      FD._shouldReconnect=false;
      alert("Microphone permission was denied. Enable mic access in your browser settings, then try again.");
      fdStop(false);
    }
    // "no-speech", "audio-capture", "network" all just let onend restart us
  };

  rec.onend=()=>{
    FD.recognition=null;
    // Auto-restart to keep listening until user taps Stop
    if(FD._shouldReconnect&&FD.phase==="active"){
      setTimeout(fdStartRecognition,80);
    }
  };

  FD.recognition=rec;
  try{
    rec.start();
  }catch(e){
    // InvalidStateError means another instance is already running —
    // safely ignorable. Any other error: bail.
    if(e&&e.name==="InvalidStateError")return;
    console.error("recognition.start failed:",e);
    FD._shouldReconnect=false;
    FD.phase="idle";
    render();
  }
}

function fdStop(showReport){
  FD._shouldReconnect=false;
  if(FD.recognition){
    try{FD.recognition.stop();}catch(e){}
    try{FD.recognition.abort();}catch(e){}
    FD.recognition=null;
  }
  if(FD._uiInterval){
    clearInterval(FD._uiInterval);
    FD._uiInterval=null;
  }
  if(FD.startedAt){
    FD.elapsedMs=Date.now()-FD.startedAt;
  }
  if(showReport&&(FD.totalWords>0||Object.keys(FD.fillerCounts).length>0)){
    FD.phase="report";
  }else{
    FD.phase="idle";
  }
  render();
}

function fdAnalyze(text){
  if(!text)return;
  FD.transcript+=(FD.transcript?" ":"")+text.trim();

  // Normalise: lowercase, strip punctuation (but keep word boundaries)
  const normalised=text.toLowerCase().replace(/[.,!?;:]/g,"");

  // Word count (rough)
  const words=normalised.trim().split(/\s+/).filter(w=>w.length>0);
  FD.totalWords+=words.length;

  // Single-word fillers
  for(const w of words){
    if(FILLER_SINGLE.includes(w)){
      FD.fillerCounts[w]=(FD.fillerCounts[w]||0)+1;
    }
  }
  // Multi-word phrases — use regex with word boundaries
  for(const phrase of FILLER_PHRASE){
    const re=new RegExp("\\b"+phrase.replace(/\s+/g,"\\s+")+"\\b","g");
    const m=normalised.match(re);
    if(m)FD.fillerCounts[phrase]=(FD.fillerCounts[phrase]||0)+m.length;
  }
}

// Update only the parts of the DOM that change during listening — no re-render
function fdUpdateLiveDisplay(){
  if(FD.phase!=="active")return;

  const elapsed=Date.now()-FD.startedAt;
  const timerEl=document.getElementById("fd-timer");
  if(timerEl)timerEl.textContent=fmtMs(elapsed);

  const wordsEl=document.getElementById("fd-words");
  if(wordsEl)wordsEl.textContent=FD.totalWords+" words spoken";

  const rowsEl=document.getElementById("fd-running-rows");
  if(rowsEl){
    const entries=Object.entries(FD.fillerCounts).sort((a,b)=>b[1]-a[1]);
    if(entries.length===0){
      rowsEl.innerHTML='<div class="fd-running-empty">No fillers detected yet. Keep going.</div>';
    }else{
      let html="";
      entries.forEach(([word,count])=>{
        html+='<div class="fd-running-row"><span class="fd-running-word">'+word+'</span><span class="fd-running-count">×'+count+'</span></div>';
      });
      rowsEl.innerHTML=html;
    }
  }

  const trEl=document.getElementById("fd-transcript-live");
  if(trEl){
    const shown=(FD.transcript+" "+FD.interimText).trim();
    if(shown){
      trEl.textContent=shown.slice(-280); // last ~280 chars
      trEl.classList.remove("fd-transcript-live-empty");
    }else{
      trEl.textContent="Waiting for you to start speaking…";
      trEl.classList.add("fd-transcript-live-empty");
    }
  }
}

// Compute derived stats for the report
function fdComputeReport(){
  const totalFillers=Object.values(FD.fillerCounts).reduce((a,b)=>a+b,0);
  const pct=FD.totalWords>0?(totalFillers/FD.totalWords*100):0;
  const durationMin=FD.elapsedMs/60000;
  const fillersPerMin=durationMin>0?(totalFillers/durationMin):0;
  const entries=Object.entries(FD.fillerCounts).sort((a,b)=>b[1]-a[1]);
  return{totalFillers,pct,durationMin,fillersPerMin,entries};
}

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function fdHighlightTranscript(text){
  let escaped=escapeHtml(text);
  // Wrap multi-word phrases first to avoid splitting them
  for(const phrase of FILLER_PHRASE){
    const re=new RegExp("\\b("+phrase.replace(/\s+/g,"\\s+")+")\\b","gi");
    escaped=escaped.replace(re,'<span class="filler-highlight">$1</span>');
  }
  for(const word of FILLER_SINGLE){
    const re=new RegExp("\\b("+word+")\\b","gi");
    escaped=escaped.replace(re,'<span class="filler-highlight">$1</span>');
  }
  return escaped;
}

  if(FD.phase==="unsupported"){renderFDUnsupported(app);return;}

function renderFDActive(app){
  const elapsed=Date.now()-FD.startedAt;

  h+='<div class="top-bar">';
  h+='<button class="top-bar-btn" data-action="fd-cancel">✕ Cancel</button>';

function renderFDReport(app){
  const rep=fdComputeReport();
  const maxCount=rep.entries.length>0?rep.entries[0][1]:1;

  // Pick a quality tier based on filler %
  let scoreClass="",interpretation="",scoreWord="";
  if(rep.pct<3){scoreClass="";scoreWord="Excellent";interpretation='Under 3% filler is the <span class="ref-strong">gold standard</span> — keep doing what you\'re doing.';}
  else if(rep.pct<5){scoreClass="";scoreWord="Strong";interpretation='Between 3–5% is <span class="ref-strong">strong</span>. Most polished speakers live here.';}
  else if(rep.pct<8){scoreClass="warn";scoreWord="Typical";interpretation='5–8% is <span class="ref-warn">typical</span> — noticeable but not distracting. Focus on your top 1–2 offenders first.';}
  else{scoreClass="bad";scoreWord="Work to do";interpretation='Over 8% is <span class="ref-bad">noticeable</span>. The good news: most of it comes from 1–2 specific words. Pick the top offender and focus there next session.';}

  let h='<div class="fade-up">';
  h+='<div class="top-bar">';
  h+='<button class="top-bar-btn" data-action="fd-back-practice">← Practice</button>';
  h+='</div>';

  h+='<div class="kicker">Session Report</div>';
  h+='<h1 class="title">Your <span class="accent">speech stats</span></h1>';

  // Hero score
  h+='<div class="fd-report-hero">';
  h+='<div class="fd-report-score '+scoreClass+'">'+rep.pct.toFixed(1)+'%</div>';
  h+='<div class="fd-report-score-label">'+scoreWord+' · filler rate</div>';
  h+='</div>';

  // Meta stats
  h+='<div class="fd-report-meta">';
  h+='<div class="fd-report-meta-cell"><div class="fd-report-meta-val">'+fmtMs(FD.elapsedMs)+'</div><div class="fd-report-meta-label">Duration</div></div>';
  h+='<div class="fd-report-meta-cell"><div class="fd-report-meta-val">'+FD.totalWords+'</div><div class="fd-report-meta-label">Words</div></div>';
  h+='<div class="fd-report-meta-cell"><div class="fd-report-meta-val">'+rep.totalFillers+'</div><div class="fd-report-meta-label">Fillers</div></div>';
  h+='</div>';

  // Interpretation
  h+='<div class="fd-interpretation">'+interpretation+' <strong>Your pace:</strong> '+rep.fillersPerMin.toFixed(1)+' fillers per minute.</div>';

  // Per-filler breakdown
  if(rep.entries.length>0){
    h+='<div class="fd-section-hdr">Which fillers you used</div>';
    h+='<div class="fd-top-offenders">';
    rep.entries.forEach(([word,count])=>{
      const pct=Math.round((count/maxCount)*100);
      h+='<div class="fd-bar-row">';
      h+='<div class="fd-bar-name">'+word+'</div>';
      h+='<div class="fd-bar-track"><div class="fd-bar-fill" style="width:'+pct+'%"></div></div>';
      h+='<div class="fd-bar-count">×'+count+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }else{
    h+='<div class="fd-section-hdr">Which fillers you used</div>';
    h+='<div class="fd-interpretation" style="text-align:center">🎉 <strong>Zero fillers detected!</strong> Either you were flawless or very brief — either way, well done.</div>';
  }

  // Transcript (collapsible)
  if(FD.transcript){
    h+='<div class="fd-section-hdr">Full transcript</div>';
    h+='<div class="fd-transcript-panel" id="fd-transcript-panel">';
    h+='<div class="fd-transcript-header" data-action="fd-toggle-transcript">';
    h+='<div class="fd-transcript-label">Review what you said (fillers highlighted)</div>';
    h+='<div class="fd-transcript-chev">▼</div>';
    h+='</div>';
    h+='<div class="fd-transcript-body"><div class="fd-transcript-body-inner">'+fdHighlightTranscript(FD.transcript)+'</div></div>';
    h+='</div>';
  }

  // Actions
  h+='<div class="fd-report-actions">';
  h+='<button class="fd-action-secondary" data-action="fd-done">Done</button>';
  h+='<button class="fd-action-primary" data-action="fd-again">Practice again →</button>';
  h+='</div>';

  h+='</div>';
  app.innerHTML=h;

  const back=app.querySelector('[data-action="fd-back-practice"]');
  if(back)back.addEventListener("click",()=>{FD.phase="idle";V.view="practice";render();});
  const done=app.querySelector('[data-action="fd-done"]');
  if(done)done.addEventListener("click",()=>{FD.phase="idle";V.view="practice";render();});
  const again=app.querySelector('[data-action="fd-again"]');
  if(again)again.addEventListener("click",fdStart);
  const toggle=app.querySelector('[data-action="fd-toggle-transcript"]');
  if(toggle)toggle.addEventListener("click",()=>{
    document.getElementById("fd-transcript-panel").classList.toggle("expanded");
  });
}

// PATHFINDER — 90-day program planner
// ═══════════════════════════════════════════════════════════════════════════
// Takes a handful of context inputs and produces a 12-week plan tailored to
// the user's path, current level, timeline, goal, and constraints. Pure
// buildProgram() → stateless, no side effects. UI wraps it.
//
// Output shape:
//   {generated, timeline, goal, constraint, interest, pathCode, weeks:[...]}
//
//   weeks[i] = {n, phase, focus, projects:[{pid,action}], roles:[roleId],
//               practice:[{tool,action}], milestone}
//
// Rules are applied in order: seed_projects runs first (baseline sequencing),
// then constraint rules adjust, then goal rules amplify, then polish rules
// tidy milestones + role rotation.

// ═══ Term specification ═══
// Computes plan length, phase boundaries, milestone weeks, and pacing from
// the user's termLength + levelGoal answers. Returns all the knobs that
// buildProgram needs in one object.
//
//   termLength: "sprint" (6w) | "half" (13w) | "full" (26w)
//   levelGoal:  "1" | "2" | "3"
//
// Pacing is derived from the ratio: project density = levelGoal × 4 / weeks.
// Role cadence tightens when the ratio is aggressive (more meetings needed).
function _termSpec(termLength,levelGoal){
  const weeks=termLength==="sprint"?6:termLength==="full"?26:13;
  const lvGoal=parseInt(levelGoal||"1",10);
  // Phase boundaries (1-indexed inclusive ranges)
  let phases;
  if(weeks===6){
    phases=[
      {name:"foundation",from:1,to:3},
      {name:"integrate",from:4,to:6}
    ];
  }else if(weeks===26){
    phases=[
      {name:"foundation",from:1,to:6},
      {name:"build",from:7,to:13},
      {name:"integrate",from:14,to:20},
      {name:"mastery",from:21,to:26}
    ];
  }else{
    phases=[
      {name:"foundation",from:1,to:4},
      {name:"build",from:5,to:9},
      {name:"integrate",from:10,to:13}
    ];
  }
  // Milestone week indices (0-indexed into plan.weeks array).
  // Placed at the end of each phase, spaced evenly.
  let milestoneIdx;
  if(weeks===6)milestoneIdx=[2,5];
  else if(weeks===26)milestoneIdx=[5,12,19,25];
  else milestoneIdx=[3,8,12];
  // Pacing
  const projectsPerLevel=4; // typical Pathways level is 3-5 projects
  const targetProjects=lvGoal*projectsPerLevel;
  const monthlyRatio=targetProjects/(weeks/4);
  const roleEvery=monthlyRatio>=2.5?1:2;
  return{weeks,phases,milestoneIdx,targetProjects,roleEvery,lvGoal};
}
function _phaseForWeek(spec,weekNum){
  for(const ph of spec.phases){
    if(weekNum>=ph.from&&weekNum<=ph.to)return ph.name;
  }
  return"build";
}
function _phaseRange(spec,phaseName){
  const ph=spec.phases.find(p=>p.name===phaseName);
  return ph?ph.from+"–"+ph.to:"";
}
// Safe mutators — guard against out-of-range indices when term is short.
function _safeSetMilestone(plan,idx,text){
  if(idx>=0&&idx<plan.weeks.length&&!plan.weeks[idx].milestone){
    plan.weeks[idx].milestone=text;
  }
}
function _safePushRole(plan,idx,rid,projectWeeks){
  if(idx>=0&&idx<plan.weeks.length&&!projectWeeks.has(idx)&&!plan.weeks[idx].roles.includes(rid)){
    plan.weeks[idx].roles.push(rid);
  }
}

// Helper: returns ordered list of projects the user hasn't yet done, starting
// from their current level and moving up. Uses gP() to respect path structure.
function _remainingProjects(pathCode){
  const out=[];
  for(let lv=1;lv<=5;lv++){
    const g=gP(pathCode,lv);
    // Required first, then electives (only fill `en` count of electives)
    g.r.forEach(pid=>{if(!S.done[pid])out.push({pid,lv,kind:"required"});});
    g.e.slice(0,g.en).forEach(pid=>{if(!S.done[pid])out.push({pid,lv,kind:"elective"});});
  }
  return out;
}

function buildProgram(answers,pathCode){
  const spec=_termSpec(answers.termLength||"half",answers.levelGoal||"1");
  const remaining=_remainingProjects(pathCode);
  const plan={
    generated:Date.now(),
    termLength:answers.termLength||"half",
    levelGoal:answers.levelGoal||"1",
    timebudget:answers.timebudget||null,
    frequency:answers.frequency||"weekly",
    goal:answers.goal,
    constraint:answers.constraint,
    comfort:answers.comfort||null,
    interest:answers.interest||null,
    pathCode:pathCode,
    weeks:[],
    checkIns:{},
    // Check-in week numbers (1-indexed) for render; mirrors spec.milestoneIdx
    checkInWeeks:spec.milestoneIdx.map(i=>i+1),
    // Phase ranges for the phase-marker header. Persisted so render doesn't
    // need to recompute from the weeks array.
    phases:spec.phases.map(ph=>({name:ph.name,from:ph.from,to:ph.to}))
  };

  // Initialize weeks with dynamic length + phase
  for(let n=1;n<=spec.weeks;n++){
    plan.weeks.push({
      n,phase:_phaseForWeek(spec,n),focus:"",projects:[],roles:[],practice:[],milestone:null
    });
  }

  const lastIdx=plan.weeks.length-1;
  const mi=spec.milestoneIdx; // [early, mid, (late), last]
  const earlyIdx=mi[0];
  const midIdx=mi[Math.min(1,mi.length-1)];
  const lateIdx=mi[Math.min(2,mi.length-1)];

  // ═══ Rule 1: seed projects across the term ═══
  const targetCount=Math.min(remaining.length,spec.targetProjects);
  const projectsToSchedule=remaining.slice(0,targetCount);
  const projectWeeks=new Set();
  if(projectsToSchedule.length>0){
    const spacing=Math.max(1,Math.floor((spec.weeks-1)/projectsToSchedule.length));
    projectsToSchedule.forEach((p,i)=>{
      const weekIdx=Math.min(lastIdx,i*spacing);
      plan.weeks[weekIdx].projects.push({pid:p.pid,action:"deliver at your home club"});
      projectWeeks.add(weekIdx);
    });
  }

  // ═══ Rule 2: baseline role rotation (cyclical, non-conflict) ═══
  // Sequence covers 10 distinct roles including SAA and specialty contributions.
  // Cycles through the whole list rather than stopping at the end — ensures
  // long terms (26 weeks) never run dry. Skips project weeks (one-role-per-
  // meeting rule). Tracks recent roles to avoid back-to-back repeats.
  const roleSequence=[
    "timer","ah","gram","ttm","ie","tmd","ge","saa",
    // Specialty contributions — not in ROLES[] as main officer roles but
    // still real service: rendered as plain text in the week card.
    "photographer","wordmaster"
  ];
  const recentRoles=[]; // last 3 assignments, to avoid repeats
  let cursor=0;
  for(let i=0;i<spec.weeks;i++){
    if(i%spec.roleEvery!==0)continue;
    if(projectWeeks.has(i))continue;
    // Find the next role in sequence that isn't in recent memory
    let attempts=0,picked=null;
    while(attempts<roleSequence.length){
      const candidate=roleSequence[cursor%roleSequence.length];
      cursor++;
      if(!recentRoles.includes(candidate)){picked=candidate;break;}
      attempts++;
    }
    if(!picked)picked=roleSequence[cursor%roleSequence.length];
    plan.weeks[i].roles.push(picked);
    recentRoles.push(picked);
    if(recentRoles.length>3)recentRoles.shift();
  }

  // ═══ Rule 2b: break / variety weeks for long terms ═══
  // In terms >= 20 weeks, inject an explicit "recharge" week at roughly the
  // 2/3 mark (if it's otherwise empty) — real humans can't grind 26 weeks
  // straight. Keeps it honest instead of pretending every week is on-task.
  if(spec.weeks>=20){
    const restIdx=Math.floor(spec.weeks*2/3);
    if(!projectWeeks.has(restIdx)&&plan.weeks[restIdx].roles.length===0){
      plan.weeks[restIdx].focus="Recharge week — attend without a role, support newer members, take notes";
      plan.weeks[restIdx].practice=[{tool:"none",action:"Optional: take photos for club social media, mentor a guest through meeting flow"}];
    }
  }

  // ═══ Rule 3: weekly practice ═══
  for(let i=0;i<spec.weeks;i++){
    const hasProject=plan.weeks[i].projects.length>0;
    const hasRole=plan.weeks[i].roles.length>0;
    if(hasProject){
      plan.weeks[i].practice.push({tool:"timer",action:"Rehearse with the in-app timer before speech day"});
    }else if(hasRole){
      plan.weeks[i].practice.push({tool:"tt-app",action:"3× app-based Table Topics practice (5 min each)"});
    }else{
      plan.weeks[i].practice.push({tool:"tt-club",action:"Volunteer as Table Topics Speaker at your home club"});
    }
  }

  // ═══ Rule 4: constraint-specific adjustments ═══
  const c=answers.constraint;
  const frontWeeks=Math.min(4,Math.floor(spec.weeks/3));
  if(c==="nervous"){
    for(let i=0;i<frontWeeks;i++){
      plan.weeks[i].practice.push({tool:"filler",action:"Daily 5-min solo read-aloud with Filler Detector"});
    }
    if(plan.weeks[0].projects.length===0){
      plan.weeks[0].focus="Warm up — easy wins first";
    }
  }else if(c==="time"){
    plan.weeks.forEach(w=>{
      if(w.projects.length>1)w.projects=w.projects.slice(0,1);
    });
    plan.weeks[0].focus="Protect 2 hours/week — that's all you need";
  }else if(c==="feedback"){
    _safeSetMilestone(plan,Math.min(1,lastIdx),"Visit a second club to see how others evaluate (functionary roles welcome — not speaking)");
    _safePushRole(plan,Math.min(2,lastIdx),"ie",projectWeeks);
  }else if(c==="audience"){
    _safeSetMilestone(plan,earlyIdx,"Invite a guest to your next home-club speech");
  }else if(c==="burnt"){
    plan.weeks[0].focus="Fun first — remember why you joined";
    plan.weeks[0].practice.push({tool:"tt-app",action:"Playful TT themes only — no pressure"});
  }

  // ═══ Rule 5: goal-specific emphasis ═══
  const g=answers.goal;
  const recordingWeeks=Math.min(6,Math.floor(spec.weeks/2));
  if(g==="stage"){
    for(let i=0;i<recordingWeeks;i++){
      plan.weeks[i].practice.push({tool:"filler",action:"Record every rehearsal on your phone; watch back with sound off"});
    }
  }else if(g==="leadership"){
    _safePushRole(plan,Math.min(2,lastIdx),"tmd",projectWeeks);
    _safeSetMilestone(plan,midIdx,"Volunteer for a committee or club officer role for next term");
  }else if(g==="persuasion"){
    _safeSetMilestone(plan,earlyIdx,"Deliver a persuasive speech with a real ask at your home club");
  }else if(g==="humor"){
    for(let i=0;i<spec.weeks;i+=2){
      plan.weeks[i].practice.push({tool:"tt-app",action:"Lean into humorous themes in TT practice"});
    }
  }else if(g==="vision"){
    _safeSetMilestone(plan,midIdx,"Draft a 3-year vision for your career or project");
  }

  // ═══ Rule 6: interest-based role bias ═══
  const int=answers.interest;
  if(int==="impromptu"){
    const idx=Math.min(1,lastIdx);
    if(!projectWeeks.has(idx)&&!plan.weeks[idx].roles.includes("ttm"))plan.weeks[idx].roles.unshift("ttm");
  }else if(int==="evaluating"){
    const idx=Math.min(1,lastIdx);
    if(!projectWeeks.has(idx)&&!plan.weeks[idx].roles.includes("ie"))plan.weeks[idx].roles.unshift("ie");
  }else if(int==="leading"){
    const idx=Math.min(3,lastIdx);
    if(!projectWeeks.has(idx)&&!plan.weeks[idx].roles.includes("tmd"))plan.weeks[idx].roles.unshift("tmd");
  }

  // ═══ Rule 6b: time-budget fine-tuning ═══
  if(answers.timebudget==="low"){
    plan.weeks.forEach(w=>{
      w.practice=w.practice.filter(pr=>!/Daily|every rehearsal/i.test(pr.action));
    });
    if(!plan.weeks[0].focus||plan.weeks[0].focus==="Foundation: build the habit"){
      plan.weeks[0].focus="Tight budget — meeting + one prep session is enough";
    }
  }else if(answers.timebudget==="high"){
    for(let i=0;i<spec.weeks;i++){
      const busy=plan.weeks[i].projects.length>0||plan.weeks[i].roles.length>0;
      if(!busy){
        plan.weeks[i].practice.push({tool:"filler",action:"Daily 10-min read-aloud — build reps"});
      }
    }
  }

  // ═══ Rule 6c: meeting frequency realism ═══
  if(answers.frequency==="biweekly"||answers.frequency==="irregular"){
    const projectWeekIndices=[];
    plan.weeks.forEach((w,i)=>{if(w.projects.length>0)projectWeekIndices.push(i);});
    for(let i=0;i<projectWeekIndices.length-1;i++){
      if(projectWeekIndices[i+1]-projectWeekIndices[i]<2){
        const srcIdx=projectWeekIndices[i+1];
        const dstIdx=Math.min(lastIdx,srcIdx+1);
        if(dstIdx!==srcIdx&&plan.weeks[dstIdx].projects.length===0){
          plan.weeks[dstIdx].projects=plan.weeks[srcIdx].projects;
          plan.weeks[srcIdx].projects=[];
          projectWeekIndices[i+1]=dstIdx;
        }
      }
    }
    if(answers.frequency==="irregular"){
      plan.weeks[0].focus="Irregular schedule — don't force weekly; use every meeting fully";
    }
  }

  // ═══ Rule 6d: comfort-level milestones ═══
  if(answers.comfort==="club"){
    _safeSetMilestone(plan,midIdx,"Invite a non-TM friend to your home-club speech (build the bridge)");
  }else if(answers.comfort==="work"){
    _safeSetMilestone(plan,lateIdx,"Deliver one of your Pathways speech topics at work (team meeting, lunch-and-learn)");
  }else if(answers.comfort==="public"){
    _safeSetMilestone(plan,lateIdx,"Apply to speak at a local meetup, conference lightning round, or industry event");
  }

  // ═══ Rule 7: default check-in milestones at spec.milestoneIdx ═══
  // First = "what's working" check-in; last = reflection; middle = course-correct
  const checkInCopy={
    first:"First check-in — what's working?",
    mid:"Mid-term check-in — course-correct what isn't landing",
    late:"Stretch check-in — evaluate yourself against your goals",
    last:"Term complete — reflect, celebrate, plan the next block"
  };
  spec.milestoneIdx.forEach((idx,i)=>{
    if(plan.weeks[idx].milestone)return; // rule already set something
    if(i===0)plan.weeks[idx].milestone=checkInCopy.first;
    else if(i===spec.milestoneIdx.length-1)plan.weeks[idx].milestone=checkInCopy.last;
    else if(i===1&&spec.milestoneIdx.length>=3)plan.weeks[idx].milestone=checkInCopy.mid;
    else plan.weeks[idx].milestone=checkInCopy.late;
  });

  // ═══ Rule 8: phase-default focus for any empty weeks ═══
  const phaseFocus={
    foundation:"Foundation: build the habit",
    build:"Build: momentum and repetition",
    integrate:"Integrate: bigger commitments",
    mastery:"Mastery: lead, mentor, deliver at scale"
  };
  plan.weeks.forEach(w=>{
    if(!w.focus)w.focus=phaseFocus[w.phase]||"Keep building";
  });

  return plan;
}
