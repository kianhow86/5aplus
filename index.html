const TIPS={
"ice-breaker":{tip:"Keep it simple — just let people know who you are. <strong>DON'T OVERTHINK IT.</strong> Share a few things about your life, interests, or what brought you to Toastmasters.",avoid:"Don't try to deliver a TED talk. This <strong>ISN'T about impressing anyone</strong> — it's about breaking the ice. Keep it personal, not performative.",how:"Structure: <strong>Past → Present → Future</strong> (where I come from, what I do now, why I'm here). Open with one vivid detail — not 'Hi, I'm John from accounting' but 'Last Tuesday I burnt my third batch of cookies this month.' <strong>Practice OUT LOUD 3 times</strong> — standing up, not sitting."},
"writing-purpose":{tip:"The whole point is the <strong>PURPOSE</strong>. Before you write anything, finish this sentence: 'After my speech, I want the audience to ___.' If you can't, you're not ready to write.",avoid:"Don't data-dump. Don't try to cover 5 ideas in 7 minutes. <strong>ONE CLEAR MESSAGE</strong> — everything else supports it or gets cut.",how:"Pick your purpose first: inform / persuade / entertain / inspire. Then draft around it. Use the <strong>Rule of 3</strong> for body structure — 3 points, 3 examples, 3 contrasts. Cut any sentence that doesn't serve the purpose. Read your draft OUT LOUD — your ears catch what your eyes miss."},
"intro-vocal-body":{tip:"Pick ONE — vocal variety OR body language. Don't try to focus on both. Tell your evaluator which one you're working on <strong>BEFORE</strong> the speech.",avoid:"Don't fake it. Forced gestures look worse than no gestures. Monotone delivery reads as confident; exaggerated variety reads as amateur theatre.",how:"<strong>If vocal</strong>: mark your script for PACE, PITCH, POWER, PAUSE. Record yourself, listen, adjust. <strong>If body</strong>: stand still by default — move with intention (to emphasize, to pace, to connect). <strong>VIDEO RECORD YOURSELF</strong> — what you feel and what you look like are two different things."},
"eval-feedback":{tip:"The point is the <strong>FEEDBACK LOOP</strong> — listen to what your evaluator says and <strong>VISIBLY APPLY IT</strong> in your second speech. Topic doesn't matter.",avoid:"<strong>DON'T IGNORE the feedback</strong> and do a completely different speech. Your evaluator needs to see you <strong>listened and adjusted.</strong>",how:"After your first speech, <strong>WRITE DOWN your evaluator's top 2 points.</strong> Before your second speech, tell the audience: 'Last time I was told to [X], so today I'm focusing on that.' Use the <strong>CRC method</strong> for your evaluator role: Commend (what worked), Recommend (one thing to improve), Commend (encouragement)."},
"lead-style":{tip:"Be honest about your actual style, not the style you wish you had. <strong>Self-awareness is the whole point.</strong>",avoid:"Don't describe leadership theory from a textbook. This is about YOUR style in real life.",how:"Complete the assessment, then think of 3 situations where your leadership style showed up clearly. For each: what happened, what you did instinctively, and what the result was. Be honest about your weaknesses — <strong>the audience respects self-awareness more than a highlight reel.</strong>"},
"comm-style":{tip:"Same as leadership style — honesty matters more than sophistication. Map your real patterns, not ideals.",avoid:"Don't use generic communication jargon (assertive, passive, etc.) without grounding in real examples.",how:"Take the assessment, then think of 2 conversations this month where your style created friction, and 1 where it created connection. Your speech should use those specific moments — <strong>the audience wants to see YOU, not theory.</strong>"},
"intro-mentor":{tip:"Pick ONE real relationship — either a mentor who shaped you, or someone you've mentored. <strong>Go deep on that one.</strong>",avoid:"Don't talk about mentoring in the abstract. 'A mentor should...' speeches are forgettable. A specific story is not.",how:"Structure: Who they were → One specific moment that shifted something for you → What you took forward → Why Toastmasters mentoring matters. <strong>Bring a photo or artifact if you can.</strong>"},
"connect-aud":{tip:"<strong>READ THE ROOM IN REAL TIME.</strong> The whole point is adapting — not delivering a memorized script.",avoid:"Don't speed through pre-written material when the audience looks lost. Slow down, check in, rephrase.",how:"Prepare 3 anchor points, but leave flexible transitions. Start with a question that lets you gauge the audience. Watch for signs of disengagement (looking down, no eye contact) and <strong>adjust — either simplify, ask a question, or add a story.</strong>"},
"manage-time":{tip:"Track your prep time <strong>HONESTLY</strong> for a week before this speech. The awareness is the project, not the speech itself.",avoid:"Don't just talk about time management theory. Show YOUR real data — hours spent, what you cut, what surprised you.",how:"Before prep: log how you EXPECT to use your time. During: track what ACTUALLY happened. Compare the two in your speech. <strong>The gap between intention and reality is where the insight lives.</strong>"},
"active-listen":{tip:"As Topicsmaster, your job is to <strong>LISTEN AND REFLECT BACK</strong>. Show the speakers you heard them.",avoid:"Don't use the time to give your own opinions. This isn't about you.",how:"After each Table Topic response, give a 15–20 second reflection: what you heard, what stood out, one follow-up question or observation. <strong>Use the speaker's own words</strong> back to them — that's the sign of real listening."},
"eff-body-lang":{tip:"<strong>VIDEO RECORD YOURSELF.</strong> What you think you're doing and what you're actually doing are different. Watch the tape.",avoid:"Don't add gestures for their own sake. Nothing worse than forced hand movements. Gestures should serve the message.",how:"Record a rehearsal. Watch it with sound OFF — are your gestures telling the story? Watch again with video OFF — does your voice carry without visuals? Fix whichever is weaker. Specific gestures to nail: <strong>open palms for honesty, closed fist for emphasis, pointing for direction.</strong>"},
"know-humor":{tip:"<strong>YOUR HUMOR, NOT SOMEONE ELSE'S.</strong> Don't try to be Jerry Seinfeld. Figure out what actually makes YOU laugh and lean in.",avoid:"Don't open with a joke you got from the internet. Don't apologize for humor — 'I'm not funny but...' kills the mood.",how:"Before writing, list 5 things that genuinely make you laugh. Look for the pattern — observation, wordplay, self-deprecation, absurdity? <strong>Build the speech around THAT pattern.</strong> Test material on one friend before the club."},
"cross-cultural":{tip:"Be vulnerable about a stereotype you've faced OR one you've held. <strong>Honesty disarms defensiveness.</strong>",avoid:"Don't give a generic 'diversity is good' speech. Everyone already agrees. Say something only YOU can say.",how:"Pick ONE stereotype — about your culture or a culture you misunderstood. Tell the story of realizing it. End with what you now do differently. <strong>Specific and personal > general and educational.</strong>"},
"negotiate":{tip:"Share a negotiation that went badly too, not just a win. <strong>Failure teaches more</strong> — and is more relatable.",avoid:"Don't just summarize a Chris Voss book. Use your own story; reference frameworks briefly if useful.",how:"Pick ONE specific negotiation. Set the stakes (what did you want, what did the other side want). Walk through the conversation. Highlight 1 moment that shifted it. End with the principle you now use. <strong>Frameworks worth knowing</strong>: BATNA, anchoring, tactical empathy."},
"reach-consens":{tip:"Your closing statement should <strong>ACKNOWLEDGE THE DISSENT</strong>, not pretend everyone agreed. That's what makes it real consensus.",avoid:"Don't railroad the group just to finish on time. If consensus isn't reachable, say so in your close and <strong>name the real disagreement.</strong>",how:"During the 20 minutes: listen more than you talk, surface quieter voices, restate positions neutrally, test agreement ('Does [X] work for everyone?'). Your 2–3 min close: the outcome, the process, and one thing you'd do differently."},
"engage-humor":{tip:"Know the <strong>RULE OF 3</strong>: set up a pattern, break it on the third beat. That's where laughs live.",avoid:"Don't try to be funny throughout. <strong>One big laugh at the end beats a dozen mild chuckles.</strong>",how:"Write your speech normally. Then find 2–3 places where you can plant humor — an unexpected comparison, a callback to an earlier line, or a deadpan reaction. Time your delivery with <strong>pause before the punchline</strong>."},
"present-prop":{tip:"Develop a <strong>REAL proposal</strong> for something you want to improve. Present the problem, your solution, and the benefits.",avoid:"Don't present a vague idea. A good proposal has data, a clear ask, and addresses objections before they're raised.",how:"Structure: Problem (what's broken, with data) → Solution (your specific proposal) → Benefits (what improves, for whom) → Cost/Resources (what it takes) → Next Steps (the specific ask). <strong>Anticipate the top 2 objections and address them proactively.</strong> End with a clear call to action."},
"plan-implement":{tip:"Pick a small, <strong>REAL</strong> project you were going to do anyway. Don't invent one for the speech.",avoid:"Don't present a plan without execution. The 'implementing' part is the point — show what happened, including what went wrong.",how:"Choose a 2–4 week project. Set specific success criteria upfront. Execute. Track what went to plan and what didn't. Your speech: the plan, the reality, the gap, the lesson. <strong>Audiences love honesty about what didn't work.</strong>"},
"emotional-intel":{tip:"Show, don't tell. <strong>Tell a story where EI helped or hurt a situation.</strong> Theory alone puts audiences to sleep.",avoid:"Don't summarize Daniel Goleman in 7 minutes. Pick ONE EI skill (self-awareness, empathy, etc.) and go deep.",how:"Pick the EI skill you're weakest at. Tell a story of it failing. Tell a story of working on it. Share what changed. <strong>Vulnerability beats expertise here.</strong>"},
"conflict-res":{tip:"Pick a conflict you were IN the middle of, not one you observed. <strong>First-person stakes are more compelling.</strong>",avoid:"Don't lecture about conflict styles. Show what you did, right and wrong.",how:"Structure: Context (what was at stake) → The conflict (what happened) → What I did (specific actions) → Outcome (what worked, what didn't) → What I'd do differently. <strong>Audiences connect with honesty about mistakes.</strong>"},
"persuade-speak":{tip:"Use <strong>MONROE'S MOTIVATED SEQUENCE</strong>: attention → need → satisfaction → visualization → action. It works.",avoid:"Don't just state facts. Persuasion is emotional architecture — engage, disturb, relieve, motivate.",how:"Attention: grab with a story or shocking stat. Need: show the problem is urgent AND personal to them. Satisfaction: present your solution. Visualization: paint the picture of life with/without acting. Action: <strong>specific, small, doable next step.</strong>"},
"networking":{tip:"Go to a <strong>REAL networking event</strong>. Don't fake this one — the quality of your speech depends on the quality of your experience.",avoid:"Don't give a generic 'networking tips' speech. Tell YOUR story — what you prepared, what happened, what you learned.",how:"Before: set a specific goal (meet 3 new people in your industry). Prepare a 30-second pitch. Bring cards. At the event: ask more than you tell. After: follow up within 48 hours. In the speech: <strong>one conversation that surprised you, one mistake you made, one takeaway.</strong>"},
"success-collab":{tip:"Work with a team on something real, then present about the collaboration experience. <strong>Focus on HOW the team worked together, not just what you produced.</strong>",avoid:"Don't present the project output. The speech is about collaboration dynamics — communication, conflict, roles, and what made it work (or not).",how:"Before starting, establish team norms: how will you communicate, make decisions, handle disagreements? During the project, notice the dynamics. In your speech, <strong>be honest about friction points and how they were resolved.</strong> The best collaboration speeches include a moment where things almost fell apart."},
"develop-comm":{tip:"Build a real communication plan for something you're <strong>ACTUALLY</strong> doing — a project, a role transition, a team change.",avoid:"Don't build a hypothetical plan. Without real stakes, the insights are shallow.",how:"Structure: Who needs to hear what? → When? → How (channel)? → What's the response you want? <strong>Include a contingency for 'if they don't respond.'</strong> Present your plan as if you're about to execute it."},
"social-speech":{tip:"Social speeches are about <strong>THE OCCASION, NOT YOU</strong>. Toast = the person. Eulogy = the life. Acceptance = the people who got you here. Tribute = their impact.",avoid:"Don't wing it — social speeches where you 'just speak from the heart' usually ramble. Don't make a wedding toast about your own marriage. Don't turn an acceptance speech into a thank-you list.",how:"Part A: pick the type (toast / eulogy / acceptance / tribute). <strong>Structure</strong>: hook (a specific story) → heart (what they mean) → wish (what you hope for them / them forward). Part B: <strong>different type</strong>. Keep each to 3–4 min — shorter than a regular speech. Rehearse tearing up — if this is emotional, practice pausing without losing control."},
"pres-software":{tip:"<strong>SLIDES SHOULD AMPLIFY, NOT COMPETE.</strong> Your words are the speech — the slides just help the audience visualize.",avoid:"Don't read from your slides. Don't cram text. Don't use bullet-point templates with 7 bullets per slide. Don't use clip art.",how:"Rule: <strong>1 idea per slide, 6 words max</strong> (Guy Kawasaki's 10/20/30). Use full-bleed images and large type. Black backgrounds make everything pop. If you remove the slides, your speech should still work — they're support, not the main event."},
"story":{tip:"<strong>ONE story, one message.</strong> Don't cram multiple narratives into 7 minutes. Pick the one that cuts deepest.",avoid:"Don't explain the lesson at the end. If the story is told right, the audience will get it. Explaining insults them.",how:"Use <strong>Freytag's pyramid</strong>: exposition → rising action → climax → falling action → resolution. Put the audience inside sensory detail — what did you see, hear, feel? Write 'they laughed' vs. 'her laugh rattled the windows.'"},
"visual-aids":{tip:"Pick visual aids that the <strong>AUDIENCE CAN'T GET FROM WORDS ALONE</strong>. Prop, image, chart, physical demonstration — something that only works visually.",avoid:"Don't use slides if a prop would work better. Don't hold up something tiny that the back row can't see. Don't fumble with your aids — rehearse with them.",how:"Ask: could I describe this in words? If yes, you don't need the aid. Props create physical presence — an audience remembers you holding the thing. <strong>Practice handling the aids</strong>: where they sit before, when you reveal, where they go after. The transition is where amateurs trip."},
"desc-lang":{tip:"<strong>SHOW, DON'T TELL.</strong> 'The room was cold' is telling. 'My breath hung in the air, ghost-white' is showing.",avoid:"Don't overdo adjectives. 3 strong, specific descriptors beat 10 vague ones. 'The old, tall, creaky, wooden' is worse than 'The gothic-tall oak.'",how:"Hit all 5 senses in the speech — not in every sentence. Use <strong>metaphor</strong> for emotional weight, <strong>specificity</strong> for credibility ('a 1987 Volvo,' not 'a car'). Read your script aloud — anywhere you rush is probably where the language is flat."},
"focus-pos":{tip:"Track your moods <strong>HONESTLY</strong> for 2 weeks. You'll see patterns you didn't know were there.",avoid:"Don't give a toxic-positivity speech. 'Just think positive' is hollow. Real positivity acknowledges the hard stuff.",how:"Log daily: what you felt, what triggered it, what you're grateful for. In your speech, <strong>pick 1 pattern you noticed</strong> and 1 thing you changed because of it. Be specific: 'I stopped checking email before 8am and my mornings got 40% less anxious.'"},
"inspire":{tip:"Inspiration comes from <strong>SPECIFICITY</strong>, not grand statements. 'Be your best self' inspires nobody. 'I woke up at 4am for 100 days and it changed my marriage' does.",avoid:"Don't preach. Don't use words like 'journey,' 'unleash,' 'empower' unless you have specific stories behind them. Don't open with a famous quote.",how:"Structure: <strong>Before (what was stuck) → Catalyst (what changed) → After (what's possible now)</strong>. Include ONE concrete next step the audience can take tomorrow. Not 'dream bigger' — 'text the person you've been avoiding.'"},
"interview":{tip:"Prepare <strong>STORIES, NOT ANSWERS</strong>. Behavioral interview questions ('tell me about a time...') are the norm — have 5–7 stories ready that cover common themes.",avoid:"Don't rehearse word-for-word — you'll sound robotic. Don't ramble. Don't badmouth past employers.",how:"Use <strong>STAR format</strong>: Situation, Task, Action, Result. Keep each story to 90 seconds. Before the interview, research the company, prepare 2 questions to ask them. In the role-play: speak with confidence, pause before answering (thinking is good), <strong>end each answer with a question or tie-back.</strong>"},
"vocal-var":{tip:"Vocal variety is <strong>PACE, PITCH, POWER, PAUSE</strong>. Use all four. Not at once.",avoid:"Don't read at one speed. Don't use upspeak (making every sentence sound like a question?). Don't race through the important line.",how:"Mark your script: slow+quiet for intimate moments, fast+loud for excitement, pause for emphasis. Record yourself reading with no modulation, then with exaggerated variety, then find the middle. <strong>The middle is where you should live.</strong>"},
"research-present":{tip:"Pick something you <strong>GENUINELY WANT TO LEARN</strong> about. The research process is the project — show you dug into a topic.",avoid:"Don't pick a topic you already know inside out. The point is the <strong>RESEARCH PROCESS</strong>, not showing off expertise.",how:"Structure: <strong>Hook → Problem → 3 Key Findings → So What?</strong> Use the 'inverted triangle' — start broad, narrow to specifics. <strong>Cite 2–3 sources</strong> to show depth. Use one surprising statistic early to hook attention."},
"manage-change":{tip:"Pick a <strong>REAL CHANGE</strong> — something happening in your life, work, or club. Hypothetical plans are shallow.",avoid:"Don't just list 'stages of change' from a business book. Show YOUR plan with specifics — who, what, when, how.",how:"Use <strong>Kotter's 8 steps</strong> as a mental checklist: urgency → coalition → vision → communicate → empower → short wins → consolidate → anchor. Your plan: what the change is, who's affected, how you'll communicate, what obstacles you anticipate, how you'll measure success."},
"improv-humor":{tip:"<strong>BUILD A STORY BANK.</strong> Impromptu speaking isn't made up on the spot — it's pre-loaded stories tailored to the topic.",avoid:"Don't panic and ramble. Don't just describe the topic ('So the word is kindness, which means...'). Don't force humor where it doesn't fit.",how:"<strong>PREP method</strong>: Point, Reason, Example, Point. Or <strong>past-present-future</strong>. Have 5–7 personal stories pre-loaded that touch common themes (work, family, failure, travel, lessons). For each topic: find the angle that connects to one of your stories. <strong>Humor comes from the unexpected twist.</strong>"},
"manage-proj":{tip:"Part A (plan) is easy — it's <strong>PART B WHERE THE LEARNING HAPPENS</strong>. Document what went wrong so you can speak honestly.",avoid:"Don't pick a project you're already 90% done with. Don't make Part B a summary — make it a reflection. Don't hide the mistakes.",how:"Part A: clear scope, team of 3–4, RACI chart (Responsible, Accountable, Consulted, Informed), milestones. Present the plan concisely. Part B: <strong>3 things that went to plan, 3 that didn't, 1 thing you'd do differently.</strong> Audiences remember failure-reflection better than success-stories."},
"lead-team":{tip:"<strong>LEADERSHIP IS MOSTLY LISTENING.</strong> The speech should be about what your team did, not what you did.",avoid:"Don't make yourself the hero. Don't gloss over conflict — every team has some. Don't claim your team was 'amazing' without specifics.",how:"Structure: Who was on the team, what you chose to do, how you handled the biggest challenge (be specific), what you learned about YOU as a leader. <strong>Name 2–3 team members</strong> and credit them for specific contributions. Humility lands better than hype."},
"motivate":{tip:"<strong>PEOPLE AREN'T MOTIVATED BY THE SAME THINGS.</strong> The project is: find out what motivates each person on your team.",avoid:"Don't use generic 'motivation' theory (Maslow, pizza parties). Don't assume money/recognition works for everyone.",how:"For each team member: ask what they want to learn / what they're scared of / what makes them feel respected. Match the task to the motivation. <strong>Daniel Pink's AMP</strong>: Autonomy, Mastery, Purpose. In your speech: one team member's transformation under the right motivation."},
"lead-difficult":{tip:"<strong>THE POINT IS IMPROVISATION.</strong> You can't prep the disruptions — you can prep your mindset.",avoid:"Don't over-rehearse your plan speech. Don't get defensive when club members raise disruptions. Don't say 'that wouldn't happen.'",how:"Part A: real or hypothetical plan with clear details — the more specific, the more fun the disruptions. Part B: when disruptions come, <strong>acknowledge → reframe → solve</strong>. Buy time with 'That's a great point — let me think about it this way…' Composure reads as capability."},
"manage-aud":{tip:"<strong>DON'T GET RATTLED.</strong> The evaluator scores you on HOW you respond, not what you say.",avoid:"Don't ignore disruptions. Don't get sarcastic or condescending. Don't apologize for being interrupted ('sorry, where was I?').",how:"For each disruption type: <strong>hecklers</strong> → address once, move on; <strong>questioners</strong> → 'I'll come back to that, let me finish this point'; <strong>distractors</strong> → pause, eye contact, silence until they stop; <strong>phone-checkers</strong> → ignore, don't call out. <strong>Pause + composed response = power.</strong>"},
"pr-strategies":{tip:"Build a real PR plan — for your club, a cause, or a personal brand. <strong>Make it actionable</strong> with specific tactics, timelines, and goals.",avoid:"Don't present a theoretical PR strategy. Don't use buzzwords ('leverage synergies'). Don't forget measurement.",how:"Structure: <strong>Audience → Message → Channels → Goals → Crisis plan</strong>. Who needs to hear this? What's the one thing you want them to know? Social, press, events, partnerships? Follower/attendance/media targets? What if something goes wrong?"},
"comm-change":{tip:"<strong>PEOPLE RESIST WHAT THEY DON'T UNDERSTAND.</strong> The comm plan is about replacing fear with clarity.",avoid:"Don't send one big announcement and call it done. Don't use corporate-speak. Don't hide bad news.",how:"Structure: <strong>Who → What → Why → When → How</strong>. Who is affected? What is changing? Why (the business or human reason)? When does it take effect? How will it happen? <strong>Communicate in waves</strong> — leaders first, then middle, then all. Answer objections BEFORE they're raised."},
"podcast":{tip:"Pick a <strong>NARROW TOPIC YOU COULD TALK ABOUT FOR HOURS</strong>. The best podcasts are specific. 'Business advice' = bad. '3-person productivity tactics for solo founders' = good. Remember: project requires <strong>60 min of recorded content</strong> + you <strong>play a 5–10 min segment at club</strong> with a 2–3 min intro speech. Both halves count — don't skip the club showcase.",avoid:"Don't buy expensive gear. Don't copy interview-format if you have no network. Don't over-produce the first episode — ship it rough. Don't record 60 min without an outline.",how:"<strong>Minimum-effort setup (free or near-free):</strong> (1) Record on your <strong>phone's built-in voice memo app</strong> OR free laptop software like <strong>Audacity</strong> (Mac/Windows/Linux). Quiet room + phone close to your mouth beats a cheap mic any day. (2) Edit in <strong>Audacity</strong> (free) or <strong>Descript</strong> (free tier: 1 hour/month). (3) Publish to <strong>Spotify for Podcasters</strong> — 100% free, auto-distributes to Apple Podcasts. Total cost: $0. If you later want to upgrade, $40 Samson Q2U USB mic is the sweet spot. Structure: intro (30s) → 3–4 body topics (15 min each) → outro (30s). For your club speech, play the <strong>tightest 5–10 min segment</strong>, then a 2–3 min intro explaining your topic, what you learned, and what surprised you."},
"social-media":{tip:"Pick <strong>ONE PLATFORM AND GO DEEP</strong>. LinkedIn for professional, Instagram for visual, X for ideas. Multi-platform is a rookie mistake.",avoid:"Don't post generic quotes. Don't buy followers. Don't chase trends — build a voice. Don't post once and quit.",how:"Post consistently for 30 days. Track: views, engagement, followers. Analyze which 2–3 posts worked. Double down on that pattern. In speech: <strong>your strategy, 2–3 posts that performed, what surprised you.</strong>"},
"blog":{tip:"<strong>NARROW YOUR TOPIC.</strong> 'My thoughts' = nobody reads. 'How solo founders use Notion' = fans. Project minimum is <strong>8 posts in one month</strong> + a 2–3 min speech about the impact.",avoid:"Don't write 3000 words per post — 600–800 is plenty. Don't wait for perfect — ship weekly. Don't chase SEO before you find your voice. Don't pay for a domain yet.",how:"<strong>Free platforms that work:</strong> (1) <strong>Substack</strong> — best built-in audience + email subscribers for free; (2) <strong>Medium</strong> — free, has built-in readers for popular tags; (3) <strong>Ghost.org</strong> free tier for self-hosted look. Skip WordPress.com unless you already know it. Write 2× per week. Each post: clear hook, 1 idea, 1 takeaway, 600–800 words. Use headers and short paragraphs. Speech angle: <strong>your voice evolution</strong> — what your first post sounded like vs your eighth, what surprised you, one post that flopped and why."},
"online-meet":{tip:"<strong>ONLINE ≠ OFFLINE SMALLER.</strong> Different medium, different rules — more frequent engagement, shorter segments.",avoid:"Don't let people hide on mute with cameras off the whole meeting. Don't present slides for 20 min straight. Don't ignore the chat.",how:"Before: agenda with time blocks, pre-reads. During: <strong>check in every 5–7 min</strong>. Use chat, polls, breakouts, reactions. Name people by name when asking questions. Keep it to 20–25 min — shorter is better than you think."},
"qa-session":{tip:"<strong>ANTICIPATE THE HARD QUESTIONS.</strong> Before the speech, write down the 5 questions you hope nobody asks. Those are the ones you'll get.",avoid:"Don't say 'great question' to every question — it becomes meaningless. Don't ramble when you don't know the answer. Don't get defensive.",how:"Q&A techniques: <strong>repeat the question</strong> (so everyone hears + buys you thinking time), <strong>bridge</strong> ('That's related to something I want to highlight…'), <strong>honest 'I don't know'</strong> ('Great question — I don't have data on that, I'll follow up'). For hostile questions: acknowledge → reframe → answer the deeper question."},
"pos-coaching-ec":{tip:"<strong>COACHING IS ASKING, NOT TELLING.</strong> If you're giving answers, you're consulting. Coaches ask questions that unlock the coachee's own answers.",avoid:"Don't give advice unless asked. Don't make the coaching about you. Don't skip the goal-setting conversation — vague coaching goes nowhere.",how:"Use the <strong>GROW model</strong>: Goal (what do you want?), Reality (where are you now?), Options (what could you do?), Will (what WILL you do?). Meet 4+ times. Keep notes. In speech: one transformation moment + what the coachee taught YOU."},
"lead-any":{tip:"<strong>6 MONTHS IS A LONG TIME.</strong> This project is about sustained leadership, not a single moment. Start documenting NOW.",avoid:"Don't pick a role you're already doing just to check the box. Don't skip the 360° — it's where the real growth is. Don't sanitize the speech.",how:"Keep a monthly leadership journal: decisions, conflicts, feedback, changes in YOUR thinking. At month 5, send the 360° to 5–7 people across levels. Speech structure: <strong>who you were at month 0 → 3 hard moments → who you are at month 6.</strong>"},
"reflect":{tip:"This is a synthesis speech, not a retrospective. <strong>What did you LEARN, not what did you DO.</strong>",avoid:"Don't list every project chronologically. Don't end with 'and that's why Toastmasters is great.' Don't be generic.",how:"Pick <strong>3 through-lines</strong> across your Pathways journey. For each: the moment it clicked, what changed, how you use it now. Structure like before/after: who you were at Level 1 vs who you are now. <strong>Specific is powerful.</strong>"},
"humor-finale":{tip:"<strong>20 MINUTES OF HUMOR IS HARD.</strong> You need a through-line — a central idea everything orbits.",avoid:"Don't just string jokes together. Don't copy comedians. Don't overshare personal stuff that makes the audience uncomfortable.",how:"Structure: <strong>One central premise → 3–4 orbiting bits → callback finale</strong>. Each bit has setup/misdirection/punchline. Plant callbacks early, pay off late — huge laughs. Watch 5+ 20-min keynote comedians (Norm Macdonald Telluride, Jim Gaffigan) for pacing."},
"hpl":{tip:"The HPL is NOT a speech project — <strong>it's a full multi-month leadership project with a guidance committee.</strong> Don't underestimate the scope.",avoid:"Don't pick a tiny project to fit the form. The HPL is meant to be meaningful. A small club event won't teach you what a real-scale initiative will.",how:"Pick something you actually care about. Form your guidance committee BEFORE you start — <strong>pick people who'll push you, not just agree.</strong> Set milestones. Track everything. Each of the 5 reports is a real checkpoint, not a formality."},
"manage-events":{tip:"<strong>EVENTS ARE 80% PREP, 20% EXECUTION.</strong> The day of the event is too late to solve anything.",avoid:"Don't skip the run-of-show document. Don't cut logistics people from credit in your speech. Don't hide what went wrong.",how:"Prep: venue, budget, run-of-show minute-by-minute, roles (MC, tech, host, greeter), communications, contingencies (speaker cancels, AV fails, weather). Day-of: delegate, stay visible, don't do everything yourself. Speech: <strong>one thing that broke and how the team saved it.</strong>"},
"team-build":{tip:"Don't confuse team <strong>BUILDING</strong> with team <strong>BONDING</strong>. Bonding = pizza parties. Building = creating a team that delivers together under pressure.",avoid:"Don't just organize a fun event. Don't pick low-commitment activities that don't stress the team. Don't skip the post-event reflection.",how:"Design an activity that <strong>REQUIRES COLLABORATION</strong> — escape room, build challenge, volunteer day. Observe: who leads, who follows, who mediates, who disappears. Pre-event report: your plan. Post-event speech: the dynamics you observed, what you learned about building trust."},
"speak-prof":{tip:"A pro-level keynote is <strong>ONE BIG IDEA, EXPRESSED UNFORGETTABLY</strong>. It's not a TED talk imitation — it's your voice at full volume.",avoid:"Don't fill 20 min with content. Don't use corporate-keynote template (rhetorical question → 3 points → close). Don't read from notes.",how:"Find your <strong>CENTRAL ASSERTION</strong> — the one thing you want the audience to believe by the end. Build 3 acts around it. Open with a visceral story, close with a callback. Rehearse 10+ times OUT LOUD. Watch how the best pros use stillness — amateur energy is movement."},
"vol-org":{tip:"<strong>VOLUNTEER LEADERSHIP IS DIFFERENT.</strong> You can't fire anyone. You have to motivate with meaning, not compensation.",avoid:"Don't treat volunteers like employees. Don't skip the succession plan — it's what separates leaders from heroes. Don't hide mistakes.",how:"6+ months serving. Monthly journal. At month 4: start the <strong>succession plan</strong> — identify your replacement, train them, document everything. Month 5: 360°. Speech: how volunteer leadership forces you to lead differently — influence > authority."},
"dev-vision":{tip:"<strong>VISION WITHOUT PLAN IS A DAYDREAM.</strong> This project requires both — and they're equally important.",avoid:"Don't be vague ('I want to be successful'). Don't make the plan too loose. Don't stop at the speech — actually do it.",how:"Vision speech: <strong>where you'll be in 3–5 years, why it matters</strong>, the person you'll have become. Use concrete imagery (specific role, specific scale, specific impact). Plan speech: <strong>year 1 milestones, skills to build, relationships to form, specific 90-day next steps</strong>. Real plans have dates."},
"lessons":{tip:"<strong>LESSONS-LEARNED MEETINGS ARE WHERE TEAMS GROW</strong> — but most are a waste of time. Your job is to run a GOOD one.",avoid:"Don't let it become a blame session. Don't skip the 'what went well' part. Don't end without action items.",how:"Structure: <strong>4 questions</strong> — what went well, what didn't, what surprised us, what we'd do differently. 5 min each, everyone speaks. Record. Assign 2–3 action items with owners. Speech: the most valuable insight + what you learned about facilitation."},
"moderate":{tip:"<strong>THE MODERATOR IS NOT THE STAR.</strong> Your job is to make the panelists look good and the conversation flow.",avoid:"Don't let one panelist dominate. Don't ask softballs. Don't get in the way — the audience is there for them, not you.",how:"Research each panelist deeply. Prep 8–10 questions but use only 4–6 — the best follow-ups come from listening. <strong>Bridge</strong> panelists' points ('Alex, you just said X — Priya, you've written the opposite, what's your take?'). Timekeep. End strong."},
"ethical":{tip:"<strong>ETHICS IS NOT A LECTURE — IT'S A CONVERSATION.</strong> Your job is to create space for hard questions, not deliver answers.",avoid:"Don't moralize. Don't pick a framework you haven't wrestled with yourself. Don't shut down dissenting voices on the panel.",how:"Pick a framework (utilitarianism, deontology, virtue ethics, care ethics). Apply it to 3–4 specific scenarios your audience faces. Diverse panelists, 20–40 min panel + Q&A. <strong>The goal is discomfort → reflection → action.</strong>"},
};

function ttBuildQueue(themeId){
  let prompts;
  if(themeId==="all"){
    prompts=[];
    TOPICS_THEMES.forEach(t=>{prompts=prompts.concat(t.prompts);});
  }else{
    const theme=TOPICS_THEMES.find(t=>t.id===themeId);
    prompts=theme?theme.prompts.slice():[];
  }
  // Fisher-Yates shuffle
  for(let i=prompts.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [prompts[i],prompts[j]]=[prompts[j],prompts[i]];
  }
  TT.queue=prompts;
  TT.idx=0;
}

function ttNext(){
  TT.idx++;
  if(TT.idx>=TT.queue.length){
    // Reshuffle so the user can keep tapping Next indefinitely
    ttBuildQueue(TT.theme);
  }
}

// Runtime state — not persisted; fresh shuffle on each session
let WOD={queue:[],idx:0,tier:"all"};

function wodBuildQueue(tier){
  WOD.tier=tier||WOD.tier||"all";
  const pool=WOD.tier==="all"?WORDS.slice():WORDS.filter(w=>w.t===WOD.tier);
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  WOD.queue=pool;
  WOD.idx=0;
}

function wodNext(){
  WOD.idx++;
  if(WOD.idx>=WOD.queue.length)wodBuildQueue();
}

 practical:`<h4>The No-Nonsense Version</h4>
<ul>
<li><strong>Speaker's name goes LAST.</strong> Build up to it. The name is the prize.</li>
<li><strong>Use P.O.E.T.S:</strong> Project, Objective, Evaluator, Timing, Title… then SPEAKER.</li>
<li><strong>Stop the excessive applause.</strong> Make it count — people get tired clapping for nothing.</li>
<li><strong>Transitions under 30 seconds.</strong> You're the bridge, not the destination.</li>
<li><strong>Forgot an intro? Skip it.</strong> Smooth flow beats awkward note-checking.</li>
</ul>`,
 official:`<h4>Roles and Responsibilities</h4>
<p>Coordinate and conduct the entire meeting; introduce participants; act as genial host. Set the tone and maintain room energy.</p>
<h4>Prior to the Meeting</h4>
<ul><li>Contact role-takers for speaker information</li><li>Confirm meeting theme and program changes</li><li>Prepare bridging remarks between sections</li></ul>
<h4>Upon Arrival (15 min early)</h4>
<ul><li>Check if role-takers have arrived</li><li>Sit near front for quick stage access</li></ul>
<h4>During the Meeting</h4>
<ul><li>Speak with sincerity, energy, enthusiasm, decisiveness</li><li>Begin and end on time</li><li>Announce sudden role changes at the start</li><li>Walk through all sessions at the start</li><li>Encourage applause and handshakes at changeovers</li><li>For overtime speakers: lead applause and encourage them to sit</li><li>Introduce speakers using P.O.E.T.S — speaker's name <strong>last</strong></li></ul>`
},
{id:"timer",icon:"⏱️",short:"Timer",full:"Timer",color:"#F2C94C",
 practical:`<h4>The No-Nonsense Version</h4>
<ul>
<li><strong>Sit FRONT ROW facing the speaker.</strong> If they can't see your cards, you're useless.</li>
<li><strong>Hold cards UP and STEADY.</strong> Don't flash for 1 second. Hold until acknowledged.</li>
<li><strong>Report: only mention over/under time.</strong> Don't list everyone's time.</li>
<li><strong>Know the rules BEFORE you start.</strong> Green/yellow/red + bell. Different for Table Topics.</li>
</ul>`,
 official:`<h4>Roles and Responsibilities</h4>
<p>Monitor time for each meeting segment and each speaker.</p>
<h4>Prior to the Meeting</h4>
<ul><li>Confirm time allotted to each prepared speech with all speakers</li><li>Rehearse explanation of timing rules</li></ul>
<h4>Upon Arrival (15 min early)</h4>
<ul><li>Collect timing equipment from SAA</li><li>Check equipment is working</li><li>Sit in first row facing stage where signals are visible</li></ul>
<h4>Timing Rules</h4>
<p><strong>Prepared Speeches (5–7 min):</strong> Green = 5, Yellow = 6, Red = 7, Bell = 7:30 STOP</p>
<p><strong>Table Topics (1–2 min):</strong> Green = 1, Yellow = 1:30, Red = 2, Bell = 2:30 STOP</p>
<p><strong>Individual Evaluator (2–3 min):</strong> Green = 2, Yellow = 2:30, Red = 3, Bell = 3:30 STOP</p>
<h4>During the Meeting</h4>
<ul><li>Record each participant's name and exact time</li><li>Time the break — indicate 2 minutes before it ends</li><li>In Timer's Report: mention only over/under speakers for Table Topics</li><li>Inform TMD/TTM of any disqualifications</li></ul>`
},
{id:"ah",icon:"👂",short:"Ah-Counter",full:"Ah-Counter",color:"#7BA7CC",
 practical:`<h4>The No-Nonsense Version</h4>
<ul>
<li><strong>Be SPECIFIC.</strong> Say "Sarah used 'um' 3 times and 'you know' twice" — NOT "Sarah had 5 filler words." There's no such thing as "ah words."</li>
<li><strong>Track fillers AND gender misuse</strong> (he/she confusion) separately.</li>
<li><strong>Don't count natural connectors.</strong> Only when "and/so/but" are clearly stalling.</li>
<li><strong>Guests are EXEMPT.</strong> Track EVERYONE else on stage — including TMD, TTM, GE.</li>
</ul>`,
 official:`<h4>Roles and Responsibilities</h4>
<p>Track filler sounds and words (um, er, so, like, you know, basically, right) and gender misuse (he/she confusion). Report specific fillers — not just totals.</p>
<h4>During the Meeting</h4>
<ul><li>Explain your role and give examples of common fillers</li><li>Track the <strong>specific filler</strong> each person uses (not just a count)</li><li>Report by naming the exact fillers: "Sarah used 'um' 3 times and 'you know' twice" — NOT "Sarah had 5 filler words"</li><li>Track gender misuse separately</li><li>Announce 'Ah King' or 'Ah Queen' of the day (members only, guests excluded)</li></ul>`
},
{id:"gram",icon:"✍️",short:"Grammarian",full:"Grammarian",color:"#BB6BD9",
 practical:`<h4>The No-Nonsense Version</h4>
<ul>
<li><strong>Pick a USEFUL word.</strong> "Resilient," not "sesquipedalian." Write it BIG on the board.</li>
<li><strong>Say "when appropriate" not "as much as possible."</strong></li>
<li><strong>Report: lead with good stuff.</strong> Top 3 great phrases + top 2 gentle corrections. Under 2 minutes.</li>
<li><strong>Say "room for improvement" not "mistake."</strong></li>
</ul>`,
 official:`<h4>Roles and Responsibilities</h4>
<p>Introduce word of the day, comment on language used, provide examples of good grammar and word usage.</p>
<h4>Prior to the Meeting</h4>
<ul><li>Select a word of the day that builds vocabulary and fits daily conversation</li><li>Communicate word of the day for agenda inclusion</li></ul>
<h4>Upon Arrival</h4>
<ul><li>Write word of the day on whiteboard: word, part of speech, definition, example sentence</li><li>Collect grammarian's log from SAA</li></ul>
<h4>During the Meeting</h4>
<ul><li>Announce word of the day — state part of speech, definition, use in sentence</li><li>Invite speakers to use it when appropriate</li><li>Note awkward language, incorrect grammar, mispronunciations</li><li>Note good phrases, words, and adjectives</li><li>Track who used word of the day correctly and how many times</li><li>Use "room for improvement" instead of "mistake"</li></ul>`
},
{id:"ttm",icon:"🎯",short:"TTM",full:"Table Topics Master",color:"#2D9CDB",
 practical:`<h4>The No-Nonsense Version</h4>
<ul>
<li><strong>This is practice for YOU to craft great questions.</strong> That's the whole point — not delivering a presentation.</li>
<li><strong>PPT is nice, but don't rely on it.</strong> If you can't run TT without slides, you've missed the point.</li>
<li><strong>Intro under 2 min. Between speakers: 30 sec MAX.</strong></li>
<li><strong>Start with experienced members, end with a strong speaker.</strong></li>
<li><strong>Invite guests — don't force them.</strong> Prepare 10 questions, use 6.</li>
</ul>`,
 official:`<h4>Roles and Responsibilities</h4>
<p>Prepare and issue original, creative topics. Speakers may get individual subjects or choose from options.</p>
<h4>Prior to the Meeting</h4>
<ul><li>Confirm meeting theme with TMD</li><li>Review questions with VPE at least 2 days before</li><li>Create list of speakers for the meeting</li></ul>
<h4>During the Meeting</h4>
<ul><li>State purpose of Table Topics; review timing rules</li><li>1st and 2nd speakers: invite club members, especially senior members</li><li>Middle: randomly select members or guests</li><li>End: invite a senior member to close the session</li><li>Encourage guests who want to join to participate</li><li>DO NOT go over 2 minutes for your introduction</li><li>DO NOT speak more than 1 minute between speakers</li><li>Ask speakers to write their names on the board after speaking</li><li>Adjust number of topics to end on time</li></ul>`
},
{id:"speaker",icon:"🎤",short:"Speaker",full:"Prepared Speech Speaker",color:"#E8A04C",
 practical:`<h4>The No-Nonsense Version</h4>
<ul>
<li><strong>Know your project objectives BEFORE writing.</strong> Don't write a great speech that misses the point.</li>
<li><strong>Talk to your evaluator BEFORE the meeting.</strong> Tell them what you want feedback on.</li>
<li><strong>Rehearse 3 times OUT LOUD, standing up, timed.</strong> Reading silently is NOT rehearsal.</li>
<li><strong>Walk to stage with confidence.</strong> Shoulders back, head up. Audience decides in 5 seconds.</li>
</ul>`,
 official:`<h4>Roles and Responsibilities</h4>
<p>Members prepare speeches based on projects in the Toastmasters Pathways Education System.</p>
<h4>Prior to the Meeting</h4>
<ul><li>Log on to TI website to confirm your next project in Pathways</li><li>Download project files and review them</li><li>Begin working on your speech early — allow time for research, organization, rehearsal</li><li>Communicate with evaluator and mentor about your project</li><li>Discuss goals and areas you want the evaluator to note</li></ul>
<h4>During the Meeting</h4>
<ul><li>Give full attention to speakers — avoid studying notes while others talk</li><li>Walk with confidence to the lectern</li><li>Wait for TMD to return to lectern before sitting</li><li>Listen to evaluation for helpful advice</li></ul>
<h4>After the Meeting</h4>
<ul><li>Ask evaluator questions about scores or comments</li><li>Review written notes from other members</li><li>Log on to TI website to finalize project completion</li><li>If level is complete, submit a completion request to VPE</li></ul>`
},
{id:"ie",icon:"🪞",short:"Evaluator",full:"Individual Evaluator",color:"#EB5757",
 practical:`<h4>The No-Nonsense Version</h4>
<ul>
<li><strong>Evaluate PROJECT OBJECTIVES, not just the speech.</strong> If the project is "Body Language" — evaluate body language.</li>
<li><strong>Specific praise.</strong> Not "great job" — "Your pause after the opening question made the room lean in."</li>
<li><strong>Offer SOLUTIONS, not problems.</strong> "Pause 2 seconds after key points" beats "You spoke too fast."</li>
<li><strong>Never say "but."</strong> Use "AND" or "What could make it even better…"</li>
</ul>`,
 official:`<h4>Roles and Responsibilities</h4>
<p>Identify where speakers succeeded and where there is room for growth. Help members be more self-confident and improve their speaking skills.</p>
<h4>Prior to the Meeting</h4>
<ul><li>Communicate with the speaker for project information</li><li>Review the project content and objectives</li></ul>
<h4>Key Evaluation Guidelines</h4>
<ul><li><strong>Evaluate based on project objectives</strong> — speeches are the medium for delivering objectives, not always the sole objective</li><li>Example: If the project is "Understanding Your Own Humor," evaluate whether the speaker understood their humor — not just speech technique</li><li><strong>Level 1 & 2:</strong> 2 positive points + 2 points for improvement</li><li><strong>Levels 3–5:</strong> 3 positive points + 2 points for improvement</li><li>Begin and end with encouragement or praise</li><li>Suggest specific solutions, not just problems</li><li>Focus on skills and accomplishments, not personal attributes</li><li>Refrain from reading your notes — cover the essentials</li></ul>`
},
{id:"ge",icon:"🦅",short:"GE",full:"General Evaluator",color:"#5BC0BE",
 practical:`<h4>The No-Nonsense Version</h4>
<ul>
<li><strong>Evaluate EVERYTHING except prepared speeches</strong> — that's the IE's job.</li>
<li><strong>Sit at the BACK.</strong> Note what DIDN'T happen — gaps matter more than highlights.</li>
<li><strong>Evaluate EVERY role-taker:</strong> TMD, Timer, Ah-Counter, Grammarian, TTM, SAA, all IEs.</li>
<li><strong>Under 5 minutes.</strong> Top 3 wins, top 2 improvements. Be honest but kind.</li>
</ul>`,
 official:`<h4>Roles and Responsibilities</h4>
<p>Evaluate everything that takes place throughout the meeting. Responsible for the evaluation team: Timer, Grammarian, Ah-Counter, and Individual Evaluators.</p>
<h4>Prior to the Meeting</h4>
<ul><li>Confirm program with TMD and any changes</li><li>Communicate with all IEs — confirm who they evaluate</li><li>Emphasize positive, supportive, and honest evaluations</li><li>Remind evaluation team of assignments</li><li>Prepare brief talk on evaluation purpose and techniques</li></ul>
<h4>Upon Arrival (15 min early)</h4>
<ul><li>Ensure all role-takers are present — consult VPE for substitutes if needed</li><li>Ensure IEs have materials and understand the criteria</li><li>Sit near the back of the room for a better view</li></ul>
<h4>During the Meeting</h4>
<ul><li>Take notes on everything — including things that should happen but don't</li><li>Check club properties are properly displayed</li><li>Monitor if meeting and sections begin/end on time</li><li>Evaluate ALL role-takers: Timer, Ah-Counter, Grammarian, IEs, TTM, and the general meeting standard</li><li><strong>DO NOT evaluate Prepared Speech Speakers</strong> — that's the IE's job</li></ul>`
}
];

function gP(pc,lv){
  if(lv===1)return{r:L1,e:[],en:0};
  if(lv===2)return{r:L2[pc],e:[],en:0};
  if(lv===3){const x=L3X[pc]||[];return{r:[L3R[pc]],e:L3E.filter(i=>!x.includes(i)&&i!==L3R[pc]),en:2};}
  if(lv===4){const x=L4X[pc]||[];return{r:[L4R[pc]],e:L4E.filter(i=>!x.includes(i)&&i!==L4R[pc]),en:1};}
  if(lv===5){const x=L5X[pc]||[];const rr=L5R[pc];return{r:rr,e:L5E.filter(i=>!x.includes(i)&&!rr.includes(i)),en:1};}
  return{r:[],e:[],en:0};
}

const STORAGE_KEY="tmc-companion-v1";

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const parsed=JSON.parse(raw);S=Object.assign(S,parsed);}
    // Guarantee partsDone exists — older saved state from v<=0.19 won't have it
    if(!S.partsDone)S.partsDone={};
    if(!S.pathArchive)S.pathArchive={};
    if(!S.aiConfig)S.aiConfig={enabled:true,mode:"backend",apiKey:"",endpoint:"/.netlify/functions/coach",model:"claude-sonnet-4-6"};
    if(S.tourSeen===undefined)S.tourSeen=false;
    // Migration: existing users with a path are path-mode by inference.
    // Only force welcome on true fresh installs.
    if(S.mode===undefined)S.mode="";
    if(!S.mode&&S.path)S.mode="path";
    if(S.alacarteComfort===undefined)S.alacarteComfort="";
  }catch(e){console.warn("load failed",e);}
}
function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(S));return true;}
  catch(e){console.warn("save failed",e);return false;}
}

// ═══ Per-path progress archive ═══
// Projects completed on PM shouldn't appear done on DL. switchPath() archives
// the current path's progress into S.pathArchive[oldPath] and restores the
// target path's progress from S.pathArchive[newPath] (or initializes fresh).
// All code continues to read from S.done / S.partsDone / etc. as if there's
// only one active path — the archive is transparent.
function switchPath(newCode){
  if(S.path===newCode)return; // nothing to do
  if(S.path){
    // Archive current path's state
    S.pathArchive[S.path]={
      done:S.done||{},
      partsDone:S.partsDone||{},
      notes:S.notes||{},
      photos:S.photos||{},
      levelSubmitted:S.levelSubmitted||{}
    };
  }
  // Restore target path's archived state, or fresh start
  const archived=S.pathArchive[newCode];
  if(archived){
    S.done=archived.done||{};
    S.partsDone=archived.partsDone||{};
    S.notes=archived.notes||{};
    S.photos=archived.photos||{};
    S.levelSubmitted=archived.levelSubmitted||{};
  }else{
    S.done={};
    S.partsDone={};
    S.notes={};
    S.photos={};
    S.levelSubmitted={};
  }
  S.path=newCode;
  save();
}

}

// Hex -> rgba utility for per-path colored backgrounds/borders
function hexToRgba(hex,a){
  const h=hex.replace("#","");
  const r=parseInt(h.substr(0,2),16);
  const g=parseInt(h.substr(2,2),16);
  const b=parseInt(h.substr(4,2),16);
  return"rgba("+r+","+g+","+b+","+a+")";
}

// Hex → slight hue shift for mesh gradient secondary/tertiary blobs.
function hexShift(hex,amount){
  const h=hex.replace("#","");
  let r=parseInt(h.substr(0,2),16);
  let g=parseInt(h.substr(2,2),16);
  let b=parseInt(h.substr(4,2),16);
  r=Math.max(0,Math.min(255,r+amount));
  g=Math.max(0,Math.min(255,g+Math.round(amount*-0.3)));
  b=Math.max(0,Math.min(255,b+Math.round(amount*0.6)));
  return"#"+r.toString(16).padStart(2,"0")+g.toString(16).padStart(2,"0")+b.toString(16).padStart(2,"0");
}

// Build a per-cube aurora mesh background style string.
// Returns "background:...;border-color:..." — caller splices into inline style.
function auroraMeshStyle(colorHex,intensity){
  const k=intensity||1.0;
  const c1=colorHex;
  const c2=hexShift(colorHex,35);
  const c3=hexShift(colorHex,-30);
  return'background:'+
    'radial-gradient(ellipse 85% 60% at 20% 15%,'+hexToRgba(c2,0.7*k)+' 0%,transparent 55%),'+
    'radial-gradient(ellipse 75% 70% at 85% 85%,'+hexToRgba(c3,0.55*k)+' 0%,transparent 55%),'+
    hexToRgba(c1,0.22*k)+
    ';border-color:'+hexToRgba(c1,0.42*k);
}

// RENDER — router
// ═══════════════════════════════════════════════════════════════════════════

function render(){
  const app=document.getElementById("app");
  // Safety: if we leave the fullscreen timer, make sure it pauses (battery + wake lock)
  if(V.view!=="timer"&&T.running)pauseTimer();
  // Safety: if we leave the filler detector while it's active, stop it
  if(V.view!=="filler"&&FD.phase==="active")fdStop(false);

  if(V.view==="hub"){renderHub(app);}
  else if(V.view==="picker"){renderPathPicker(app);}
  else if(V.view==="quiz-intro"){renderQuizIntro(app);}
  else if(V.view==="quiz-q"){renderQuizQuestion(app);}
  else if(V.view==="quiz-result"){renderQuizResult(app);}
  else if(V.view==="pathfinder-intro"){renderPathfinderIntro(app);}
  else if(V.view==="pathfinder-q"){renderPathfinderQuestion(app);}
  else if(V.view==="pathfinder-building"){renderPathfinderBuilding(app);}
  else if(V.view==="pathfinder-program"){renderPathfinderProgram(app);}
  else if(V.view==="settings"){renderSettings(app);}
  else if(V.view==="ai-settings"){renderAISettings(app);}
  else if(V.view==="ai-coach"){renderAICoach(app);}
  else if(V.view==="my-paths"){renderMyPaths(app);}
  else if(V.view==="welcome"){renderWelcome(app);}
  else if(V.view==="welcome-alacarte"){renderWelcomeAlacarte(app);}
  else if(V.view==="all-projects"){renderAllProjects(app);}
  else if(V.view==="project"&&V.viewingProject){renderProjectDetail(app,V.viewingProject);}
  else if(V.view==="role"&&V.viewingRole){renderRoleDetail(app,V.viewingRole);}
  else if(V.view==="roles"){renderRolesGrid(app);}
  else if(V.view==="practice"){renderPracticeHub(app);}
  else if(V.view==="timer-select"){renderTimerSelect(app);}
  else if(V.view==="timer"){renderTimerFullScreen(app);}
  else if(V.view==="topics-select"){renderTopicsSelect(app);}
  else if(V.view==="topics-practice"){renderTopicsPractice(app);}
  else if(V.view==="wod"){renderWODTool(app);}
  else if(V.view==="filler"){renderFillerDetector(app);}
  else if(V.view==="browser"){renderPathBrowser(app);}
  else{renderHub(app);} // unknown view -> hub
  try{window.scrollTo(0,0);}catch{}
  renderModal();
  renderBottomNav();
}

// ═══════════════════════════════════════════════════════════════════════════
// HUB — the home screen. Portal to each tool area. Always accessible via
// bottom nav. Shows current path progress if a path is selected.
// Each card is a colored callout matching the old club-app design language —
// tinted background at 6% opacity, colored border at 25%, branded CTA button.
// ═══════════════════════════════════════════════════════════════════════════

function renderHub(app){
  const p=S.path?PA[S.path]:null;

  // Totals for hero progress bar
  let totalReq=0,totalDone=0,pct=0;
  if(p){
    for(let lv=1;lv<=5;lv++){
      const g=gP(S.path,lv);
      totalReq+=g.r.length+g.en;
      totalDone+=g.r.filter(pid=>S.done[pid]).length;
      totalDone+=Math.min(g.en,g.e.filter(pid=>S.done[pid]).length);
    }
    pct=totalReq>0?Math.round(totalDone/totalReq*100):0;
  }

  let h='<div class="fade-up">';
  h+='<div class="hub-top-row">';
  h+='<div class="kicker" style="margin-bottom:0">Toastmasters Companion</div>';
  h+='<div class="hub-icon-group">';
  h+='<button class="hub-gear ai" data-action="open-ai-settings" aria-label="AI Settings">✨</button>';
  h+='<button class="hub-gear" data-action="open-settings" aria-label="Settings">⚙</button>';
  h+='</div>';
  h+='</div>';
  h+='<h1 class="title">Communication toolkit for <span class="accent">excellence</span></h1>';
  h+='<div class="subtitle">'+(p?'Continue where you left off or pick a tool.':'Pick a path to get started — or jump straight into a tool.')+'</div>';

  // ═══ SMART SUGGESTIONS — dashboard panel with 3-4 rows ═══
  // `_hubFlashed` runtime flag: the whole panel gets a gentle border pulse on
  // first hub visit per session. Not a collapse toggle — the panel stays open.
  const suppressFlash=V._hubFlashed===true;
  const sugs=getSmartSuggestions();

  // Header stats — current level + level progress + % overall
  let headerStats="";
  if(p){
    const currentLv=getCurrentLevel(S.path);
    const lvG=gP(S.path,currentLv);
    const lvDone=lvG.r.filter(pid=>S.done[pid]).length+Math.min(lvG.en,lvG.e.filter(pid=>S.done[pid]).length);
    const lvTotal=lvG.r.length+lvG.en;
    const dash=Math.round(pct*0.94);
    headerStats='<div class="smart-panel-stats-text">L'+currentLv+' · '+lvDone+'/'+lvTotal+'</div>';
    headerStats+='<div class="smart-panel-ring">';
    headerStats+='<svg width="36" height="36" viewBox="0 0 36 36">';
    headerStats+='<circle cx="18" cy="18" r="15" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2.2"/>';
    headerStats+='<circle cx="18" cy="18" r="15" fill="none" stroke="'+p.c+'" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="'+dash+' 94"/>';
    headerStats+='</svg>';
    headerStats+='<div class="smart-panel-ring-pct">'+pct+'%</div>';
    headerStats+='</div>';
  }

  h+='<div class="smart-panel'+(suppressFlash?' collapsed':' flashing')+'">';
  h+='<div class="smart-panel-header" data-smart-toggle>';
  h+='<div class="smart-panel-title"><span class="smart-panel-icon">💡</span><span>Smart Suggestions</span><span class="smart-panel-chev">▼</span></div>';
  if(headerStats)h+='<div class="smart-panel-stats">'+headerStats+'</div>';
  h+='</div>';
  h+='<div class="smart-panel-rows">';
  sugs.forEach(row=>{
    const cls="smart-row"+(row.highlight?" highlight-row":"");
    h+='<button class="'+cls+'" data-sug-action="'+row.action+'">';
    h+='<div class="smart-row-icon">'+row.icon+'</div>';
    h+='<div class="smart-row-text">';
    h+='<div class="smart-row-title">'+row.title+'</div>';
    h+='<div class="smart-row-desc">'+row.desc+'</div>';
    h+='</div>';
    h+='<div class="smart-row-arrow">→</div>';
    h+='</button>';
  });
  h+='</div>';
  h+='</div>';

  // Aurora tile helper — same system as path cubes, just smaller
  function tile(cfg){
    const cls="hub-tile"+(cfg.placeholder?" placeholder":"");
    const dataAttr=cfg.placeholder?"":' data-hub="'+cfg.hub+'"';
    const mesh=auroraMeshStyle(cfg.color,cfg.placeholder?0.55:1.0);
    let s='<button class="'+cls+'"'+dataAttr+' style="'+mesh+'">';
    // Top-left progress ring (My Path tile when user has an active path)
    if(cfg.ring){
      const dash=Math.round(cfg.ring.pct*0.69);
      s+='<div class="hub-tile-ring">';
      s+='<svg width="22" height="22" viewBox="0 0 22 22">';
      s+='<circle cx="11" cy="11" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>';

    s+='<div class="hub-tile-name">'+cfg.name+'</div>';
    s+='</button>';
    return s;
  }

  // ═══ HUB TILES — layout shifts based on S.mode ═══
  h+='<div class="hub-tiles">';
  if(S.mode==="alacarte"){
    // Ala carte: Practice + All Projects are primary. Club Roles + a soft
    // "Considering a path?" tile fill the secondary row. Pathfinder is absent
    // (no path → no plan to generate) but re-surfaces if they switch modes.
    h+=tile({hub:"practice",glyph:"practice",color:"#5EB975",name:"Practice"});
    h+=tile({hub:"all-projects",glyph:"path",color:"#D4A94C",name:"All Projects"});
    h+=tile({hub:"roles",glyph:"roles",color:"#E85D3A",name:"Club Roles"});
    h+=tile({hub:"path",glyph:"pathfinder",color:"#5B9DD9",name:"Try a Path"});
    h+=tile({hub:"ai-coach",glyph:"coach",color:"#A07BC7",name:"AI Coach"});
    h+=tile({glyph:"community",color:"#DB8A6A",name:"Community",badge:"Soon",placeholder:true});
  }else{
    // Path mode: original 6-tile layout with Pick a Path primary.
    h+=tile({hub:"path",glyph:"path",color:p?p.c:"#6DB6B4",
             name:p?"My Paths":"Pick a Path",
             ring:p?{pct:pct}:null});
    h+=tile({hub:"roles",glyph:"roles",color:"#D4A94C",name:"Club Roles"});
    h+=tile({hub:"practice",glyph:"practice",color:"#5EB975",name:"Practice"});
    h+=tile({hub:"pathfinder",glyph:"pathfinder",color:"#5B9DD9",name:"Pathfinder"});
    h+=tile({hub:"ai-coach",glyph:"coach",color:"#A07BC7",name:"AI Coach"});
    h+=tile({glyph:"community",color:"#DB8A6A",name:"Community",badge:"Soon",placeholder:true});
  }
  h+='</div>';

  h+='<div class="app-footer">Toastmasters Companion · v0.36 · Your progress saves on this device</div>';
  h+='</div>';
  app.innerHTML=h;

  // ═══ Wire handlers ═══
  const gear=app.querySelector('[data-action="open-settings"]');
  if(gear)gear.addEventListener("click",()=>{V.view="settings";render();});
  const aiBtn=app.querySelector('[data-action="open-ai-settings"]');
  if(aiBtn)aiBtn.addEventListener("click",()=>{V.view="ai-settings";render();});
  app.querySelectorAll("[data-hub]").forEach(card=>{
    if(card.classList.contains("placeholder"))return;
    card.addEventListener("click",()=>{
      const target=card.dataset.hub;
      if(target==="path"){
        // Route to My Paths dashboard when they have at least one enrolled
        // path (active OR archived). If truly empty, fall through to picker.
        const anyArchived=Object.keys(S.pathArchive||{}).some(k=>pathHasActivity(S.pathArchive[k]));
        if(S.path||anyArchived){V.view="my-paths";}
        else{V.view="picker";}
      }
      else if(target==="roles"){V.view="roles";}
      else if(target==="practice"){V.view="practice";}
      else if(target==="pathfinder"){V.view="pathfinder-intro";}
      else if(target==="all-projects"){V.view="all-projects";}
      else if(target==="ai-coach"){V.view="ai-coach";}
      else if(target==="quiz"){V.view="quiz-intro";}
      render();
    });
  });

  // Smart panel flash-then-collapse. Mirrors old pill behavior — flashes on
  // first hub visit, auto-collapses after the animation finishes. User can
  // re-expand by tapping the header.
  if(!V._hubFlashed){
    V._hubFlashed=true;
    setTimeout(()=>{
      const panel=document.querySelector(".smart-panel");
      if(panel&&panel.isConnected&&!panel.classList.contains("collapsed")){
        panel.classList.remove("flashing");
        panel.classList.add("collapsed");
      }
    },2500);
  }
  const panelHdr=app.querySelector("[data-smart-toggle]");
  if(panelHdr){
    panelHdr.addEventListener("click",e=>{
      // Don't toggle when the user taps the progress ring/stats area
      if(e.target.closest(".smart-panel-stats"))return;
      panelHdr.parentElement.classList.toggle("collapsed");
    });
  }

  // Delegated click handler for any suggestion row. `action` may be a view
  // name OR "project:<pid>" for a deep-link into project detail.
  app.querySelectorAll("[data-sug-action]").forEach(row=>{
    row.addEventListener("click",()=>{
      const action=row.dataset.sugAction;
      if(action==="tour"){
        // Launch the tour overlay. startTour handles view-switching + timing.
        startTour();
        return;
      }
      if(action.startsWith("project:")){
        const pid=action.slice(8);
        if(PD[pid]){
          V.view="project";
          V.viewingProject=pid;
        }
      }else if(action==="quiz"){V.view="quiz-intro";}
      else if(action==="path"){V.view="browser";}
      else if(action==="picker"){V.view="picker";}
      else if(action==="practice"){V.view="practice";}
      else if(action==="roles"){V.view="roles";}
      else if(action==="pathfinder"){V.view="pathfinder-intro";}
      else if(action==="timer"){V.view="timer-select";T.returnTo="practice";}
      else if(action==="topics"){V.view="topics-select";}
      else if(action==="filler"){V.view="filler";FD.phase="idle";}
      else if(action==="wod"){V.view="wod";wodBuildQueue();}
      render();
    });
  });
}

function renderQuizQuestion(app){
  const step=V.quizStep;
  if(step>=QUIZ_QUESTIONS.length){V.view="quiz-result";render();return;}
  const q=QUIZ_QUESTIONS[step];
  const pct=Math.round(((step+1)/QUIZ_QUESTIONS.length)*100);

  let h='<div class="fade-up">';
  h+='<div class="quiz-top-row">';
  h+='<button class="top-bar-btn" data-action="quiz-back">← Back</button>';
  h+='<div class="quiz-step-label">Question '+(step+1)+' of '+QUIZ_QUESTIONS.length+'</div>';
  h+='</div>';

  h+='<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:'+pct+'%"></div></div>';

  h+='<div class="quiz-question">'+q.q+'</div>';

  h+='<div class="quiz-opts">';
  q.opts.forEach((o,i)=>{
    h+='<button class="quiz-opt" data-idx="'+i+'">'+o.t+'</button>';
  });
  h+='</div>';
  h+='</div>';
  app.innerHTML=h;

  app.querySelector('[data-action="quiz-back"]').addEventListener("click",()=>{
    if(step===0){V.view="quiz-intro";}
    else{V.quizStep--;}
    render();
  });
  app.querySelectorAll("[data-idx]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const idx=parseInt(btn.dataset.idx,10);
      const scores=QUIZ_QUESTIONS[step].opts[idx].s;
      Object.entries(scores).forEach(([k,v])=>{V.quizScores[k]=(V.quizScores[k]||0)+v;});
      V.quizStep++;
      if(navigator.vibrate){try{navigator.vibrate(8);}catch{}}
      render();
    });
  });
}

// PATH PICKER — main 6 + legacy toggle, cards open destination modal
// ═══════════════════════════════════════════════════════════════════════════

// Render a single aurora-style path cube.
// Layering (bottom → top):
//   1. Solid base tint (strong path color at ~18% opacity) for surface feel
//   2. Mesh gradient — two radial blobs in path-color variants positioned
//      at corners to create an aurora/liquid-glass depth look
//   3. Glyph in top-left + monogram badge in top-right
//   4. Path name at bottom
function renderPathCardHtml(code,isLegacy){
  const p=PA[code];
  const c1=p.c;
  const c2=hexShift(p.c,35);
  const c3=hexShift(p.c,-30);
  const baseTintOpacity=isLegacy?0.14:0.22;
  const borderOpacity=isLegacy?0.3:0.45;

  const mesh=
    'background:'+
    'radial-gradient(ellipse 85% 60% at 20% 15%,'+hexToRgba(c2,0.7)+' 0%,transparent 55%),'+
    'radial-gradient(ellipse 75% 70% at 85% 85%,'+hexToRgba(c3,0.55)+' 0%,transparent 55%),'+
    hexToRgba(c1,baseTintOpacity);

  const glyph=PATH_GLYPHS[code]||'<svg viewBox="0 0 48 48"></svg>';

  let h='<div class="path-card'+(isLegacy?' legacy':'')+'" data-code="'+code+'" style="--pc:'+c1+';border-color:'+hexToRgba(c1,borderOpacity)+';'+mesh+'">';
  h+='<div class="path-card-badge">'+code+'</div>';
  h+='<div class="path-card-glyph">'+glyph+'</div>';
  h+='<div class="path-card-name">'+p.n+'</div>';
  h+='</div>';
  return h;
}

function renderPathPicker(app){
  let h='<div class="fade-up">';
  h+='<div class="kicker">Toastmasters Companion</div>';
  h+='<h1 class="title">Choose your <span class="accent">path</span></h1>';
  h+='<div class="subtitle">Tap any card to see where it leads — destination first, then decide.</div>';

  // Main 6
  h+='<div class="path-grid" id="path-grid-main">';
  ACTIVE_PATHS.forEach(code=>{h+=renderPathCardHtml(code,false);});
  h+='</div>';

  // Legacy toggle — wide card-like button (rendered into a container we can target)
  h+='<div class="legacy-toggle-wrap" id="legacy-toggle-wrap">';
  h+=renderLegacyToggleHtml();
  h+='</div>';

  // Legacy grid container — empty or populated. Targeted updates write here
  // directly, so the rest of the page never re-renders (fixes flicker).
  h+='<div id="legacy-grid-host">';
  if(V.showLegacy)h+=renderLegacyGridHtml();
  h+='</div>';

  h+='<div class="quiz-prompt">';
  h+='<button class="quiz-prompt-btn" data-action="open-quiz">🧭 &nbsp; Not sure which one? Take the fun quiz</button>';
  h+='</div>';

  h+='<div class="app-footer">Toastmasters Companion · v0.36 · Built with ❤️ for Toastmasters</div>';
  h+='</div>';
  app.innerHTML=h;

  wirePathCards(app);
  wireLegacyToggle(app);
  const qb=app.querySelector('[data-action="open-quiz"]');
  if(qb)qb.addEventListener("click",()=>{V.view="quiz-intro";render();});
}

function renderLegacyToggleHtml(){
  if(!V.showLegacy)return'<button class="legacy-toggle" data-action="show-legacy">📦  Show 5 legacy paths</button>';
  return'<button class="legacy-toggle" data-action="hide-legacy">📦  Hide legacy paths</button>';
}

function renderLegacyGridHtml(){
  let h='<div class="path-grid">';
  LEGACY_PATHS.forEach(code=>{h+=renderPathCardHtml(code,true);});
  h+='</div>';
  return h;
}

function wirePathCards(scope){
  scope.querySelectorAll(".path-card").forEach(card=>{
    if(card.dataset.wired)return;
    card.dataset.wired="1";
    card.addEventListener("click",()=>{
      V.pathDetailShown=card.dataset.code;
      renderModal();
    });
  });
}

function wireLegacyToggle(scope){
  // Delegated click on the toggle wrap — survives targeted DOM replacements.
  const wrap=scope.querySelector("#legacy-toggle-wrap");
  if(!wrap||wrap.dataset.wired)return;
  wrap.dataset.wired="1";
  wrap.addEventListener("click",e=>{
    const btn=e.target.closest('[data-action]');
    if(!btn)return;
    const action=btn.dataset.action;
    if(action!=="show-legacy"&&action!=="hide-legacy")return;
    V.showLegacy=(action==="show-legacy");
    // Targeted DOM swap — no full re-render, no flicker, no scroll jump
    wrap.innerHTML=renderLegacyToggleHtml();
    const host=document.getElementById("legacy-grid-host");
    if(host){
      host.innerHTML=V.showLegacy?renderLegacyGridHtml():"";
      if(V.showLegacy)wirePathCards(host);
    }
  });
}

  // Actions row: button layout depends on welcome-flow context.
  // If user came from "I already have a path" welcome branch, we know they
  // already have progress to tick off — skip the dual-button noise and go
  // straight into setup mode via a single combined action.
  h+='<div class="modal-actions">';
  if(V._welcomeFlag==="existing-path"){
    h+='<button class="modal-cta" data-action="choose-path-started" data-code="'+code+'">Choose &amp; tick off what I\'ve done →</button>';
  }else{
    h+='<button class="modal-cta" data-action="choose-path" data-code="'+code+'">Choose Path →</button>';
    h+='<button class="modal-secondary-cta" data-action="choose-path-started" data-code="'+code+'">I\'ve already started this path</button>';
  }
  h+='<button class="modal-back" data-action="close-modal">Back</button>';
  h+='</div>';

  h+='</div>';
  h+='</div>';
  root.innerHTML=h;

  // Wire up
  const backdrop=root.querySelector(".modal-backdrop");
  backdrop.addEventListener("click",e=>{
    if(e.target.dataset.close==="1"){closeModal();}

  root.querySelectorAll('[data-action="close-modal"]').forEach(btn=>{
    btn.addEventListener("click",closeModal);
  });
  const choosePathBtn=root.querySelector('[data-action="choose-path"]');
  if(choosePathBtn)choosePathBtn.addEventListener("click",e=>{
    const code=e.currentTarget.dataset.code;
    switchPath(code);
    V.pathDetailShown=null;
    V.view="browser";
    render();
  });
  const startedBtn=root.querySelector('[data-action="choose-path-started"]');
  if(startedBtn)startedBtn.addEventListener("click",e=>{
    const code=e.currentTarget.dataset.code;
    switchPath(code);
    V.pathDetailShown=null;
    V._pathSetupMode=true; // path browser will show setup banner
    V._welcomeFlag=null;   // consumed — welcome is done
    V.view="browser";
    render();
  });
}

function closeModal(){
  V.pathDetailShown=null;
  renderModal();
}

// PATH BROWSER — levels + projects
