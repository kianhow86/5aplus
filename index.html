<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0B0F">
<title>Toastmasters Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
:root{
  /* Surface — near-black with cool undertone */
  --bg:#0A0B0F;
  --bg-2:#0F1115;
  --bg-3:#15171D;

  /* Translucent card/panel surfaces */
  --surface:rgba(255,255,255,0.035);
  --surface-2:rgba(255,255,255,0.06);
  --surface-3:rgba(255,255,255,0.09);

  /* Borders — always very low-opacity white */
  --border:rgba(255,255,255,0.07);
  --border-strong:rgba(255,255,255,0.13);

  /* Text tiers — iOS labelColor set */
  --text:rgba(255,255,255,0.96);
  --text-2:rgba(235,235,245,0.68);
  --text-3:rgba(235,235,245,0.42);
  --text-4:rgba(235,235,245,0.26);

  /* Single refined accent (desaturated sophisticated teal) */
  --accent:#6DB6B4;
  --accent-hi:#82C4C2;
  --accent-soft:rgba(109,182,180,0.1);
  --accent-border:rgba(109,182,180,0.28);
  --accent-border-strong:rgba(109,182,180,0.45);

  /* Semantic — muted iOS-palette */
  --green:#5EB975;
  --red:#E85D5D;
  --amber:#E5B352;
  --blue:#5B9DD9;
  --purple:#A07BC7;

  /* Legacy aliases (older selectors still reference these) */
  --bg2:var(--bg-2);--bg3:var(--bg-3);
  --cyan:var(--accent);--cyan2:var(--accent-hi);--cyan3:var(--accent-hi);
  --text-muted:var(--text-2);--text-dim:var(--text-3);
  --card:var(--surface);
  --border-cyan:var(--accent-border);--border-cyan2:var(--accent-border-strong);
}
*{box-sizing:border-box;margin:0;padding:0}
*::selection{background:var(--accent-soft);color:var(--text)}
html,body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  letter-spacing:-0.003em;
}
body{
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(109,182,180,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 100% 120%,rgba(109,182,180,0.035) 0%,transparent 50%),
    var(--bg);
  background-attachment:fixed;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;letter-spacing:inherit}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
a{color:inherit;text-decoration:none}

/* Glow orbs — retained in markup for structure but hidden; body now provides ambient tint */
.glow{display:none}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(40px,30px)}}

.container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:calc(env(safe-area-inset-top,0px) + 28px) 20px calc(env(safe-area-inset-bottom,0px) + 60px)}

/* ═══ Typography — system-first, tighter, quieter ═══ */
.kicker{font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:12px}
.title{font-size:34px;font-weight:700;letter-spacing:-0.024em;line-height:1.09;margin-bottom:10px;color:var(--text)}
.title .accent{color:var(--accent);font-weight:700;font-style:normal;background:none;-webkit-text-fill-color:currentColor;filter:none}
.subtitle{font-size:15px;color:var(--text-2);line-height:1.5;margin-bottom:28px;font-weight:400;letter-spacing:-0.005em;max-width:560px}

/* Top bar */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:8px}
.top-bar-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:7px 13px;border-radius:18px;font-size:12px;font-weight:500;font-family:inherit;transition:all .18s ease;white-space:nowrap;letter-spacing:-0.003em;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.top-bar-btn:hover{background:rgba(255,255,255,0.08);color:var(--text);border-color:rgba(255,255,255,0.2)}
.top-bar-btn.danger{color:rgba(235,87,87,0.8)}
.top-bar-btn.danger:hover{color:var(--red);border-color:rgba(235,87,87,0.3)}

/* Path summary banner */
.path-summary{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:24px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.path-summary-icon{font-size:44px;line-height:1;}
.path-summary-info{flex:1;min-width:0}
.path-summary-name{font-weight:600;font-size:16px;margin-bottom:3px;letter-spacing:-0.015em;color:var(--text)}
.path-summary-prog{font-size:12.5px;color:var(--text-3)}
.path-summary-ring{flex-shrink:0;width:56px;height:56px;position:relative}
.path-summary-ring svg{transform:rotate(-90deg)}
.path-summary-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;font-weight:700}

/* Path picker grid */
/* ═══ ACTIVE PATH HERO — featured card on hub ═══ */
.active-path-hero{position:relative;border-radius:22px;padding:20px 22px;margin-bottom:14px;overflow:hidden;border:1px solid;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);cursor:pointer;transition:transform .18s ease,filter .18s ease;width:100%;text-align:left;font-family:inherit;display:block}
.active-path-hero::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.1) 50%,transparent 100%);transform:translateX(-100%);transition:transform .6s ease,opacity .3s ease;z-index:3}
.active-path-hero:hover{transform:translateY(-2px);filter:brightness(1.08)}
.active-path-hero:hover::after{opacity:1;transform:translateX(100%)}
.active-path-hero:active{transform:translateY(0) scale(0.99)}
.active-path-hero-top{position:relative;z-index:2;display:flex;align-items:center;gap:14px;margin-bottom:14px}
.active-path-hero-mono{width:46px;height:46px;border-radius:12px;background:rgba(0,0,0,0.32);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;letter-spacing:-0.02em;color:#fff;flex-shrink:0;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.active-path-hero-text{flex:1;min-width:0}
.active-path-hero-kicker{font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:2px}
.active-path-hero-name{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.016em;line-height:1.2;text-shadow:0 1px 6px rgba(0,0,0,0.35)}
.active-path-hero-pct{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 1px 6px rgba(0,0,0,0.35)}
.active-path-hero-bar{position:relative;z-index:2;height:6px;background:rgba(0,0,0,0.3);border-radius:3px;overflow:hidden;margin-bottom:12px}
.active-path-hero-fill{height:100%;background:#fff;border-radius:3px;transition:width .6s cubic-bezier(.22,.61,.36,1)}
.active-path-hero-level{position:relative;z-index:2;font-size:13px;color:rgba(255,255,255,0.88);letter-spacing:-0.003em;margin-bottom:14px;line-height:1.4;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
.active-path-hero-cta{position:relative;z-index:2;display:inline-flex;align-items:center;padding:9px 16px;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:10px;font-weight:600;font-size:13px;letter-spacing:-0.003em;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

/* ═══ Smart Suggestion chip ═══ */
/* ═══ Smart Suggestions panel — dashboard card with multiple rows ═══ */
.smart-panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px 16px 14px;margin-bottom:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:padding .35s ease}
.smart-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;cursor:pointer;transition:margin-bottom .35s ease}
.smart-panel-title{display:flex;align-items:center;gap:10px;font-size:15.5px;font-weight:700;color:var(--text);letter-spacing:-0.012em;flex:1;min-width:0}
.smart-panel-icon{font-size:18px;line-height:1;filter:drop-shadow(0 0 12px rgba(244,183,64,0.4))}
.smart-panel-chev{font-size:12px;color:var(--text-3);margin-left:8px;transition:transform .3s ease;line-height:1}
.smart-panel-stats{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-3);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-0.003em}
.smart-panel-stats-text{line-height:1}
.smart-panel-ring{position:relative;width:36px;height:36px;flex-shrink:0}
.smart-panel-ring svg{transform:rotate(-90deg)}
.smart-panel-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
.smart-panel-rows{display:flex;flex-direction:column;gap:8px;overflow:hidden;max-height:1000px;opacity:1;transition:max-height .4s cubic-bezier(.22,.61,.36,1),opacity .25s ease}
.smart-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.04);border-radius:11px;cursor:pointer;transition:background .15s ease,border-color .15s ease,transform .12s ease;font-family:inherit;text-align:left;width:100%}
.smart-row:hover{background:rgba(0,0,0,0.28);border-color:rgba(255,255,255,0.1)}
.smart-row:active{transform:scale(0.98)}
.smart-row-icon{flex-shrink:0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1}
.smart-row-text{flex:1;min-width:0}
.smart-row-title{font-size:13.5px;font-weight:700;color:var(--text);letter-spacing:-0.008em;line-height:1.25;margin-bottom:2px}
.smart-row-desc{font-size:12px;color:var(--text-2);letter-spacing:-0.002em;line-height:1.35}
.smart-row-arrow{color:var(--text-3);font-size:16px;flex-shrink:0}
.smart-row:hover .smart-row-arrow{color:var(--text-2)}

/* Collapsed state — header only, rows tucked away */
.smart-panel.collapsed{padding:12px 16px}
.smart-panel.collapsed .smart-panel-header{margin-bottom:0}
.smart-panel.collapsed .smart-panel-rows{max-height:0;opacity:0}
.smart-panel.collapsed .smart-panel-chev{transform:rotate(-90deg)}

@keyframes smartPanelFlash{
  0%{box-shadow:0 0 0 0 transparent;border-color:var(--border)}
  35%{box-shadow:0 0 0 5px var(--accent-soft);border-color:var(--accent-border-strong)}
  100%{box-shadow:0 0 0 0 transparent;border-color:var(--border)}
}
.smart-panel.flashing{animation:smartPanelFlash 1.3s cubic-bezier(.22,.61,.36,1) both}

/* ═══ Hub tiles — unified aurora cube style, same system as path cubes ═══ */
.hub-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
.hub-tile{position:relative;aspect-ratio:1;border-radius:16px;cursor:pointer;border:1px solid;transition:transform .15s ease,filter .15s ease;font-family:inherit;overflow:hidden;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hub-tile::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.12) 50%,transparent 100%);transform:translateX(-100%);transition:transform .6s ease,opacity .3s ease;z-index:3}
.hub-tile:hover{transform:translateY(-2px);filter:brightness(1.1)}
.hub-tile:hover::after{opacity:1;transform:translateX(100%)}
.hub-tile:active{transform:translateY(0) scale(0.98)}
.hub-tile.placeholder{cursor:default;opacity:0.5}
.hub-tile.placeholder:hover{transform:none;filter:none}
.hub-tile-glyph{position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);width:88px;height:88px;color:#fff;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3));z-index:2}
.hub-tile-glyph svg{width:100%;height:100%}
.hub-tile-name{position:absolute;bottom:9px;left:11px;right:11px;font-size:12px;font-weight:700;color:#fff;letter-spacing:-0.012em;line-height:1.15;text-shadow:0 1px 6px rgba(0,0,0,0.55);z-index:2}
.hub-tile-badge{position:absolute;top:8px;right:8px;font-size:8px;font-weight:700;letter-spacing:0.1em;padding:2px 6px;background:rgba(0,0,0,0.38);color:#fff;border-radius:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.14);text-transform:uppercase;z-index:2}
/* Progress ring on My Path tile — top-left corner */
.hub-tile-ring{position:absolute;top:8px;left:8px;width:22px;height:22px;z-index:2}
.hub-tile-ring svg{transform:rotate(-90deg)}
.hub-tile-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;text-shadow:0 1px 3px rgba(0,0,0,0.5)}

/* ═══ List rows — used on Roles + Practice pages ═══ */
.list-rows{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.list-row{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:background .15s ease,border-color .15s ease;font-family:inherit;text-align:left;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);width:100%}
.list-row:hover{background:var(--surface-2);border-color:var(--border-strong)}
.list-row:active{transform:scale(0.995)}
.list-row.placeholder{cursor:default;opacity:0.55}
.list-row.placeholder:hover{background:var(--surface);border-color:var(--border)}
.list-row-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;border:1px solid}
.list-row-text{flex:1;min-width:0}
.list-row-name{font-size:14.5px;font-weight:600;color:var(--text);letter-spacing:-0.008em;line-height:1.25}
.list-row-desc{font-size:12px;color:var(--text-3);line-height:1.35;margin-top:2px;letter-spacing:-0.003em}
.list-row-arrow{color:var(--text-3);font-size:18px;flex-shrink:0}
.list-row-badge{font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);background:rgba(255,255,255,0.06);padding:3px 7px;border-radius:5px;margin-right:6px}

/* ═══ AURORA PATH CUBES — mesh gradient + SVG glyph + monogram badge ═══ */
.path-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:400px){.path-grid{grid-template-columns:repeat(2,1fr)}}
.path-card{position:relative;border:1px solid;border-radius:20px;cursor:pointer;transition:transform .2s ease,filter .2s ease;overflow:hidden;min-height:168px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.path-card::before{display:none}
.path-card::after{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:0;
  background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.14) 50%,transparent 100%);
  transform:translateX(-100%);transition:transform .6s ease,opacity .3s ease;z-index:3
}
.path-card:hover{transform:translateY(-3px);filter:brightness(1.1)}
.path-card:hover::after{opacity:1;transform:translateX(100%)}
.path-card:active{transform:translateY(-1px) scale(0.98);transition-duration:.08s}

.path-card-mesh{position:absolute;inset:0;z-index:0;pointer-events:none}

/* Glyph — CENTERED, big, with subtle lift via drop-shadow */
.path-card-glyph{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:76px;height:76px;color:#fff;filter:drop-shadow(0 3px 10px rgba(0,0,0,0.3));z-index:2}
.path-card-glyph svg{width:100%;height:100%}

/* Monogram badge — small, top-right */
.path-card-badge{position:absolute;top:12px;right:12px;z-index:2;font-size:9.5px;font-weight:700;letter-spacing:0.1em;padding:3px 8px;background:rgba(0,0,0,0.3);color:#fff;border-radius:6px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.14)}

/* Name — absolute bottom, full width, left-aligned */
.path-card-name{position:absolute;bottom:12px;left:14px;right:14px;z-index:2;font-size:13.5px;font-weight:700;line-height:1.2;letter-spacing:-0.015em;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.45)}

.path-card.legacy{opacity:0.85}
.path-card-desc{display:none}
.path-card-mono{display:none}
.path-card-icon{display:none}
.path-card-top{display:none}
.path-card-bottom{display:none}

/* Legacy toggle - unchanged */
.legacy-toggle-wrap{margin:22px 0 14px}
.legacy-toggle{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:14px 20px;border-radius:14px;font-size:14px;font-weight:500;font-family:inherit;transition:background .18s ease,color .18s ease,border-color .18s ease;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);letter-spacing:-0.003em}
.legacy-toggle:hover{background:var(--surface-2);color:var(--text)}
.legacy-note{display:none}

/* ═══ Club role cubes — parity with hub cube size ═══ */
.roles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.role-card{position:relative;aspect-ratio:1;border-radius:18px;cursor:pointer;transition:transform .18s ease,filter .18s ease;overflow:hidden;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid;font-family:inherit}
.role-card::before{display:none}
.role-card::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.12) 50%,transparent 100%);transform:translateX(-100%);transition:transform .6s ease,opacity .3s ease;z-index:3}
.role-card:hover{transform:translateY(-2px);filter:brightness(1.1)}
.role-card:hover::after{opacity:1;transform:translateX(100%)}
.role-card:active{transform:translateY(0) scale(0.98)}
.role-card-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:34px;line-height:1;z-index:2;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3))}
.role-card-text{position:absolute;bottom:10px;left:10px;right:10px;z-index:2;display:flex;flex-direction:column;gap:1px}
.role-card-name{font-size:12.5px;font-weight:700;color:#fff;letter-spacing:-0.012em;line-height:1.15;text-shadow:0 1px 6px rgba(0,0,0,0.45)}
.role-card-full{font-size:10px;color:rgba(255,255,255,0.82);line-height:1.2;font-weight:500;letter-spacing:-0.002em;text-shadow:0 1px 4px rgba(0,0,0,0.4)}

/* ═══ Path browser — dynamic progress bar + path-colored accents ═══ */
.path-progress-hero{margin:8px 0 22px}
.path-progress-hero-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.path-progress-hero-label{display:flex;align-items:baseline;gap:8px}
.path-progress-hero-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.018em}
.path-progress-hero-sub{font-size:12.5px;color:var(--text-3);letter-spacing:-0.003em;font-variant-numeric:tabular-nums}
.path-progress-hero-pct{font-size:24px;font-weight:700;color:var(--pc,var(--accent));letter-spacing:-0.024em;font-variant-numeric:tabular-nums;line-height:1}
.path-progress-hero-bar{height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden;position:relative}
.path-progress-hero-fill{height:100%;background:var(--pc,var(--accent));border-radius:5px;transition:width .6s cubic-bezier(.22,.61,.36,1);box-shadow:0 0 16px var(--pc,var(--accent))}

/* Path-color propagation — when --pc is set at the browser root, these inherit */
.path-scope .level-num{background:var(--pc)}
.path-scope .level-card.is-active{border-color:var(--pc);background:var(--surface-2)}
.path-scope .level-card.is-active .level-num{box-shadow:0 0 0 3px rgba(255,255,255,0.12)}
.path-scope .level-progress.complete{color:var(--pc)}
.path-scope .level-submit-btn{background:var(--pc)}
.path-scope .title .accent{color:var(--pc)}

/* Level number morph — when current level advances (eg L1→L2 on mark complete).
   Old number fades up-and-out, new number zooms in with path-color glow. */
.title .accent.morphing-out{animation:levelMorphOut .38s cubic-bezier(.4,0,.6,1) forwards}
.title .accent.morphing-in{animation:levelMorphIn .85s cubic-bezier(.22,1.3,.36,1)}
@keyframes levelMorphOut{
  from{opacity:1;transform:translateY(0) scale(1)}
  to{opacity:0;transform:translateY(-14px) scale(0.65)}
}
@keyframes levelMorphIn{
  0%{opacity:0;transform:translateY(18px) scale(0.6);filter:drop-shadow(0 0 0 transparent)}
  40%{opacity:1;transform:translateY(0) scale(1.45);filter:drop-shadow(0 0 32px var(--pc,#6DB6B4)) drop-shadow(0 0 12px var(--pc,#6DB6B4)) brightness(1.7)}
  70%{transform:scale(1.1);filter:drop-shadow(0 0 22px var(--pc,#6DB6B4)) brightness(1.35)}
  100%{opacity:1;transform:scale(1);filter:none}
}

/* Electives collapsible — one-tap toggle, chevron rotates */
.electives-section{margin-top:4px}
.electives-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:transparent;border:none;padding:10px 2px 8px;cursor:pointer;font-family:inherit;text-align:left}
.electives-toggle:hover .electives-count{color:var(--text-2)}
.electives-toggle-label{font-size:10.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.electives-count{font-size:11px;color:var(--text-3);font-weight:600;letter-spacing:-0.003em;display:flex;align-items:center;gap:4px;transition:color .15s ease}
.electives-count .chev{font-size:9px;transition:transform .25s ease;display:inline-block}
.electives-section.expanded .electives-count .chev{transform:rotate(180deg)}
.electives-body{max-height:0;overflow:hidden;opacity:0;transition:max-height .4s cubic-bezier(.22,.61,.36,1),opacity .25s ease}
.electives-section.expanded .electives-body{max-height:2000px;opacity:1}
.path-scope .level-complete-callout{border-left-color:var(--pc);background:color-mix(in srgb,var(--pc) 8%,transparent)}
.path-scope .path-summary-name{color:var(--text)}

/* Always-visible Mark Level Complete — includes 3 states */
.level-submit-btn.muted{background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);cursor:pointer}
.level-submit-btn.muted:hover{background:var(--surface-3);color:var(--text)}
.level-submit-btn.locked{background:rgba(255,255,255,0.03);color:var(--text-3);border:1px solid var(--border);cursor:not-allowed;opacity:0.7}
.level-submit-btn.locked:hover{background:rgba(255,255,255,0.03);color:var(--text-3)}
.level-submit-btn-subtle{font-size:12px;color:var(--text-3);margin-top:8px;text-align:center;line-height:1.4;letter-spacing:-0.003em}

/* ═══ Celebration — confetti + pulse ═══ */
.celebrate-modal{animation:slideUp .45s cubic-bezier(.22,.61,.36,1) both,celebratePulse 2s ease-in-out .45s infinite}
@keyframes celebratePulse{
  0%,100%{box-shadow:0 24px 60px rgba(0,0,0,0.55),0 0 0 0 var(--pc,rgba(109,182,180,0.6))}
  50%{box-shadow:0 24px 60px rgba(0,0,0,0.55),0 0 0 8px transparent}
}
.celebrate-modal.size-sm{animation:slideUp .45s cubic-bezier(.22,.61,.36,1) both,celebratePulseSm 1.6s ease-in-out .3s infinite}
@keyframes celebratePulseSm{
  0%,100%{box-shadow:0 24px 60px rgba(0,0,0,0.55),0 0 0 0 var(--pc,rgba(109,182,180,0.5))}
  50%{box-shadow:0 24px 60px rgba(0,0,0,0.55),0 0 0 6px transparent}
}

/* Confetti particles — positioned over the backdrop, fall with rotation */
.confetti-host{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.confetti-piece{position:absolute;top:-20px;width:10px;height:14px;border-radius:2px;animation:confettiFall 2.4s cubic-bezier(.2,.6,.4,1) forwards}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  80%{opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0.2}
}

/* Path detail modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(10,11,15,0.82);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:calc(env(safe-area-inset-top,0px) + 32px) 16px calc(env(safe-area-inset-bottom,0px) + 32px);overflow-y:auto;animation:fadeIn .3s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{position:relative;max-width:540px;width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:24px;padding:32px 26px 24px;box-shadow:0 24px 60px rgba(0,0,0,0.55);animation:slideUp .4s cubic-bezier(.22,.61,.36,1) both}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:15px;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .18s ease;z-index:2}
.modal-close:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.modal-icon{display:none}
.modal-kicker{display:none}
/* Title: path icon INLINE with title, title in the path's color */
.modal-title{display:flex;align-items:center;gap:12px;font-size:28px;font-weight:700;letter-spacing:-0.024em;line-height:1.12;margin-bottom:16px;margin-right:36px;color:var(--pc,var(--accent))}
.modal-title-icon{font-size:28px;line-height:1;flex-shrink:0}
.modal-desc{font-size:15.5px;color:var(--text);line-height:1.55;margin-bottom:24px;letter-spacing:-0.005em;font-weight:400}
.modal-divider{height:1px;background:var(--border);margin:18px 0}
.modal-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.13em;color:var(--pc,var(--accent));margin-bottom:10px;display:flex;align-items:center;gap:8px}
.modal-section-label .m-icon{font-size:14px}
.modal-section-text{font-size:15px;color:var(--text);line-height:1.55;margin-bottom:4px;letter-spacing:-0.003em;font-weight:400}
.modal-outcome-list{list-style:none;padding:0;margin:2px 0 16px}
.modal-outcome-list li{padding:7px 0 7px 24px;position:relative;font-size:14.5px;color:var(--text);line-height:1.45;letter-spacing:-0.003em}
.modal-outcome-list li::before{content:"→";position:absolute;left:2px;top:7px;color:var(--text-3);font-weight:500;font-size:15px}
.modal-icons-hint{font-size:13px;color:var(--text-3);font-style:italic;margin:12px 0 22px;padding:0;background:none;border:none;letter-spacing:-0.003em}

/* Action row: big path-colored Choose CTA + "already started" + secondary Back */
.modal-actions{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.modal-cta{width:100%;padding:16px 20px;background:var(--pc,var(--accent));color:#0A0B0F;border-radius:14px;font-weight:700;font-size:15px;letter-spacing:-0.005em;cursor:pointer;font-family:inherit;border:none;transition:filter .15s ease,transform .15s ease}
.modal-cta:hover{filter:brightness(1.08)}
.modal-cta:active{transform:scale(0.98)}
.modal-secondary-cta{width:100%;padding:12px 18px;background:transparent;color:var(--text-2);border:1px solid var(--border);border-radius:12px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit;transition:background .15s ease,color .15s ease,border-color .15s ease;letter-spacing:-0.003em}
.modal-secondary-cta:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-strong)}
.modal-back{width:100%;padding:11px 18px;background:transparent;color:var(--text-3);border:none;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;transition:color .15s ease}
.modal-back:hover{color:var(--text-2)}

/* Path setup banner — shown when entering a path via "I've already started" */
.path-setup-banner{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:rgba(109,182,180,0.08);border:1px solid rgba(109,182,180,0.3);border-radius:14px;margin:14px 0 18px}
.path-setup-icon{font-size:22px;line-height:1;flex-shrink:0;margin-top:1px}
.path-setup-body{flex:1;min-width:0}
.path-setup-title{font-size:13.5px;font-weight:700;color:var(--accent);margin-bottom:4px;letter-spacing:-0.003em}
.path-setup-text{font-size:12.5px;color:var(--text-2);line-height:1.5;letter-spacing:-0.003em}
.path-setup-text strong{color:var(--text);font-weight:700}
.path-setup-dismiss{background:transparent;border:none;color:var(--text-3);font-size:14px;cursor:pointer;font-family:inherit;padding:2px 6px;margin:-4px -8px 0 0;border-radius:6px;transition:background .15s,color .15s;flex-shrink:0}
.path-setup-dismiss:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.path-setup-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.path-setup-plan-btn{padding:9px 14px;background:linear-gradient(135deg,#A07BC7,#6DB6B4);color:#0A0B0F;border:none;border-radius:10px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;letter-spacing:-0.003em;transition:filter .15s,transform .12s}
.path-setup-plan-btn:hover{filter:brightness(1.1)}
.path-setup-plan-btn:active{transform:scale(0.98)}
.path-setup-later-btn{padding:9px 14px;background:transparent;color:var(--text-3);border:1px solid var(--border);border-radius:10px;font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;letter-spacing:-0.003em;transition:background .15s,color .15s,border-color .15s}
.path-setup-later-btn:hover{background:rgba(255,255,255,0.04);color:var(--text-2);border-color:var(--border-strong)}

/* Level cards */
.level-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .25s ease,background .25s ease;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.level-card.complete{border-color:var(--border-cyan2)}
.level-card.expanded{border-color:var(--border-cyan)}
.level-header{padding:16px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;-webkit-user-select:none}
.level-header:hover{background:rgba(255,255,255,0.02)}
.level-header-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1}
.level-num{flex-shrink:0;width:32px;height:32px;background:var(--accent);color:#0A0B0F;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;letter-spacing:-0.012em}
.level-num-wrap{position:relative}
.level-text{min-width:0;flex:1}
.level-name{font-weight:700;font-size:15px;margin-bottom:2px;letter-spacing:-.005em}
.level-progress{font-size:12px;color:var(--text-dim)}
.level-progress.complete{color:var(--cyan)}
.level-chev{font-size:10px;color:var(--text-dim);transition:transform .25s;margin-left:8px;flex-shrink:0}
.level-card.expanded .level-chev{transform:rotate(180deg)}

.level-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.22,.61,.36,1)}
.level-card.expanded .level-body{max-height:3000px}
.level-body-inner{padding:4px 18px 18px}

/* ═══ Level Info & Requirements accordion ═══ */
.level-extras{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.level-extras-toggle{display:flex;align-items:center;gap:8px;background:transparent;border:none;padding:6px 0;color:var(--text-2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:-0.005em;transition:color .15s ease;width:100%;text-align:left}
.level-extras-toggle:hover{color:var(--text)}
.level-extras-chev{font-size:10px;transition:transform .25s ease;color:var(--text-3)}
.level-extras.expanded .level-extras-chev{transform:rotate(0deg)}
.level-extras:not(.expanded) .level-extras-chev{transform:rotate(-90deg)}
.level-extras-body{max-height:0;overflow:hidden;opacity:0;transition:max-height .4s cubic-bezier(.22,.61,.36,1),opacity .25s ease,margin-top .35s ease;display:flex;flex-direction:column;gap:10px}
.level-extras.expanded .level-extras-body{max-height:600px;opacity:1;margin-top:12px}
.level-extra-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:13px 14px}
.level-extra-card.edu{background:rgba(94,185,117,0.06);border-color:rgba(94,185,117,0.22)}
.level-extra-kicker{font-size:10.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#E85D5D;margin-bottom:6px}
.level-extra-kicker.edu-kicker{color:#5EB975}
.level-extra-text{font-size:13px;color:var(--text);line-height:1.5;letter-spacing:-0.003em}
.level-extra-text strong{font-weight:700;color:var(--text)}
.level-extra-note{font-size:11.5px;color:var(--text-3);line-height:1.45;margin-top:6px;font-style:italic;letter-spacing:-0.002em}
.section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin:14px 0 6px}
.section-hdr:first-child{margin-top:8px}

/* Project rows (in level browser) */
.project{border-top:1px solid rgba(255,255,255,0.05)}
.project:first-child{border-top:none}
.project-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0}
.project-check{flex-shrink:0;width:22px;height:22px;margin-top:1px;border:2px solid rgba(255,255,255,0.22);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent}
.project-check:hover{border-color:rgba(91,192,190,0.55)}
.project-check.done{background:linear-gradient(135deg,var(--cyan),var(--cyan2));border-color:var(--cyan);box-shadow:none}
.project-check.done::after{content:"✓";color:var(--bg2);font-weight:800;font-size:13px;line-height:1}
.project-main{flex:1;min-width:0;cursor:pointer}
.project-title-row{display:flex;align-items:flex-start;gap:8px}
.project-title{font-size:14px;font-weight:600;flex:1;letter-spacing:-.005em;line-height:1.4}
.project.done .project-title{text-decoration:line-through;color:var(--text-dim)}
.project-badge{flex-shrink:0;font-size:9px;font-weight:700;color:var(--text-dim);background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.project-meta{font-size:12px;color:var(--text-dim);margin-top:2px;line-height:1.4}
.project-chev{flex-shrink:0;color:var(--text-dim);font-size:11px;margin-top:4px}

/* Level 5 final callout */
.final-callout{background:linear-gradient(135deg,rgba(91,192,190,0.12),rgba(46,229,214,0.06));border:1px solid rgba(91,192,190,0.3);border-radius:14px;padding:16px;margin-top:14px}
.final-callout-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--cyan);margin-bottom:6px}
.final-callout-text{font-size:13px;color:var(--text-muted);line-height:1.5}
.path-complete-banner{background:rgba(109,182,180,0.08);border:1px solid rgba(109,182,180,0.28);border-radius:16px;padding:20px;text-align:center;margin-top:16px;box-shadow:none}
.path-complete-banner.hidden{display:none}
.path-complete-banner strong{color:var(--accent);font-size:17px;display:block;margin-bottom:4px;font-weight:700;letter-spacing:-0.02em}

/* ═══ Project detail (full-screen view) ═══ */
.pd-title{font-size:28px;font-weight:700;letter-spacing:-0.024em;margin-bottom:12px;line-height:1.12;color:var(--text)}
.pd-meta{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.pd-duration{font-size:14px;color:var(--text-dim)}
.pd-badge{display:inline-block;padding:4px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:6px;font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase}
.pd-badge.req{background:rgba(91,192,190,0.12);border-color:rgba(91,192,190,0.3);color:var(--cyan)}
.pd-summary-block{margin-bottom:24px}
.pd-summary-row{font-size:14px;line-height:1.55;color:var(--text-muted);margin-bottom:12px}
.pd-summary-row:last-child{margin-bottom:0}
.pd-summary-row strong{color:var(--text);font-weight:700;margin-right:2px}

/* Multi-part project progress — always expanded, per-part tick boxes.
   Appears between the summary block and the coaching sections, so it's the
   first thing you touch after reading purpose/overview. */
.pd-parts{background:rgba(109,182,180,0.05);border:1px solid rgba(109,182,180,0.22);border-radius:14px;padding:14px 14px 8px;margin-bottom:22px}
.pd-parts-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding:0 2px}
.pd-parts-label{font-size:10.5px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent)}
.pd-parts-progress{font-size:11px;color:var(--text-3);font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-0.003em;margin-left:auto}
.pd-part{display:flex;align-items:center;gap:12px;padding:10px 6px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background .12s ease;border-radius:8px}
.pd-part:last-child{border-bottom:none}
.pd-part:hover{background:rgba(255,255,255,0.03)}
.pd-part-check{width:22px;height:22px;flex-shrink:0;border:2px solid var(--text-3);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s ease,border-color .15s ease;color:transparent}
.pd-part-check.done{background:var(--accent);border-color:var(--accent);color:#0A0B0F}
.pd-part-check.done::after{content:"✓";font-size:13px;font-weight:800;line-height:1}
.pd-part-text{flex:1;min-width:0}
.pd-part-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.005em;line-height:1.3}
.pd-part.done .pd-part-name{color:var(--text-2);text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.22)}
.pd-part-dur{font-size:11.5px;color:var(--text-3);margin-top:2px;letter-spacing:-0.003em}
.pd-check-row{display:flex;align-items:center;gap:12px;margin:20px 0 24px;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s}
.pd-check-row:hover{background:rgba(91,192,190,0.05);border-color:rgba(91,192,190,0.25)}
.pd-check-row.done{background:rgba(91,192,190,0.08);border-color:rgba(91,192,190,0.35)}
.pd-check-box{flex-shrink:0;width:22px;height:22px;border:2px solid rgba(255,255,255,0.22);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pd-check-row.done .pd-check-box{background:linear-gradient(135deg,var(--cyan),var(--cyan2));border-color:var(--cyan);box-shadow:none}
.pd-check-row.done .pd-check-box::after{content:"✓";color:var(--bg2);font-weight:800;font-size:13px;line-height:1}
.pd-check-label{font-size:14px;font-weight:600;color:var(--text)}
.pd-check-row.done .pd-check-label{color:var(--cyan)}

/* Colored accordion sections */
.pd-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-left-width:4px;border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.pd-section.focus{border-left-color:var(--green);background:rgba(94,185,117,0.04)}
.pd-section.avoid{border-left-color:var(--red);background:rgba(232,93,93,0.04)}
.pd-section.how{border-left-color:var(--blue);background:rgba(91,157,217,0.04)}
.pd-section.notes{border-left-color:rgba(255,255,255,0.25)}
.pd-section.resources{border-left-color:rgba(255,255,255,0.15)}
.pd-section-hdr{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.pd-section-label{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.pd-section.focus .pd-section-label{color:var(--green)}
.pd-section.avoid .pd-section-label{color:var(--red)}
.pd-section.how .pd-section-label{color:var(--blue)}
.pd-section.notes .pd-section-label,.pd-section.resources .pd-section-label{color:rgba(255,255,255,0.72)}
.pd-section-chev{font-size:11px;color:var(--text-dim);transition:transform .2s}
.pd-section.expanded .pd-section-chev{transform:rotate(180deg)}
.pd-section-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.22,.61,.36,1)}
.pd-section.expanded .pd-section-body{max-height:2000px}
.pd-section-body-inner{padding:0 18px 16px;font-size:14px;line-height:1.6;color:var(--text-muted)}
.pd-section-body-inner strong{color:var(--text);font-weight:700}

/* Notes textarea */
.notes-textarea{width:100%;min-height:130px;padding:12px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;line-height:1.55;resize:vertical;margin-bottom:14px;-webkit-appearance:none;appearance:none}
.notes-textarea:focus{outline:none;border-color:rgba(91,192,190,0.4)}
.notes-textarea::placeholder{color:var(--text-dim)}
.notes-saved-hint{font-size:11px;color:var(--text-dim);font-style:italic;margin-bottom:12px}

/* Photos grid */
.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.photo-tile{aspect-ratio:1;border-radius:8px;background:rgba(255,255,255,0.05);position:relative;overflow:hidden}
.photo-tile img{width:100%;height:100%;object-fit:cover;display:block}
.photo-delete{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(5,11,22,0.85);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.15);line-height:1}
.photo-delete:hover{background:rgba(235,87,87,0.85);border-color:rgba(235,87,87,0.5)}
.photo-add{aspect-ratio:1;border:2px dashed rgba(255,255,255,0.2);border-radius:8px;background:rgba(255,255,255,0.02);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);font-size:24px;transition:all .2s;gap:4px}
.photo-add-label{font-size:10px;letter-spacing:.05em;text-transform:uppercase;font-weight:600}
.photo-add:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(91,192,190,0.05)}
.photo-input{display:none}
.photo-hint{font-size:11px;color:var(--text-dim);margin-top:8px;font-style:italic}

/* Resource links */
.resource-link{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--text);font-size:13px;margin-bottom:8px;transition:all .2s;line-height:1.4}
.resource-link:hover{background:rgba(91,192,190,0.08);border-color:rgba(91,192,190,0.3)}
.resource-link-icon{flex-shrink:0;font-size:14px}
.resource-link-title{flex:1;min-width:0}
.resource-link-arrow{color:var(--text-dim);font-size:11px;flex-shrink:0}
.resource-empty{color:var(--text-dim);font-size:13px;padding:4px 0 10px;font-style:italic}

/* Animations */
.fade-up{animation:fadeUp .5s cubic-bezier(.22,.61,.36,1) both}
.path-card:nth-child(1){animation-delay:.05s}
.path-card:nth-child(2){animation-delay:.1s}
.path-card:nth-child(3){animation-delay:.15s}
.path-card:nth-child(4){animation-delay:.2s}
.path-card:nth-child(5){animation-delay:.25s}
.path-card:nth-child(6){animation-delay:.3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Footer */
.app-footer{text-align:center;color:var(--text-dim);font-size:11px;margin-top:32px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.05)}

/* ═══ Bottom nav — solid, single hub button ═══ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#0A0B0F;border-top:1px solid var(--border);padding:10px 16px calc(env(safe-area-inset-bottom,0px) + 10px)}
.bottom-nav-inner{max-width:720px;margin:0 auto;display:flex;justify-content:center;align-items:center}
.nav-hub-btn{display:inline-flex;align-items:center;gap:9px;padding:11px 24px;background:var(--surface-2);border:1px solid var(--border-strong);color:var(--text);border-radius:22px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;letter-spacing:-0.005em;transition:background .18s ease,border-color .18s ease,transform .12s ease}
.nav-hub-btn:hover{background:var(--surface-3);border-color:var(--accent-border)}
.nav-hub-btn:active{transform:scale(0.97)}
.nav-hub-btn.active{background:var(--accent-soft);border-color:var(--accent-border-strong);color:var(--accent-hi)}
.nav-hub-btn-icon{font-size:17px;line-height:1}
.has-bottom-nav{padding-bottom:calc(env(safe-area-inset-bottom,0px) + 82px)}

/* ═══ Roles grid (sizing defined in top-level role cube block) ═══ */
.roles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}

/* ═══ Role detail ═══ */
.role-hero{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.role-hero-icon{font-size:48px;line-height:1;}
.role-hero-info{flex:1;min-width:0}
.role-hero-short{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--role-color,var(--cyan));margin-bottom:4px}
.role-hero-name{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Inter,sans-serif;font-size:28px;font-weight:900;letter-spacing:-.015em;line-height:1.1}

.mode-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:3px;margin-bottom:20px;gap:2px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.mode-btn{flex:1;padding:10px 12px;border:none;background:transparent;color:var(--text-dim);font-size:13px;font-weight:600;letter-spacing:.02em;font-family:inherit;border-radius:8px;cursor:pointer;transition:all .2s}
.mode-btn:hover{color:var(--text-muted)}
.mode-btn.active{background:var(--accent);color:#0A0B0F;box-shadow:none;font-weight:700}

.role-content{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 22px;font-size:14px;line-height:1.65;color:var(--text-muted)}
.role-content h4{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin:20px 0 10px}
.role-content h4:first-child{margin-top:0}
.role-content p{margin-bottom:12px;color:var(--text-muted)}
.role-content ul{margin:0 0 14px;padding-left:0;list-style:none}
.role-content li{position:relative;padding:7px 0 7px 22px;border-top:1px solid rgba(255,255,255,0.05);color:var(--text-muted);line-height:1.55}
.role-content li:first-child{border-top:none}
.role-content li::before{content:"";position:absolute;left:6px;top:16px;width:6px;height:6px;background:var(--role-color,var(--cyan));border-radius:50%}
.role-content strong{color:var(--text);font-weight:700}

.role-tools-note{margin-top:16px;padding:14px 16px;background:rgba(91,192,190,0.06);border:1px dashed rgba(91,192,190,0.25);border-radius:12px;font-size:12px;color:var(--text-dim);text-align:center;line-height:1.5}
.role-tools-note strong{color:var(--cyan);font-weight:700}

/* ═══ Practice hub ═══ */
.practice-tools{margin-top:8px;display:flex;flex-direction:column;gap:14px}

/* Tool card — quiet, restrained. Color used sparingly as tint + border. */
.tool-card{border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .18s ease,background .2s ease;overflow:hidden;position:relative;border:1px solid;text-align:left;backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%)}
.tool-card:hover{transform:translateY(-2px)}
.tool-card:active{transform:translateY(0) scale(0.995)}
.tool-card.disabled{cursor:default;opacity:.5}
.tool-card.disabled:hover{transform:none}
.tool-card-top{display:flex;align-items:center;gap:14px;margin-bottom:2px}
.tool-card-icon{font-size:28px;line-height:1}
.tool-card-headings{flex:1;min-width:0}
.tool-card-kicker{font-size:10px;font-weight:600;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px}
.tool-card-title{font-size:18px;font-weight:700;letter-spacing:-0.015em;line-height:1.15;color:var(--text)}
.tool-card-desc{font-size:13px;color:var(--text-2);line-height:1.5;margin-bottom:4px;letter-spacing:-0.003em}
.tool-card-cta{align-self:flex-start;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;letter-spacing:-0.005em;color:#0A0B0F;border:none;cursor:pointer;font-family:inherit;background:var(--tc,var(--accent));transition:filter .15s ease,transform .15s ease}
.tool-card-cta:hover{filter:brightness(1.08)}
.tool-card-cta:active{transform:scale(0.98)}
.tool-card-badge{align-self:flex-start;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);background:rgba(255,255,255,0.05);padding:4px 9px;border-radius:6px}
.tool-card-meta{font-size:12px;color:var(--text-2);line-height:1.45;margin-top:2px;letter-spacing:-0.003em}
.tool-card-meta strong{color:var(--text);font-weight:600}

/* ═══ Pathway Quiz ═══ */
.quiz-prompt{margin:22px 0 6px}
.quiz-prompt-btn{width:100%;padding:14px 20px;background:transparent;border:1px dashed var(--border-strong);color:var(--text-2);border-radius:14px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .18s ease,color .18s ease,border-color .18s ease;letter-spacing:-0.003em}
.quiz-prompt-btn:hover{background:var(--surface);color:var(--text);border-color:var(--accent-border)}

/* Quiz intro */
.quiz-intro-card{display:flex;align-items:flex-start;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:16px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.quiz-intro-icon{font-size:30px;line-height:1;flex-shrink:0;margin-top:-2px}
.quiz-intro-text{font-size:14px;color:var(--text-2);line-height:1.55;letter-spacing:-0.003em}
.quiz-intro-text strong{color:var(--text);font-weight:600}
.quiz-intro-what{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:22px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.quiz-intro-what-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);margin-bottom:8px}
.quiz-intro-what-body{font-size:14px;color:var(--text-2);line-height:1.6;letter-spacing:-0.003em}
.quiz-start-btn{width:100%;padding:16px 20px;background:var(--accent);color:#0A0B0F;border-radius:14px;font-weight:700;font-size:15px;letter-spacing:-0.005em;cursor:pointer;font-family:inherit;border:none;transition:filter .15s ease,transform .15s ease}
.quiz-start-btn:hover{filter:brightness(1.08)}
.quiz-start-btn:active{transform:scale(0.98)}
.quiz-browse-btn{width:100%;padding:14px 20px;margin-top:10px;background:transparent;color:var(--text-2);border:1px solid var(--border);border-radius:14px;font-weight:600;font-size:14px;letter-spacing:-0.005em;cursor:pointer;font-family:inherit;transition:background .15s ease,color .15s ease,border-color .15s ease}
.quiz-browse-btn:hover{background:var(--surface);color:var(--text);border-color:var(--border-strong)}

/* Quiz question screen */
.quiz-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px}
.quiz-step-label{font-size:12px;color:var(--text-3);font-weight:500;letter-spacing:-0.003em}
.quiz-progress-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:26px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--accent);transition:width .4s cubic-bezier(.22,.61,.36,1);border-radius:2px}
.quiz-question{font-size:22px;font-weight:700;color:var(--text);line-height:1.3;letter-spacing:-0.022em;margin-bottom:20px}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{text-align:left;padding:15px 17px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:13px;cursor:pointer;font-family:inherit;font-size:14.5px;line-height:1.5;transition:background .15s ease,border-color .15s ease,transform .1s ease;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);letter-spacing:-0.003em;width:100%}
.quiz-opt:hover{background:var(--surface-2);border-color:var(--accent-border)}
.quiz-opt:active{transform:scale(0.995)}

/* Quiz result */
.quiz-match-card{border-radius:18px;padding:24px 22px 22px;margin-bottom:22px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid}
.quiz-match-kicker{font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--pc);margin-bottom:10px}
.quiz-match-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.quiz-match-icon{font-size:38px;line-height:1;flex-shrink:0}
.quiz-match-name{font-size:24px;font-weight:700;color:var(--pc,var(--text));letter-spacing:-0.024em;line-height:1.1}
.quiz-match-desc{font-size:15px;color:var(--text);line-height:1.55;margin-bottom:18px;letter-spacing:-0.003em}
.quiz-match-outcomes-hdr{font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--pc,var(--text-3));margin-bottom:8px}
.quiz-match-outcomes{list-style:none;padding:0;margin:0 0 20px}
.quiz-match-outcomes li{padding:6px 0 6px 24px;position:relative;font-size:14px;color:var(--text);line-height:1.45;letter-spacing:-0.003em}
.quiz-match-outcomes li::before{content:"→";position:absolute;left:2px;top:6px;color:var(--text-3);font-weight:500}
.quiz-match-cta{width:100%;padding:16px 20px;background:var(--pc,var(--accent));color:#0A0B0F;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;border:none;transition:filter .15s ease,transform .15s ease;letter-spacing:-0.005em}
.quiz-match-cta:hover{filter:brightness(1.08)}
.quiz-match-cta:active{transform:scale(0.98)}

.quiz-runner-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);margin-bottom:10px}
.quiz-runner-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;cursor:pointer;transition:filter .15s ease,transform .15s ease;border:1px solid;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);text-align:left;width:100%;font-family:inherit}
.quiz-runner-card:hover{filter:brightness(1.08);transform:translateY(-1px)}
.quiz-runner-icon{font-size:26px;line-height:1;flex-shrink:0}
.quiz-runner-info{flex:1;min-width:0}
.quiz-runner-name{font-size:15px;font-weight:700;color:var(--pc,var(--text));letter-spacing:-0.015em;margin-bottom:3px}
.quiz-runner-desc{font-size:12.5px;color:var(--text-2);line-height:1.4;letter-spacing:-0.003em}
.quiz-runner-arrow{color:var(--pc,var(--text-3));font-size:18px;flex-shrink:0}

.quiz-result-footer{margin-top:20px;text-align:center}
.quiz-result-footer button{background:none;border:none;color:var(--text-3);font-size:13px;font-family:inherit;cursor:pointer;padding:8px 16px;border-radius:8px;transition:color .15s ease}
.quiz-result-footer button:hover{color:var(--text-2)}

/* ═══ Hub (home) ═══ */
.hub-welcome-banner{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:22px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hub-welcome-icon{font-size:28px;flex-shrink:0}
.hub-welcome-text{flex:1;min-width:0}
.hub-welcome-kicker{font-size:10px;font-weight:600;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px}
.hub-welcome-main{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;letter-spacing:-0.008em}
.hub-welcome-sub{font-size:12px;color:var(--text-3);margin-top:2px}
.hub-welcome-ring{flex-shrink:0;width:40px;height:40px;position:relative}
.hub-welcome-ring svg{transform:rotate(-90deg)}
.hub-welcome-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}

.hub-grid{display:flex;flex-direction:column;gap:12px;margin-top:6px}

/* ═══ CUBE HUB — aurora treatment, centered icon ═══ */
.hub-cubes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.hub-cube{position:relative;aspect-ratio:1;border-radius:18px;cursor:pointer;border:1px solid;overflow:hidden;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:transform .18s ease,filter .18s ease;font-family:inherit}

/* Image-background variant — full-bleed photo with dark gradient for text */
.hub-cube.image-cube{background-size:cover;background-position:center;border-color:rgba(255,255,255,0.12)}
.hub-cube.image-cube::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.18) 0%,rgba(0,0,0,0.25) 50%,rgba(0,0,0,0.85) 100%);z-index:1;pointer-events:none}
.hub-cube.image-cube .hub-cube-icon{display:none}
.hub-cube.image-cube .hub-cube-name{z-index:2}
.hub-cube.image-cube .hub-cube-badge{z-index:2}
.hub-cube.image-cube .hub-cube-ring{z-index:2}

.hub-cube::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.12) 50%,transparent 100%);transform:translateX(-100%);transition:transform .6s ease,opacity .3s ease;z-index:3}
.hub-cube:hover{transform:translateY(-2px);filter:brightness(1.1)}
.hub-cube:hover::after{opacity:1;transform:translateX(100%)}
.hub-cube:active{transform:translateY(0) scale(0.98)}
.hub-cube.placeholder,.hub-cube.disabled{cursor:default;opacity:.45}
.hub-cube.placeholder:hover,.hub-cube.disabled:hover{transform:none;filter:none}

.hub-cube-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:36px;line-height:1;z-index:2;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3))}
.hub-cube-name{position:absolute;bottom:10px;left:12px;right:12px;z-index:2;font-size:12.5px;font-weight:700;color:#fff;letter-spacing:-0.012em;line-height:1.15;text-shadow:0 1px 6px rgba(0,0,0,0.45)}
.hub-cube-desc{display:none}
.hub-cube-top{display:none}
.hub-cube-bottom{display:none}
.hub-cube-badge{position:absolute;top:8px;right:8px;z-index:2;font-size:8px;font-weight:700;letter-spacing:0.08em;padding:2px 7px;background:rgba(0,0,0,0.38);color:#fff;border-radius:5px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.14);text-transform:uppercase}

.hub-cube-ring{position:absolute;top:8px;left:8px;width:22px;height:22px;z-index:2}
.hub-cube-ring svg{transform:rotate(-90deg)}
.hub-cube-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}

/* Practice cubes inherit same treatment */
.practice-cubes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}

/* Premium monograms for path cubes */
.path-card-mono{font-size:30px;font-weight:700;letter-spacing:-0.06em;color:var(--pc,var(--text));line-height:1;margin-bottom:10px;font-feature-settings:"ss01","cv11";font-variant-numeric:tabular-nums}

/* Level state */
.level-card.is-future{opacity:0.4;filter:saturate(0.5)}
.level-card.is-active{border-color:var(--accent-border-strong);background:var(--surface-2)}
.level-card.is-active .level-num{box-shadow:0 0 0 3px rgba(109,182,180,0.18)}

/* Locked project checkbox — future levels user shouldn't touch */
.project-check.locked{cursor:not-allowed;border-color:rgba(255,255,255,0.1);background:transparent;position:relative}
.project-check.locked::after{content:"🔒";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;opacity:0.55}
.project-check.locked:hover{border-color:rgba(255,255,255,0.1)}

/* "Mark Level Complete" CTA */
.level-submit-wrap{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.level-submit-btn{width:100%;padding:14px 20px;background:var(--accent);color:#0A0B0F;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;border:none;transition:filter .15s ease,transform .15s ease;letter-spacing:-0.005em}
.level-submit-btn:hover{filter:brightness(1.08)}
.level-submit-btn:active{transform:scale(0.98)}
.level-completed-row{display:flex;align-items:center;gap:10px;padding:12px 15px;background:rgba(94,185,117,0.08);border:1px solid rgba(94,185,117,0.24);border-radius:11px}
.level-completed-badge{flex:1;color:#5EB975;font-size:13px;font-weight:700;letter-spacing:-0.003em;display:flex;align-items:center;gap:7px}
.level-undo-btn{background:transparent;border:1px solid var(--border);color:var(--text-3);padding:6px 11px;border-radius:8px;font-size:11.5px;font-weight:500;font-family:inherit;cursor:pointer;transition:color .15s ease,border-color .15s ease;letter-spacing:-0.003em}
.level-undo-btn:hover{color:var(--text);border-color:var(--border-strong)}

/* Toast — still used for subtle project-check confirms alongside the modal */
.toast-host{position:fixed;top:calc(env(safe-area-inset-top,0px) + 20px);left:50%;transform:translateX(-50%);z-index:300;pointer-events:none}
.toast{background:var(--bg-2);border:1px solid var(--accent-border-strong);padding:11px 18px;border-radius:12px;color:var(--text);font-size:13.5px;font-weight:600;letter-spacing:-0.005em;display:flex;align-items:center;gap:8px;animation:toastIn .35s cubic-bezier(.22,.61,.36,1) both,toastOut .35s cubic-bezier(.4,0,.6,1) 2s forwards;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.toast-icon{font-size:17px;line-height:1}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-16px)}}

/* Celebration modal — force-centered, multiple sizes */
.celebrate-backdrop{position:fixed;inset:0;background:rgba(10,11,15,0.82);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease both}
.celebrate-modal{position:relative;max-width:440px;width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:24px;text-align:center;padding:40px 28px 28px;box-shadow:0 24px 60px rgba(0,0,0,0.55);animation:slideUp .45s cubic-bezier(.22,.61,.36,1) both}
.celebrate-modal.size-sm{max-width:360px;padding:30px 24px 22px}
.celebrate-modal.size-lg{max-width:480px;padding:44px 30px 30px}
.celebrate-burst{line-height:1;margin-bottom:18px;animation:burstPop .6s cubic-bezier(.34,1.56,.64,1) both;display:inline-block}
.size-sm .celebrate-burst{font-size:52px;margin-bottom:12px}
.celebrate-modal:not(.size-sm):not(.size-lg) .celebrate-burst{font-size:64px}
.size-lg .celebrate-burst{font-size:80px}
@keyframes burstPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.15) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
.celebrate-kicker{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--pc,var(--accent));margin-bottom:10px}
.celebrate-title{font-size:26px;font-weight:700;letter-spacing:-0.022em;line-height:1.12;margin-bottom:12px;color:var(--text)}
.size-lg .celebrate-title{font-size:32px;letter-spacing:-0.028em}
.size-sm .celebrate-title{font-size:22px}
.celebrate-body{font-size:14.5px;color:var(--text-2);line-height:1.55;margin-bottom:18px;letter-spacing:-0.003em;max-width:360px;margin-left:auto;margin-right:auto}
.size-sm .celebrate-body{font-size:13.5px;margin-bottom:14px}
.celebrate-reminder{margin-top:16px;padding:14px 14px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;text-align:left}
.celebrate-reminder-title{font-size:9.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.celebrate-reminder-item{font-size:12.5px;color:var(--text-2);line-height:1.5;letter-spacing:-0.003em;margin-bottom:9px}
.celebrate-reminder-item:last-child{margin-bottom:0}
.celebrate-reminder-kicker{display:inline-block;font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px}
.celebrate-reminder-item div strong{color:var(--text);font-weight:700}

/* ═══ PATHFINDER — 90-day planner ═══ */
.pf-gate{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 22px;text-align:center;margin:12px 0 16px}
.pf-gate-icon{font-size:44px;margin-bottom:12px}
.pf-gate-title{font-size:20px;font-weight:700;letter-spacing:-0.01em;margin-bottom:8px}
.pf-gate-body{font-size:13.5px;color:var(--text-2);line-height:1.55;margin-bottom:20px;letter-spacing:-0.003em}
.pf-gate-btn{width:100%;padding:14px 20px;background:var(--accent);color:#0A0B0F;border:none;border-radius:12px;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit;margin-bottom:8px;transition:filter .15s ease,transform .12s}
.pf-gate-btn:hover{filter:brightness(1.08)}
.pf-gate-btn:active{transform:scale(0.99)}
.pf-gate-btn.secondary{background:transparent;color:var(--text-2);border:1px solid var(--border);font-weight:600;font-size:13px}
.pf-gate-btn.secondary:hover{background:var(--surface);color:var(--text);border-color:var(--border-strong)}

.pf-existing{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 20px;margin:12px 0 16px}
.pf-existing-kicker{font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.pf-existing-meta{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;letter-spacing:-0.005em}

.pf-preview{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 20px;margin:12px 0 16px}
.pf-preview-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;font-size:14px;color:var(--text-2);line-height:1.5;letter-spacing:-0.003em;border-bottom:1px solid rgba(255,255,255,0.04)}
.pf-preview-row:last-child{border-bottom:none}
.pf-preview-row strong{color:var(--text);font-weight:600}
.pf-preview-icon{font-size:22px;line-height:1;flex-shrink:0}

.pf-start-btn{width:100%;padding:16px 20px;background:var(--accent);color:#0A0B0F;border:none;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:filter .15s ease,transform .12s;margin-bottom:10px}
.pf-start-btn:hover{filter:brightness(1.08)}
.pf-start-btn:active{transform:scale(0.99)}
.pf-rebuild-btn{width:100%;padding:12px 20px;background:transparent;color:var(--text-3);border:1px solid var(--border);border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.pf-rebuild-btn:hover{background:var(--surface);color:var(--text-2);border-color:var(--border-strong)}
.pf-meta-note{font-size:11.5px;color:var(--text-3);text-align:center;letter-spacing:-0.003em}

/* Pathfinder question flow */
.pf-progress-count{font-size:11px;font-weight:700;letter-spacing:0.11em;text-transform:uppercase;color:var(--text-3)}
.pf-progress-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin:10px 0 26px;overflow:hidden}
.pf-progress-fill{height:100%;background:var(--accent);transition:width .35s cubic-bezier(.22,.61,.36,1)}
.pf-q-title{font-size:23px;font-weight:700;letter-spacing:-0.015em;margin-bottom:8px;line-height:1.2}
.pf-q-hint{font-size:13.5px;color:var(--text-3);margin-bottom:22px;letter-spacing:-0.003em}
.pf-options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.pf-option{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px 18px;cursor:pointer;text-align:left;font-family:inherit;transition:transform .15s ease,background .15s ease,border-color .15s ease}
.pf-option:hover{background:var(--surface-2);border-color:var(--accent);transform:translateY(-1px)}
.pf-option:active{transform:scale(0.99)}
.pf-option-label{font-size:15.5px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-0.005em}
.pf-option-desc{font-size:12.5px;color:var(--text-3);letter-spacing:-0.003em}
.pf-skip-btn{width:100%;padding:12px 20px;background:transparent;color:var(--text-3);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px}
.pf-skip-btn:hover{color:var(--text-2)}

/* Building state */
.pf-building{text-align:center;padding:60px 20px}
.pf-building-icon{font-size:56px;margin-bottom:18px;animation:pfSpin 3s linear infinite;display:inline-block}
@keyframes pfSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.pf-building-title{font-size:22px;font-weight:700;letter-spacing:-0.01em;margin-bottom:22px}
.pf-building-steps{display:flex;flex-direction:column;gap:8px;max-width:260px;margin:0 auto}
.pf-building-step{font-size:13px;color:var(--text-3);padding:8px;opacity:0;animation:pfStepIn .4s ease forwards}
.pf-building-step:nth-child(1){animation-delay:.1s}
.pf-building-step:nth-child(2){animation-delay:.5s}
.pf-building-step:nth-child(3){animation-delay:.9s}
.pf-building-step:nth-child(4){animation-delay:1.3s}
@keyframes pfStepIn{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}

/* Program output view */
.pf-summary{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 22px}
.pf-summary-pill{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--text-2);letter-spacing:-0.003em}

.pf-weeks{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.pf-phase-marker{font-size:10.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--pc,var(--accent));padding:18px 4px 4px;border-top:1px solid rgba(255,255,255,0.06);margin-top:8px}
.pf-phase-marker:first-child{border-top:none;padding-top:6px;margin-top:0}
.pf-week{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.pf-week-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
.pf-week-n{font-size:13px;font-weight:800;letter-spacing:-0.005em;color:var(--pc,var(--accent));flex-shrink:0}
.pf-week-focus{font-size:13.5px;color:var(--text-2);letter-spacing:-0.003em;line-height:1.4}
.pf-week-section{margin:10px 0}
.pf-week-label{font-size:10.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px}
.pf-week-item{font-size:13.5px;color:var(--text-2);line-height:1.5;padding:2px 0;letter-spacing:-0.003em}
.pf-item-link{color:var(--accent);text-decoration:underline;text-decoration-color:rgba(109,182,180,0.4);text-underline-offset:2.5px;cursor:pointer;font-weight:600;transition:color .15s ease}
.pf-item-link:hover{color:#8AD0CE}
.pf-item-dim{color:var(--text-3);font-size:12.5px}
.pf-milestone{margin-top:12px;padding:10px 12px;background:rgba(212,169,76,0.08);border:1px solid rgba(212,169,76,0.25);border-radius:10px;font-size:13px;color:#E8C56B;font-weight:500;letter-spacing:-0.003em;line-height:1.45}

/* Interactive check-in cards (weeks 4/8/12) */
.pf-checkin{margin-top:12px;background:rgba(212,169,76,0.05);border:1px solid rgba(212,169,76,0.28);border-radius:12px;overflow:hidden;transition:border-color .2s ease}
.pf-checkin.filled{border-color:#5EB975;background:rgba(94,185,117,0.06)}
.pf-checkin-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.pf-checkin-title{flex:1;font-size:13px;color:#E8C56B;font-weight:600;letter-spacing:-0.003em;line-height:1.4}
.pf-checkin.filled .pf-checkin-title{color:#5EB975}
.pf-checkin-status{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);display:flex;align-items:center;gap:6px}
.pf-checkin.filled .pf-checkin-status{color:#5EB975}
.pf-checkin-chev{font-size:9px;transition:transform .25s ease;display:inline-block}
.pf-checkin.expanded .pf-checkin-chev{transform:rotate(180deg)}
.pf-checkin-body{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 14px}
.pf-checkin.expanded .pf-checkin-body{max-height:900px;padding:4px 14px 14px}
.pf-checkin-q{margin-bottom:12px}
.pf-checkin-q:last-child{margin-bottom:0}
.pf-checkin-q label{display:block;font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-2);margin-bottom:6px}
.pf-checkin-q textarea{width:100%;min-height:60px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13.5px;font-family:inherit;resize:vertical;line-height:1.5;letter-spacing:-0.003em;box-sizing:border-box}
.pf-checkin-q textarea:focus{outline:2px solid rgba(212,169,76,0.4);outline-offset:1px;border-color:#D4A94C}
.pf-checkin-hint{font-size:11px;color:var(--text-3);letter-spacing:-0.003em;margin-top:6px}
.pf-loc-tag{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;vertical-align:middle}
.pf-loc-tag.home{background:rgba(232,93,93,0.13);color:#E85D5D}
.pf-loc-tag.any{background:rgba(94,185,117,0.13);color:#5EB975}
.pf-footer-note{font-size:11.5px;color:var(--text-3);text-align:center;padding:14px 0;letter-spacing:-0.003em;line-height:1.5}

/* ═══ AI Coach chat view ═══ */
.ai-coach-view{display:flex;flex-direction:column;height:calc(100dvh - 40px);max-height:100%}
.top-bar-title{font-size:14.5px;font-weight:700;color:var(--text);letter-spacing:-0.005em;flex:1;text-align:center}
.coach-thread{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:12px}
.coach-intro{text-align:center;padding:28px 10px 10px}
.coach-intro-icon{font-size:44px;margin-bottom:10px}
.coach-intro-title{font-size:19px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-0.01em}
.coach-intro-body{font-size:13.5px;color:var(--text-2);line-height:1.55;letter-spacing:-0.003em;max-width:320px;margin:0 auto}
.coach-starters{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.coach-starter{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;text-align:left;cursor:pointer;font-family:inherit;font-size:13.5px;color:var(--text-2);font-weight:500;letter-spacing:-0.003em;transition:background .15s,border-color .15s,color .15s}
.coach-starter:hover{background:var(--surface-2);border-color:var(--accent);color:var(--text)}
.coach-starter:active{transform:scale(0.99)}
.coach-msg{display:flex;flex-direction:column;gap:4px}
.coach-msg.user{align-items:flex-end}
.coach-msg.assistant{align-items:flex-start}
.coach-bubble{max-width:92%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.55;letter-spacing:-0.003em}
.coach-bubble.user{background:#2A3A4C;color:var(--text);border-bottom-right-radius:4px}
.coach-bubble.assistant{background:var(--surface);border:1px solid var(--border);color:var(--text-2);border-bottom-left-radius:4px}
.coach-bubble.assistant p{margin:0 0 10px}
.coach-bubble.assistant p:last-child{margin-bottom:0}
.coach-bubble.thinking{display:inline-flex;align-items:center;padding:14px 18px;min-width:52px}
.coach-dots{display:flex;gap:5px}
.coach-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-3);animation:coachDot 1.4s ease-in-out infinite}
.coach-dots span:nth-child(2){animation-delay:.2s}
.coach-dots span:nth-child(3){animation-delay:.4s}
@keyframes coachDot{0%,80%,100%{opacity:.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
.coach-input-row{display:flex;gap:10px;align-items:flex-end;padding:10px 0 8px;border-top:1px solid var(--border)}
.coach-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;resize:none;line-height:1.45;letter-spacing:-0.003em;min-height:46px;max-height:120px;overflow-y:auto;transition:border-color .15s}
.coach-input:focus{outline:2px solid rgba(109,182,180,0.3);outline-offset:1px;border-color:var(--accent)}
.coach-send{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:#0A0B0F;font-size:18px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:filter .15s,transform .12s;font-weight:700}
.coach-send:hover{filter:brightness(1.1)}
.coach-send:active{transform:scale(0.94)}
.coach-disabled{text-align:center;padding:60px 20px}
.coach-disabled-icon{font-size:50px;margin-bottom:14px}
.coach-disabled-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-0.01em}
.coach-disabled-body{font-size:13.5px;color:var(--text-2);line-height:1.55;margin-bottom:22px;letter-spacing:-0.003em}


/* ═══ Hub gear (top-right Settings icon) ═══ */
.hub-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hub-icon-group{display:flex;gap:8px}
.hub-gear{background:transparent;border:1px solid var(--border);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:17px;cursor:pointer;font-family:inherit;transition:background .15s,color .15s,border-color .15s,transform .2s}
.hub-gear:hover{background:var(--surface);color:var(--text);border-color:var(--border-strong);transform:rotate(45deg)}
.hub-gear:active{transform:rotate(45deg) scale(0.92)}
.hub-gear.ai{color:#A07BC7;border-color:rgba(160,123,199,0.3)}
.hub-gear.ai:hover{background:rgba(160,123,199,0.08);color:#C49BD9;border-color:#A07BC7;transform:scale(1.1) rotate(0)}
.hub-gear.ai:active{transform:scale(0.95) rotate(0)}

/* ═══ Three-tier wipe buttons (escalating danger) ═══ */
.wipe-btn{display:flex;flex-direction:column;align-items:flex-start;gap:3px;width:100%;padding:14px 16px;margin-bottom:8px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:12px;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s,border-color .15s,transform .12s}
.wipe-btn:hover{transform:translateY(-1px)}
.wipe-btn:active{transform:scale(0.99)}
.wipe-btn:last-child{margin-bottom:0}
.wipe-btn-title{font-size:13.5px;font-weight:700;letter-spacing:-0.003em}
.wipe-btn-desc{font-size:11.5px;color:var(--text-3);letter-spacing:-0.003em;line-height:1.4}
.wipe-btn.tier1{border-color:rgba(232,178,80,0.3)}
.wipe-btn.tier1:hover{background:rgba(232,178,80,0.08);border-color:#E8B250}
.wipe-btn.tier1 .wipe-btn-title{color:#E8B250}
.wipe-btn.tier2{border-color:rgba(232,124,80,0.3)}
.wipe-btn.tier2:hover{background:rgba(232,124,80,0.1);border-color:#E87C50}
.wipe-btn.tier2 .wipe-btn-title{color:#E87C50}
.wipe-btn.tier3{border-color:rgba(232,93,93,0.35)}
.wipe-btn.tier3:hover{background:rgba(232,93,93,0.12);border-color:#E85D5D}
.wipe-btn.tier3 .wipe-btn-title{color:#E85D5D}

/* ═══ Settings screen ═══ */
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 18px 16px;margin-bottom:12px}
.settings-section-label{font-size:11px;font-weight:700;letter-spacing:0.11em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
.settings-row{display:flex;align-items:center;gap:14px}
.settings-row.toggle-row{justify-content:space-between}
.settings-row-text{flex:1;min-width:0}
.settings-row-label{font-size:14.5px;font-weight:600;color:var(--text);letter-spacing:-0.003em;margin-bottom:2px}
.settings-row-hint{font-size:12.5px;color:var(--text-3);letter-spacing:-0.003em;line-height:1.45}

/* iOS-style toggle */
.toggle{position:relative;display:inline-block;width:48px;height:28px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.12);border-radius:28px;transition:background .22s ease}
.toggle-slider::before{content:"";position:absolute;height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .22s cubic-bezier(.22,.61,.36,1);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.toggle input:checked + .toggle-slider{background:#5EB975}
.toggle input:checked + .toggle-slider::before{transform:translateX(20px)}

.settings-radio-group{display:flex;flex-direction:column;gap:8px}
.settings-radio{display:flex;gap:11px;padding:12px 14px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:11px;cursor:pointer;transition:border-color .15s,background .15s}
.settings-radio:hover{border-color:var(--border-strong)}
.settings-radio.active{border-color:var(--accent);background:rgba(109,182,180,0.06)}
.settings-radio input{margin:3px 0 0 0;accent-color:var(--accent)}
.settings-radio-body{flex:1;min-width:0}
.settings-radio-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-0.003em}
.settings-radio-desc{font-size:12px;color:var(--text-3);line-height:1.5;letter-spacing:-0.003em}
.settings-radio-desc a{color:var(--accent);text-decoration:underline;text-decoration-color:rgba(109,182,180,0.4)}
