.settings-input{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:13.5px;font-family:inherit;letter-spacing:-0.003em;box-sizing:border-box;transition:border-color .15s}
.settings-input:focus{outline:2px solid rgba(109,182,180,0.3);outline-offset:1px;border-color:var(--accent)}
.settings-hint{font-size:11.5px;color:var(--text-3);margin-top:8px;line-height:1.5;letter-spacing:-0.003em}
.settings-hint code{background:rgba(255,255,255,0.06);padding:1.5px 5px;border-radius:4px;font-size:11px;font-family:"SF Mono",Menlo,monospace}

.settings-model-list{display:flex;flex-direction:column;gap:6px}
.settings-model-option{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:border-color .15s,background .15s}
.settings-model-option:hover{border-color:var(--border-strong)}
.settings-model-option.active{border-color:var(--accent);background:rgba(109,182,180,0.06)}
.settings-model-option input{margin:3px 0 0 0;accent-color:var(--accent)}
.settings-model-body{flex:1;min-width:0}
.settings-model-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px;letter-spacing:-0.003em}
.settings-model-desc{font-size:11.5px;color:var(--text-3);letter-spacing:-0.003em}

.settings-test-btn{width:100%;padding:13px 18px;background:var(--accent);color:#0A0B0F;border:none;border-radius:11px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;transition:filter .15s,transform .12s}
.settings-test-btn:hover{filter:brightness(1.1)}
.settings-test-btn:active{transform:scale(0.99)}
.settings-test-btn:disabled{opacity:0.55;cursor:wait}
.settings-test-result{margin-top:10px;font-size:12.5px;letter-spacing:-0.003em;text-align:center;min-height:17px}
.settings-test-pending{color:var(--text-3)}
.settings-test-ok{color:#5EB975;font-weight:600}
.settings-test-fail{color:#E85D5D;font-weight:500}

.settings-footnote{font-size:11.5px;color:var(--text-3);text-align:center;padding:14px 10px 20px;line-height:1.5;letter-spacing:-0.003em}
.settings-section-header{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.005em;margin:22px 4px 10px}

/* Settings — collapsible Advanced section */
.settings-advanced-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;background:transparent;border:none;color:var(--text-2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;padding:4px 0;letter-spacing:-0.003em;transition:color .15s}
.settings-advanced-toggle:hover{color:var(--text)}
.settings-advanced-chev{font-size:10px;color:var(--text-3);transition:transform .25s ease}
.settings-advanced-toggle.open .settings-advanced-chev{transform:rotate(180deg);color:var(--accent)}
.settings-advanced-body{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05)}

/* ═══ Welcome / onboarding screen ═══ */
.welcome{max-width:540px;margin:0 auto}
.welcome-hero{text-align:center;padding:20px 10px 30px}
.welcome-kicker{font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.welcome-title{font-size:34px;font-weight:800;letter-spacing:-0.025em;line-height:1.08;color:var(--text);margin-bottom:14px}
.welcome-subtitle{font-size:14px;color:var(--text-2);line-height:1.55;letter-spacing:-0.003em;max-width:400px;margin:0 auto}
.welcome-q{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;letter-spacing:-0.005em}
.welcome-options{display:flex;flex-direction:column;gap:11px;margin-bottom:22px}
.welcome-option{display:flex;align-items:center;gap:14px;padding:18px 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;cursor:pointer;text-align:left;font-family:inherit;transition:background .18s ease,border-color .18s ease,transform .15s ease}
.welcome-option:hover{background:var(--surface-2);border-color:var(--accent);transform:translateY(-1px)}
.welcome-option:active{transform:scale(0.99)}
.welcome-option-icon{font-size:28px;line-height:1;flex-shrink:0;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:rgba(109,182,180,0.1);border-radius:12px}
.welcome-option-body{flex:1;min-width:0}
.welcome-option-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;letter-spacing:-0.005em}
.welcome-option-desc{font-size:12.5px;color:var(--text-3);line-height:1.5;letter-spacing:-0.003em}
.welcome-option-arrow{font-size:20px;color:var(--text-3);flex-shrink:0;transition:color .15s ease,transform .15s ease}
.welcome-option:hover .welcome-option-arrow{color:var(--accent);transform:translateX(3px)}
.welcome-footnote{font-size:11.5px;color:var(--text-3);text-align:center;padding:10px;letter-spacing:-0.003em}

/* ═══ All Projects browser (ala carte) — expandable groups ═══ */
.ap-groups{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.ap-group{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .25s ease}
.ap-group.open{border-color:var(--pc)}
.ap-group.electives.open{border-color:#D4A94C}
.ap-group-hdr{display:flex;align-items:center;gap:10px;padding:14px;background:transparent;border:none;width:100%;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s ease}
.ap-group-hdr:hover{background:rgba(255,255,255,0.02)}
.ap-group-badge{padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;letter-spacing:0.08em;flex-shrink:0}
.ap-group-name{flex:1;font-size:14.5px;font-weight:700;color:var(--text);letter-spacing:-0.005em;line-height:1.2;min-width:0}
.ap-group-count{font-size:11px;font-weight:700;letter-spacing:0.04em;color:var(--text-3);flex-shrink:0;text-transform:uppercase}
.ap-group-chev{font-size:10px;color:var(--text-3);transition:transform .28s ease;flex-shrink:0;margin-left:2px}
.ap-group.open .ap-group-chev{transform:rotate(180deg);color:var(--pc)}
.ap-group.electives.open .ap-group-chev{color:#D4A94C}
.ap-group-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.ap-group.open .ap-group-body{max-height:4000px;padding:0 14px 14px}
.ap-group-subhint{font-size:12px;color:var(--text-3);padding:4px 0 10px;line-height:1.5;letter-spacing:-0.003em}
.ap-group-list{display:flex;flex-direction:column;gap:5px}
.ap-project{display:flex;align-items:center;gap:12px;padding:11px 12px;background:rgba(0,0,0,0.18);border:1px solid transparent;border-radius:10px;cursor:pointer;text-align:left;font-family:inherit;transition:background .15s,border-color .15s}
.ap-project:hover{background:rgba(0,0,0,0.3);border-color:var(--pc)}
.ap-project-lvl{font-size:10.5px;font-weight:800;letter-spacing:0.08em;color:var(--pc);background:rgba(255,255,255,0.04);padding:4px 7px;border-radius:6px;flex-shrink:0}
.ap-project-body{flex:1;min-width:0}
.ap-project-name{font-size:13.5px;font-weight:600;color:var(--text);letter-spacing:-0.003em;line-height:1.3;margin-bottom:2px}
.ap-project-meta{font-size:11.5px;color:var(--text-3);letter-spacing:-0.003em}
.ap-project-arrow{font-size:14px;color:var(--text-3);flex-shrink:0}
.ap-project:hover .ap-project-arrow{color:var(--pc)}


/* ═══ Pathfinder AI enhancement bar ═══ */
.pf-ai-bar{margin:14px 0 22px;padding:16px;background:linear-gradient(135deg,rgba(160,123,199,0.08),rgba(109,182,180,0.05));border:1px solid rgba(160,123,199,0.3);border-radius:14px}
.pf-ai-blurb{font-size:12.5px;color:var(--text-2);margin-bottom:11px;line-height:1.5;letter-spacing:-0.003em}
.pf-ai-btn{width:100%;padding:12px 18px;background:linear-gradient(135deg,#A07BC7,#8A6BB0);color:#fff;border:none;border-radius:11px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;transition:filter .15s,transform .12s;letter-spacing:-0.003em}
.pf-ai-btn:hover{filter:brightness(1.12)}
.pf-ai-btn:active{transform:scale(0.99)}
.pf-ai-btn.ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.pf-ai-btn.ghost:hover{background:var(--surface);color:var(--text);border-color:var(--border-strong);filter:none}
.pf-ai-status{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-2);margin-bottom:10px;letter-spacing:-0.003em}
.pf-ai-status strong{color:#A07BC7}
.pf-ai-status-dot{width:8px;height:8px;border-radius:50%;background:#A07BC7;box-shadow:0 0 8px rgba(160,123,199,0.6);flex-shrink:0}
.pf-ai-actions{display:flex;gap:8px}
.pf-ai-actions .pf-ai-btn{flex:1}
.pf-ai-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 0;font-size:13px;color:var(--text-2);letter-spacing:-0.003em}
.pf-ai-spinner{display:inline-block;animation:pfAiPulse 1.2s ease-in-out infinite;font-size:16px}
@keyframes pfAiPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.2)}}
.pf-ai-error{font-size:12.5px;color:#E85D5D;padding:6px 0 12px;line-height:1.5;letter-spacing:-0.003em}

/* ═══ My Paths dashboard — multi-path switcher ═══ */
.mp-list{display:flex;flex-direction:column;gap:12px;margin-top:16px;margin-bottom:18px}
.mp-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;transition:border-color .2s ease,background .2s ease}
.mp-card.active{border-color:var(--pc);background:linear-gradient(135deg,rgba(255,255,255,0.02),rgba(255,255,255,0.005))}
.mp-card.active::before{content:"";position:absolute}
.mp-card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mp-card-badge{padding:4px 10px;border-radius:8px;font-size:11.5px;font-weight:800;letter-spacing:0.08em;flex-shrink:0}
.mp-card-name{flex:1;font-size:16.5px;font-weight:700;color:var(--text);letter-spacing:-0.008em;line-height:1.2}
.mp-active-pill{padding:3px 10px;background:rgba(94,185,117,0.15);color:#5EB975;border-radius:10px;font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0}
.mp-card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.mp-stat{text-align:center;padding:10px 4px;background:rgba(0,0,0,0.22);border-radius:10px}
.mp-stat-n{font-size:18px;font-weight:800;color:var(--pc);letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1}
.mp-stat-lbl{font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-top:5px}
.mp-progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:14px}
.mp-progress-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.22,.61,.36,1)}
.mp-switch-btn{width:100%;padding:13px 18px;background:var(--pc);color:#0A0B0F;border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;letter-spacing:-0.003em;transition:filter .15s,transform .12s}
.mp-switch-btn:hover{filter:brightness(1.1)}
.mp-switch-btn:active{transform:scale(0.99)}
.mp-open-btn{width:100%;padding:13px 18px;background:transparent;color:var(--text-2);border:1px solid var(--border);border-radius:12px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit;letter-spacing:-0.003em;transition:background .15s,color .15s,border-color .15s}
.mp-open-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-strong)}
.mp-add-btn{width:100%;padding:14px 20px;background:var(--accent);color:#0A0B0F;border:none;border-radius:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;letter-spacing:-0.003em;transition:filter .15s,transform .12s;margin-bottom:10px}
.mp-add-btn:hover{filter:brightness(1.08)}
.mp-add-btn:active{transform:scale(0.99)}
.mp-add-btn.secondary{background:transparent;color:var(--text-2);border:1px dashed var(--border-strong);font-weight:600}
.mp-add-btn.secondary:hover{background:var(--surface);color:var(--text);border-style:solid}
.mp-card-actions{display:flex;gap:8px;align-items:stretch}
.mp-card-actions .mp-switch-btn,
.mp-card-actions .mp-open-btn{flex:1}
.mp-delete-btn{flex-shrink:0;width:46px;padding:0;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text-3);font-size:15px;cursor:pointer;font-family:inherit;transition:background .15s,color .15s,border-color .15s}
.mp-delete-btn:hover{background:rgba(232,93,93,0.08);color:#E85D5D;border-color:rgba(232,93,93,0.35)}
.mp-delete-btn:active{transform:scale(0.94)}

/* ═══ Pathfinder multi-path chooser ═══ */
.pf-multipath{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 20px;margin:12px 0 16px}
.pf-multipath-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.008em;margin-bottom:4px}
.pf-multipath-hint{font-size:12.5px;color:var(--text-3);line-height:1.5;letter-spacing:-0.003em;margin-bottom:18px}
.pf-multipath-list{display:flex;flex-direction:column;gap:9px}
.pf-multipath-card{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:13px;cursor:pointer;text-align:left;font-family:inherit;transition:background .15s,border-color .15s,transform .12s}
.pf-multipath-card:hover{background:rgba(0,0,0,0.3);border-color:var(--pc);transform:translateY(-1px)}
.pf-multipath-card:active{transform:scale(0.99)}
.pf-multipath-card.active{border-color:var(--pc);background:rgba(255,255,255,0.03)}
.pf-multipath-badge{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;letter-spacing:0.08em;flex-shrink:0}
.pf-multipath-body{flex:1;min-width:0}
.pf-multipath-name{font-size:14.5px;font-weight:700;color:var(--text);letter-spacing:-0.005em;line-height:1.2;margin-bottom:3px}
.pf-multipath-meta{font-size:11.5px;color:var(--text-3);letter-spacing:-0.003em}
.pf-multipath-arrow{font-size:16px;color:var(--text-3);flex-shrink:0;transition:color .15s,transform .15s}
.pf-multipath-card:hover .pf-multipath-arrow{color:var(--pc);transform:translateX(3px)}

/* ═══ Tour system — spotlight via box-shadow cutout ═══ */
.tour-overlay{position:fixed;inset:0;z-index:500;pointer-events:auto;opacity:0;animation:tourFadeIn .35s ease forwards}
@keyframes tourFadeIn{to{opacity:1}}
/* The highlight IS the mask — its box-shadow creates a giant dark inset
   around the target rectangle, leaving the target itself fully visible.
   This is the classic "spotlight cutout" CSS trick, avoids SVG masks or
   clip-paths, and lets the highlighted element render at full brightness. */
.tour-highlight{position:fixed;border-radius:16px;box-shadow:0 0 0 9999px rgba(8,10,14,0.9),0 0 0 3px rgba(109,182,180,0.9) inset,0 0 40px rgba(109,182,180,0.4);pointer-events:auto;transition:top .4s cubic-bezier(.6,.05,.28,.91),left .4s cubic-bezier(.6,.05,.28,.91),width .4s cubic-bezier(.6,.05,.28,.91),height .4s cubic-bezier(.6,.05,.28,.91);animation:tourPulse 2.4s ease-in-out infinite}
@keyframes tourPulse{0%,100%{box-shadow:0 0 0 9999px rgba(8,10,14,0.9),0 0 0 3px rgba(109,182,180,0.9) inset,0 0 40px rgba(109,182,180,0.4)}50%{box-shadow:0 0 0 9999px rgba(8,10,14,0.92),0 0 0 3px rgba(109,182,180,1) inset,0 0 60px rgba(109,182,180,0.6)}}
.tour-card{position:fixed;background:#141720;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px;max-width:320px;width:calc(100vw - 32px);box-shadow:0 24px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(0,0,0,0.4);transition:top .4s cubic-bezier(.6,.05,.28,.91),left .4s cubic-bezier(.6,.05,.28,.91);z-index:502}
.tour-card-step{font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.tour-card-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.008em;line-height:1.25;margin-bottom:7px}
.tour-card-body{font-size:13px;color:var(--text-2);line-height:1.55;letter-spacing:-0.003em;margin-bottom:14px}
.tour-card-actions{display:flex;gap:8px;align-items:center}
.tour-card-skip{flex:0 0 auto;background:transparent;border:none;color:var(--text-3);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;padding:8px 4px;letter-spacing:-0.003em;transition:color .15s}
.tour-card-skip:hover{color:var(--text-2)}
.tour-card-next{flex:1;padding:10px 16px;background:var(--accent);color:#0A0B0F;border:none;border-radius:10px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;letter-spacing:-0.003em;transition:filter .15s,transform .12s}
.tour-card-next:hover{filter:brightness(1.1)}
.tour-card-next:active{transform:scale(0.98)}
.tour-card-dots{display:flex;gap:4px;margin-left:auto;margin-right:8px}
.tour-card-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background .2s}
.tour-card-dot.active{background:var(--accent);width:14px;border-radius:3px}

/* Smart row "highlight" flag — gives the tour card a gentle pulse */
.smart-row.highlight-row{border:1px solid rgba(109,182,180,0.3);background:linear-gradient(135deg,rgba(109,182,180,0.05),rgba(109,182,180,0.02));animation:tourRowPulse 2.4s ease-in-out infinite}
@keyframes tourRowPulse{0%,100%{border-color:rgba(109,182,180,0.25)}50%{border-color:rgba(109,182,180,0.55)}}
.mp-empty{text-align:center;padding:50px 20px}
.mp-empty-icon{font-size:50px;margin-bottom:14px}
.mp-empty-text{font-size:14.5px;color:var(--text-2);margin-bottom:22px;letter-spacing:-0.003em}

.role-link{color:var(--accent);text-decoration:underline;text-decoration-color:rgba(109,182,180,0.4);text-underline-offset:3px;cursor:pointer;font-weight:600;transition:color .15s ease,text-decoration-color .15s ease}

.role-link:hover{color:#8AD0CE;text-decoration-color:rgba(109,182,180,0.9)}
.role-link:active{transform:translateY(1px)}

/* ═══ Framework inline links inside TIP text ═══ */
.fw-link{color:#D4A94C;text-decoration:underline dotted;text-decoration-color:rgba(212,169,76,0.5);text-decoration-thickness:1.5px;text-underline-offset:3px;cursor:pointer;font-weight:inherit;transition:color .15s ease,background .15s ease;padding:0 2px;border-radius:3px}
.fw-link:hover{color:#E8C56B;background:rgba(212,169,76,0.1);text-decoration-color:#E8C56B}
.fw-link:active{background:rgba(212,169,76,0.18)}

/* ═══ Frameworks worth knowing — expandable cards section ═══ */
.fw-section{margin:6px 0 24px;padding:16px;background:rgba(212,169,76,0.04);border:1px solid rgba(212,169,76,0.18);border-radius:14px}
.fw-section-hdr{font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#E8C56B;margin-bottom:4px}
.fw-section-hint{font-size:12px;color:var(--text-3);margin-bottom:14px;letter-spacing:-0.003em}
.fw-card{background:rgba(0,0,0,0.22);border:1px solid rgba(255,255,255,0.06);border-radius:11px;margin-bottom:8px;overflow:hidden;transition:border-color .2s ease}
.fw-card:last-child{margin-bottom:0}
.fw-card.expanded{border-color:rgba(212,169,76,0.32)}
.fw-card-hdr{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none}
.fw-card-title{flex:1;font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.005em}
.fw-card-chev{font-size:10px;color:var(--text-3);transition:transform .25s ease}
.fw-card.expanded .fw-card-chev{transform:rotate(180deg);color:#D4A94C}
.fw-card-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.fw-card.expanded .fw-card-body{max-height:600px}
.fw-card-summary{padding:0 14px 10px;font-size:13px;color:#E8C56B;line-height:1.5;letter-spacing:-0.003em;font-weight:500}
.fw-card-text{padding:4px 14px 16px;font-size:13.5px;color:var(--text-2);line-height:1.65;letter-spacing:-0.003em;border-top:1px solid rgba(255,255,255,0.04);padding-top:12px;margin:0 2px}
.celebrate-cta{width:100%;padding:14px 20px;background:var(--pc,var(--accent));color:#0A0B0F;border-radius:12px;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit;border:none;transition:filter .15s ease,transform .15s ease;letter-spacing:-0.005em;margin-top:4px}
.celebrate-cta:hover{filter:brightness(1.08)}
.celebrate-cta:active{transform:scale(0.98)}

/* Contained Speech Timer (not fullscreen) — same width as hub */
.timer-shell{max-width:680px;margin:0 auto;border-radius:24px;padding:24px 22px;transition:background .5s ease;position:relative;overflow:hidden;border:1px solid var(--border)}
.timer-shell.phase-neutral{background:linear-gradient(180deg,#15171D 0%,#0F1115 100%)}
.timer-shell.phase-green{background:radial-gradient(ellipse at top,#2a7e3e 0%,#1a3a24 100%)}
.timer-shell.phase-yellow{background:radial-gradient(ellipse at top,#b89420 0%,#4a3c10 100%)}
.timer-shell.phase-red{background:radial-gradient(ellipse at top,#a02828 0%,#3a1212 100%)}
.timer-shell.phase-bell{background:radial-gradient(ellipse at top,#e02020 0%,#5a1010 100%);animation:bellflash .8s ease-in-out infinite alternate}

/* ═══ Timer preset pills (row above the timer card, matches reference image) ═══ */
.timer-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}

.timer-pill:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.24)}
.timer-pill.active{background:rgba(94,185,117,0.12);border-color:#5EB975;color:#5EB975}

/* ═══ Timer screen ═══ */
.timer-screen{display:flex;flex-direction:column;gap:4px;transition:background .5s ease;border-radius:22px;padding:40px 20px 24px;overflow:hidden;border:1px solid var(--border);margin-top:6px;min-height:auto;background:#1A1D24}

.timer-screen.phase-yellow{background:radial-gradient(ellipse at top,rgba(232,178,80,0.22) 0%,#1A1D24 60%)}
.timer-screen.phase-red{background:radial-gradient(ellipse at top,rgba(232,93,93,0.22) 0%,#1A1D24 60%)}
.timer-screen.phase-overtime{background:radial-gradient(ellipse at top,rgba(232,93,93,0.35) 0%,#2e1010 60%);animation:bellflash .8s ease-in-out infinite alternate}
@keyframes bellflash{0%{filter:brightness(1)}100%{filter:brightness(1.3)}}
.timer-display-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:30px 0}
.timer-preset-label{font-size:15px;color:rgba(255,255,255,0.7);font-weight:500;letter-spacing:-0.005em}
.timer-time{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Inter,sans-serif;font-size:min(22vw,118px);font-weight:800;line-height:1;color:#fff;letter-spacing:-.032em;font-variant-numeric:tabular-nums}
.timer-phase-sub{font-size:14px;font-weight:500;color:rgba(255,255,255,0.65);letter-spacing:-0.003em}

/* ═══ Marker dots ═══ */

.timer-marker{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);transition:background .2s ease,box-shadow .2s ease;display:flex;align-items:center;justify-content:center;font-size:14px}
.timer-marker.active.green{background:#4AAE68}
.timer-marker.active.yellow{background:#E8B250}
.timer-marker.active.red{background:#E85D5D}
.timer-marker.bell{background:rgba(255,255,255,0.1)}
.timer-marker.bell.active{background:rgba(232,178,80,0.25);box-shadow:0 0 0 3px rgba(232,178,80,0.3)}

/* ═══ Controls (play/pause + reset) ═══ */
.timer-controls{display:flex;justify-content:center;gap:14px;padding:8px 0 4px}
.timer-btn-main{width:62px;height:62px;background:#5EB975;border:none;color:#fff;border-radius:50%;font-size:22px;cursor:pointer;font-family:inherit;transition:background .15s,transform .12s}
.timer-btn-main:hover{background:#4AAE68}
.timer-btn-main:active{transform:scale(0.96)}
.timer-btn-reset{width:50px;height:50px;align-self:center;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.75);border-radius:50%;font-size:17px;cursor:pointer;font-family:inherit}

/* ═══ Table Topics Generator ═══ */

.topics-theme-card:active{transform:translateY(0) scale(0.99)}

.topics-all-card{grid-column:1 / -1;flex-direction:row;align-items:center;justify-content:flex-start;text-align:left;padding:14px 16px;gap:14px;min-height:0}

.topics-all-card .topics-theme-name{font-size:14px}

/* Practice view */
.topics-practice{display:flex;flex-direction:column;min-height:60vh}

.topics-prompt-card{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 26px 20px;background:var(--surface);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);min-height:240px;margin-bottom:18px}

/* ═══ TT inline count-UP timer (phases: green 1:00 / yellow 1:30 / red 2:00 / siren 2:30+) ═══ */
.tt-inline-timer{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:14px;transition:border-color .3s ease,background .3s ease}

.tt-inline-timer.phase-red{border-color:#E85D5D;background:rgba(232,93,93,0.10)}

@keyframes ttSiren{
  0%{background:rgba(232,93,93,0.22);box-shadow:0 0 0 rgba(232,93,93,0)}

}
.tt-timer-phases{display:flex;gap:5px;align-items:center}
.tt-phase-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.1);transition:background .25s ease,transform .2s ease;flex-shrink:0}

.tt-phase-dot.yellow.active{background:#E8B250;transform:scale(1.15)}
.tt-phase-dot.red.active{background:#E85D5D;transform:scale(1.15)}
.tt-phase-dot.bell{width:auto;height:auto;background:transparent;font-size:11px;opacity:0.3;transition:opacity .25s ease,transform .25s ease;margin-left:1px}

.tt-timer-display{flex:1;text-align:center;font-size:24px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.01em;transition:color .25s ease}
.tt-inline-timer.phase-green .tt-timer-display{color:#5EB975}
.tt-inline-timer.phase-yellow .tt-timer-display{color:#E8B250}
.tt-inline-timer.phase-red,
.tt-inline-timer.phase-siren{color:#E85D5D}
.tt-inline-timer.phase-red .tt-timer-display,
.tt-inline-timer.phase-siren .tt-timer-display{color:#E85D5D}
.tt-timer-toggle{width:40px;height:40px;border-radius:50%;background:#5EB975;border:none;color:#fff;font-size:16px;cursor:pointer;font-family:inherit;transition:background .15s,transform .12s;flex-shrink:0}
.tt-timer-toggle:hover{background:#4AAE68}
.tt-timer-toggle:active{transform:scale(0.94)}

.topics-controls{display:flex;gap:10px}
.topics-btn-next{flex:1;padding:16px 20px;background:var(--accent);color:#0A0B0F;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;border:none;transition:filter .15s ease,transform .15s ease;letter-spacing:-0.005em}
.topics-btn-next:hover{filter:brightness(1.08)}
.topics-btn-next:active{transform:scale(0.98)}
.topics-btn-timer{flex:0 0 auto;padding:16px 16px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);border-radius:14px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s ease,color .15s ease}
.topics-btn-timer:hover{background:var(--surface-3);color:var(--text)}

/* ═══ Word of the Day ═══ */
.wod-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:36px 26px 32px;margin-bottom:18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);text-align:center}

.wod-pill.active{background:rgba(160,123,199,0.14);border-color:#A07BC7;color:#A07BC7}
.wod-meta-row{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.wod-tier-pill{display:inline-block;padding:5px 12px;border-radius:16px;font-size:10.5px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase}
.wod-tier-pill.tier-e{background:rgba(94,185,117,0.14);color:#5EB975}
.wod-tier-pill.tier-m{background:rgba(232,178,80,0.14);color:#E8B250}
.wod-tier-pill.tier-h{background:rgba(232,93,93,0.14);color:#E85D5D}
.wod-pos-pill{display:inline-block;padding:5px 13px;border-radius:16px;font-size:10.5px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase}
.wod-pos-pill.adj{background:rgba(212,169,76,0.14);color:#D4A94C}
.wod-pos-pill.verb{background:rgba(94,185,117,0.14);color:#5EB975}
.wod-pos-pill.noun{background:rgba(160,123,199,0.14);color:#A07BC7}
.wod-pos-pill.adv{background:rgba(91,157,217,0.14);color:#5B9DD9}
.wod-word{font-size:44px;font-weight:700;letter-spacing:-0.028em;line-height:1.05;color:var(--text);margin-bottom:14px;word-break:break-word}
.wod-definition{font-size:16.5px;line-height:1.5;color:var(--text);margin-bottom:22px;font-weight:500;letter-spacing:-0.008em;max-width:460px;margin-left:auto;margin-right:auto}
.wod-example{font-size:14px;line-height:1.6;color:var(--text-2);font-style:italic;letter-spacing:-0.003em;padding-top:18px;border-top:1px solid var(--border);max-width:460px;margin:0 auto}
.wod-example::before{content:"“";font-size:18px;opacity:0.45;margin-right:2px}
.wod-example::after{content:"”";font-size:18px;opacity:0.45;margin-left:2px}

/* ═══ Filler Detector ═══ */
.fd-kicker-mic{font-size:68px;text-align:center;margin:12px 0 8px;line-height:1;}
.fd-unsupported-card{background:rgba(235,87,87,0.08);border:1px solid rgba(235,87,87,0.3);border-radius:14px;padding:18px;margin:20px 0;color:var(--text-muted);font-size:13px;line-height:1.55}
.fd-unsupported-card strong{color:#EB5757;display:block;margin-bottom:4px;font-size:14px}
.fd-intro-list{margin:18px 0;font-size:13px;color:var(--text-muted);line-height:1.6;list-style:none;padding:0}
.fd-intro-list li{padding:6px 0 6px 22px;position:relative}
.fd-intro-list li::before{content:"";position:absolute;left:4px;top:13px;width:6px;height:6px;background:#7BA7CC;border-radius:50%}
.fd-start-cta{width:100%;padding:16px 20px;background:var(--blue);color:#fff;border-radius:14px;font-size:16px;font-weight:700;letter-spacing:.02em;cursor:pointer;font-family:inherit;border:none;box-shadow:none;transition:transform .15s,box-shadow .15s;margin-top:8px}
.fd-start-cta:hover{transform:translateY(-2px);box-shadow:none}
.fd-start-cta:active{transform:translateY(0)}
.fd-permission-note{font-size:11px;color:var(--text-dim);text-align:center;margin-top:12px;line-height:1.5}

/* Active listening view */
.fd-active{text-align:center;padding:8px 0}
.fd-mic-indicator{width:120px;height:120px;margin:20px auto 12px;border-radius:50%;background:radial-gradient(circle,rgba(123,167,204,0.25) 0%,transparent 70%);display:flex;align-items:center;justify-content:center;position:relative}
.fd-mic-indicator::before,.fd-mic-indicator::after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid #7BA7CC;opacity:0;animation:micPulse 2s ease-out infinite}
.fd-mic-indicator::after{animation-delay:1s}
@keyframes micPulse{0%{transform:scale(0.8);opacity:.8}100%{transform:scale(1.4);opacity:0}}
.fd-mic-icon{font-size:48px;;z-index:1}
.fd-listening-label{font-size:12px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#7BA7CC;margin-bottom:8px}
.fd-timer-big{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Inter,sans-serif;font-size:56px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin-bottom:6px}
.fd-words-sub{font-size:12px;color:var(--text-dim);margin-bottom:24px}

.fd-running-stats{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin:0 0 20px;text-align:left}
.fd-running-label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
.fd-running-rows{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto}
.fd-running-row{display:flex;justify-content:space-between;align-items:center;padding:4px 2px;font-size:13px}
.fd-running-word{color:var(--text);font-weight:500}
.fd-running-count{color:#7BA7CC;font-weight:800;font-variant-numeric:tabular-nums}
.fd-running-empty{font-size:12px;color:var(--text-dim);font-style:italic;text-align:center;padding:8px 0}

.fd-transcript-live{background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.55;color:var(--text-muted);text-align:left;max-height:100px;overflow-y:auto;margin-bottom:18px}
.fd-transcript-live-empty{color:var(--text-dim);font-style:italic}

.fd-stop-cta{width:100%;padding:18px 20px;background:var(--red);color:#fff;border-radius:14px;font-size:17px;font-weight:800;letter-spacing:.03em;cursor:pointer;font-family:inherit;border:none;box-shadow:none;transition:transform .15s}
.fd-stop-cta:active{transform:scale(0.98)}

/* Report view */
.fd-report-hero{text-align:center;margin:16px 0 24px}
.fd-report-score{font-size:64px;font-weight:700;letter-spacing:-0.032em;line-height:1;color:var(--accent);font-variant-numeric:tabular-nums}
.fd-report-score.warn{color:var(--amber);}
.fd-report-score.bad{color:var(--red);}
.fd-report-score-label{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-top:6px}

.fd-report-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.fd-report-meta-cell{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.fd-report-meta-val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text)}
.fd-report-meta-label{font-size:10px;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}

.fd-section-hdr{font-size:11px;font-weight:600;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-3);margin:22px 0 10px}

.fd-top-offenders{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.fd-bar-row{display:grid;grid-template-columns:90px 1fr 38px;gap:10px;align-items:center;padding:7px 0;font-size:13px}
.fd-bar-name{color:var(--text);font-weight:600;letter-spacing:.01em}
.fd-bar-track{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.fd-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .6s cubic-bezier(.22,.61,.36,1)}
.fd-bar-count{color:#7BA7CC;font-weight:800;font-variant-numeric:tabular-nums;text-align:right}

.fd-interpretation{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:16px 0;font-size:13px;line-height:1.6;color:var(--text-2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.fd-interpretation strong{color:var(--text);font-weight:700}
.fd-interpretation .ref-strong{color:#6BBF6B;font-weight:700}
.fd-interpretation .ref-warn{color:#F2C94C;font-weight:700}
.fd-interpretation .ref-bad{color:#EB5757;font-weight:700}

.fd-transcript-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px}
.fd-transcript-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.fd-transcript-header:hover{background:rgba(255,255,255,0.02)}
.fd-transcript-label{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase}
.fd-transcript-chev{font-size:11px;color:var(--text-dim);transition:transform .2s}
.fd-transcript-panel.expanded .fd-transcript-chev{transform:rotate(180deg)}
.fd-transcript-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.22,.61,.36,1)}
.fd-transcript-panel.expanded .fd-transcript-body{max-height:600px}
.fd-transcript-body-inner{padding:0 16px 16px;font-size:13px;line-height:1.65;color:var(--text-muted);max-height:300px;overflow-y:auto}
.fd-transcript-body-inner .filler-highlight{background:rgba(235,87,87,0.18);color:#FF9999;padding:0 3px;border-radius:3px;font-weight:600}

.fd-report-actions{display:flex;gap:10px;margin-top:20px}
.fd-report-actions button{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:transform .15s}
.fd-action-primary{background:var(--blue);color:#fff;box-shadow:none}
.fd-action-secondary{background:rgba(255,255,255,0.06);color:var(--text-muted);border:1px solid rgba(255,255,255,0.1)}
.fd-report-actions button:active{transform:scale(0.98)}
</style>

// ═══ FRAMEWORKS — reference library for frameworks named in coaching tips ═══
// Keyed by lowercase framework name. Each has a short title and a punchy
// explanation in Kian's voice — enough to actually use it, not just recognize
// the name. TIPS text is scanned for these names at render time and they're
// made tappable to expand an inline info card.
const FRAMEWORKS={
  "past → present → future":{
    title:"Past → Present → Future",
    summary:"A three-act structure for any personal speech, especially Ice Breaker and reflection-type speeches.",
    body:"Start with where you came from (one vivid detail — a place, a moment, a person). Move to who you are now (what you do, what drives you). End with where you're heading (the next chapter you're building). Simple, but it works because it mirrors how humans naturally tell their own stories. Don't spend equal time on each — 30% / 40% / 30% usually lands better. The transition phrases matter: \"That shaped how I...\" / \"Which is why today I...\" / \"And looking ahead...\""
  },
  "rule of 3":{
    title:"Rule of 3",
    summary:"Audiences remember three things. Not two, not seven. Structure your speech, your lists, your punchlines in threes.",
    body:"It's one of the oldest rhetorical patterns for a reason — three creates a complete, satisfying pattern (\"life, liberty, and the pursuit of happiness\"), while two feels thin and four feels like a list. Use it at the speech level (3 main points), paragraph level (3 examples per point), and sentence level (3 parallel clauses). Break the rule for humor: set up a pattern with the first two, subvert on the third (\"I came, I saw, I ordered takeout.\"). Great speakers return to three again and again."
  },
  "pace, pitch, power, pause":{
    title:"PACE / PITCH / POWER / PAUSE",
    summary:"The four levers of vocal variety. Mark them on your script like music notation.",
    body:"PACE — how fast you speak. Slow down for gravity, speed up for energy. PITCH — how high or low. Drop pitch for authority, raise it for enthusiasm. POWER — how loud. Volume drops make the audience lean in; bursts punctuate. PAUSE — silence. The most underused. A two-second pause before your key line is worth more than any word. Go through your script and mark which of the four each sentence uses. If one sentence uses three, something's off. If every sentence uses the same one, you sound flat."
  },
  "crc method":{
    title:"CRC Method (Evaluation)",
    summary:"Commend → Recommend → Commend. The Toastmasters gold standard for written and verbal feedback.",
    body:"Open with something specific that worked. Not \"great speech!\" — \"your pause after the punchline gave the room time to laugh.\" Then recommend ONE thing to improve (not five — the speaker can only work on one thing at a time). Close with encouragement tied to their growth arc. The sandwich matters because people hear praise better than criticism; placing the recommendation in the middle lets it land without defensiveness. Avoid the trap of making the middle too long or the bread too thin — commendation and recommendation should feel balanced."
  },
  "batna":{
    title:"BATNA (Negotiation)",
    summary:"Best Alternative To a Negotiated Agreement. Knowing your walk-away gives you leverage you can feel.",
    body:"From Fisher & Ury's Getting to Yes. Before any negotiation, answer: \"If this deal falls through, what's my next best option?\" A clear BATNA anchors your minimum. A weak BATNA means you'll accept bad terms out of fear. Work on strengthening your BATNA BEFORE the negotiation — more offers, more options, more alternatives — because a strong BATNA changes your energy in the room. Bluffing about your BATNA is risky; counterparts often test it. Know it, improve it, but don't lie about it."
  },
  "anchoring":{
    title:"Anchoring (Negotiation)",
    summary:"The first number mentioned sets the reference point for everything that follows. Whoever anchors first often wins.",
    body:"Human brains are terrible at evaluating value in a vacuum, so the first price or position becomes the anchor everyone negotiates around. If you say \"$50k\" first, counteroffers cluster around that. If they say \"$30k\" first, you're now arguing up from $30k. Anchor aggressively but with justification (\"market rate for this experience is $60-70k\"). If they anchor first with something unreasonable, don't counter — reframe: \"Let's step back and talk about what's actually being exchanged here.\" Never counter an insulting anchor with a counter-anchor; you're just splitting the difference."
  },
  "tactical empathy":{
    title:"Tactical Empathy (Negotiation)",
    summary:"From Chris Voss (Never Split the Difference). Label the other side's emotions out loud to defuse and build rapport.",
    body:"Not sympathy — empathy as a tool. When the other side is emotional, name it: \"It sounds like you're frustrated by how this has dragged on.\" Labeling emotions lowers their intensity (neuroscience: naming an emotion reduces activity in the amygdala). Use mirror-questions: repeat the last 3 words they said, as a question. It gets them to elaborate without you pushing. Active listening is doing 80% of the work. The counterintuitive move is slowing down when stakes are high — calm questions beat clever arguments."
  },
  "monroe's motivated sequence":{
    title:"Monroe's Motivated Sequence",
    summary:"The 5-step structure behind most great persuasive speeches: Attention → Need → Satisfaction → Visualization → Action.",
    body:"ATTENTION: hook them in the first 15 seconds — story, shocking stat, provocative question. NEED: establish the problem, make it personal to them. SATISFACTION: present your solution clearly. VISUALIZATION: paint a picture of life with and without acting. ACTION: specific, doable, small first step. The order matters — skipping Need means they don't see why the solution applies to them. Skipping Visualization means the solution feels abstract. Great persuasion isn't about being convincing; it's about walking someone through each of these without them noticing the structure."
  },
  "freytag's pyramid":{
    title:"Freytag's Pyramid (Storytelling)",
    summary:"The classic 5-part story arc: Exposition → Rising Action → Climax → Falling Action → Resolution.",
    body:"Named for Gustav Freytag's analysis of Greek and Shakespearean drama. Exposition sets up characters, place, stakes — keep it short, audiences are patient for 30 seconds. Rising Action layers complication. Climax is the turning point — the moment of decision or revelation. Falling Action shows consequences. Resolution settles the new normal. Most speakers over-invest in exposition and under-invest in climax. The climax should take at least 30% of the speech. Make sure the audience can FEEL the turning point — with a pause, a vocal shift, or a silent beat."
  },
  "star":{
    title:"STAR Method",
    summary:"Situation → Task → Action → Result. The standard structure for interview answers and case-based storytelling.",
    body:"SITUATION: set the scene in one sentence — what was happening? TASK: what needed to be done, by whom, by when? ACTION: what YOU did (not the team — focus on your contribution). RESULT: measurable outcome — numbers if possible, otherwise qualitative (\"revenue up 30%\" / \"project shipped on time\" / \"team stopped complaining\"). Build a bank of 5-6 STAR stories covering: a win, a failure, a conflict resolved, a leadership moment, a time you learned. Adapt them to fit any question. Most interview failures are from skipping Result."
  },
  "inverted triangle":{
    title:"Inverted Triangle (Research Writing)",
    summary:"Start broad, narrow to specifics. Journalism's structure — the most important info first, details below.",
    body:"Imagine a ▽ — top is wide (context, why this matters), middle narrows (the main finding or argument), bottom tapers to specifics (evidence, sources, caveats). The audience gets the main point in the first 30 seconds; if they stop listening then, they still learned something. Specialists and deep-interest listeners get the nuance later. The opposite (burying the lede) is the #1 mistake in research-heavy speeches. Rule of thumb: if you cut your speech off at any point, the part they've heard should still be useful."
  },
  "kotter's 8 steps":{
    title:"Kotter's 8 Steps (Change Management)",
    summary:"John Kotter's framework for leading organizational change. All 8 matter — skipping steps kills initiatives.",
    body:"1) Create urgency. 2) Build a guiding coalition. 3) Form a strategic vision. 4) Enlist a volunteer army. 5) Enable action by removing barriers. 6) Generate short-term wins. 7) Sustain acceleration. 8) Institute change (anchor in culture). Most change efforts die at step 1 (no urgency) or step 6 (no early wins to build momentum). The hardest step is usually 2 — building the coalition — because you need to recruit skeptics, not just believers. For your Manage Change speech, you don't need all 8 — pick the 3 most relevant to your situation and go deep."
  },
  "raci":{
    title:"RACI Matrix",
    summary:"Responsible, Accountable, Consulted, Informed. A one-page clarifier for who does what on any project.",
    body:"RESPONSIBLE: does the work. ACCOUNTABLE: owns the outcome (only one person per task). CONSULTED: gives input before decision. INFORMED: told after. Make a simple matrix: rows are tasks, columns are people, each cell gets R/A/C/I. The #1 rule: exactly ONE Accountable per task. Multiple A's = nobody's accountable. A task with no A = guaranteed miss. Project disasters almost always trace to unclear RACI. Do this upfront and you eliminate 80% of \"I thought YOU were doing that\" moments later."
  },
  "autonomy, mastery, purpose":{
    title:"Autonomy, Mastery, Purpose",
    summary:"Dan Pink's three drivers of intrinsic motivation, from Drive (2009).",
    body:"Money motivates up to a baseline — past that, intrinsic drivers matter more. AUTONOMY: people want control over what they do, how, when, with whom. MASTERY: the drive to get better at something that matters. PURPOSE: the sense their work connects to something larger than themselves. When motivating a team, figure out which driver each person values most — autonomy people hate micromanagement, mastery people need challenges, purpose people need to see impact. One-size-fits-all motivation (pizza parties, generic pep talks) motivates nobody. Tailor to the person."
  },
  "grow model":{
    title:"GROW Model (Coaching)",
    summary:"A conversation structure for coaching sessions: Goal → Reality → Options → Will.",
    body:"GOAL: what do you want to achieve? Specific and time-bound. REALITY: what's happening now? Honest assessment. OPTIONS: what could you try? Brainstorm widely before evaluating. WILL: what WILL you do? Specific next step, by when, with what support. The discipline is asking, not telling. When you catch yourself about to give advice, ask a question instead. \"What have you tried?\" / \"What might work?\" / \"What's stopping you?\" The power of GROW is it forces the coachee to own their own plan — which means they actually follow through."
  }
};
